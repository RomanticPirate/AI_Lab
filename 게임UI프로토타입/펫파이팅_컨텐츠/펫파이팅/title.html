<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫 파이팅 - 컨텐츠 입장 화면</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .screen {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
        }

        /* ===== 배경: 폭발하는 에너지 ===== */
        .bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #2a1860 0%, #140828 40%, #080410 100%);
        }

        /* 집중선 (스피드라인) */
        .speed-lines {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .speed-line {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 2000px;
            height: 1px;
            transform-origin: 0 0;
            background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, transparent 100%);
        }

        /* 중앙 폭발 빛 */
        .center-burst {
            position: absolute;
            left: 50%;
            top: 42%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: conic-gradient(
                from 0deg,
                rgba(255,200,60,0.08) 0deg,
                transparent 20deg,
                rgba(255,80,40,0.06) 40deg,
                transparent 60deg,
                rgba(80,120,255,0.06) 80deg,
                transparent 100deg,
                rgba(255,200,60,0.08) 120deg,
                transparent 140deg,
                rgba(255,80,40,0.06) 160deg,
                transparent 180deg,
                rgba(80,120,255,0.06) 200deg,
                transparent 220deg,
                rgba(255,200,60,0.08) 240deg,
                transparent 260deg,
                rgba(255,80,40,0.06) 280deg,
                transparent 300deg,
                rgba(80,120,255,0.06) 320deg,
                transparent 340deg,
                rgba(255,200,60,0.08) 360deg
            );
            animation: burstSpin 20s linear infinite;
            filter: blur(10px);
        }

        @keyframes burstSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 좌/우 진영 빛 */
        .team-glow {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            pointer-events: none;
        }

        .team-glow.red {
            left: 0;
            background: radial-gradient(ellipse at 20% 60%, rgba(255,40,20,0.15) 0%, transparent 60%);
        }

        .team-glow.blue {
            right: 0;
            background: radial-gradient(ellipse at 80% 60%, rgba(20,80,255,0.15) 0%, transparent 60%);
        }

        /* 에너지 파동 */
        .energy-ring {
            position: absolute;
            left: 50%;
            top: 42%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(255,200,60,0.15);
            animation: ringExpand 3s ease-out infinite;
        }

        .energy-ring:nth-child(2) { animation-delay: 1s; }
        .energy-ring:nth-child(3) { animation-delay: 2s; }

        @keyframes ringExpand {
            0% { width: 50px; height: 50px; opacity: 0.6; }
            100% { width: 800px; height: 800px; opacity: 0; }
        }

        /* 바닥 */
        .bg-floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
        }

        .bg-floor-line {
            position: absolute;
            bottom: 100px;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,60,30,0.3) 0%, rgba(255,200,60,0.5) 50%, rgba(30,100,255,0.3) 100%);
            filter: blur(1px);
            box-shadow: 0 0 20px rgba(255,200,60,0.2);
        }

        /* 파티클 캔버스 */
        #bgCanvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* ===== 좌측 진영: 펫들 ===== */
        .team-left {
            position: absolute;
            left: -20px;
            top: 60px;
            bottom: 100px;
            width: 380px;
            z-index: 10;
            animation: teamLeftIn 0.8s ease-out;
        }

        @keyframes teamLeftIn {
            0% { transform: translateX(-200px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .team-right {
            position: absolute;
            right: -20px;
            top: 60px;
            bottom: 100px;
            width: 380px;
            z-index: 10;
            animation: teamRightIn 0.8s ease-out;
        }

        @keyframes teamRightIn {
            0% { transform: translateX(200px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .pet-char {
            position: absolute;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
        }

        /* 펫 idle 애니메이션 */
        .pet-char.a1 { animation: petFloat1 2.2s ease-in-out infinite; }
        .pet-char.a2 { animation: petFloat2 2.5s ease-in-out infinite 0.3s; }
        .pet-char.a3 { animation: petFloat3 2.8s ease-in-out infinite 0.6s; }

        @keyframes petFloat1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes petFloat2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
        @keyframes petFloat3 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* ===== 타이틀 ===== */
        .title-area {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            animation: titleDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes titleDrop {
            0% { transform: translateX(-50%) translateY(-60px) scale(1.3); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        }

        .title-badge {
            display: inline-block;
            padding: 4px 20px;
            background: linear-gradient(90deg, #ff4020, #ff8020);
            color: white;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 3px;
            border-radius: 20px;
            margin-bottom: 8px;
            box-shadow: 0 2px 12px rgba(255,64,32,0.4);
        }

        .title-main {
            position: relative;
            display: inline-block;
        }

        .title-glow-bg {
            position: absolute;
            inset: -60px -120px;
            background: radial-gradient(ellipse, rgba(255,180,40,0.25) 0%, rgba(255,80,20,0.1) 40%, transparent 70%);
            filter: blur(30px);
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%,100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .title-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 110px;
            line-height: 1;
            position: relative;
            user-select: none;
        }

        .title-text span {
            position: absolute;
            left: 0;
            top: 0;
            white-space: nowrap;
        }

        .t-depth3 {
            color: #1a0000;
            transform: translate(6px, 8px);
            z-index: 1;
        }

        .t-depth2 {
            color: #4a0800;
            transform: translate(3px, 5px);
            z-index: 2;
        }

        .t-stroke {
            -webkit-text-stroke: 4px #c02000;
            color: transparent;
            z-index: 3;
        }

        .t-fill {
            background: linear-gradient(180deg, #fff8a0 0%, #ffc020 20%, #ff6010 50%, #d02000 75%, #800800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 4;
        }

        .t-highlight {
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,200,0.4) 25%, transparent 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 5;
        }

        .t-scan {
            overflow: hidden;
            z-index: 6;
        }

        .t-scan::after {
            content: '펫 파이팅';
            font-family: 'Black Han Sans', sans-serif;
            font-size: 110px;
            position: absolute;
            left: 0;
            top: 0;
            background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.7) 45%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.7) 55%, transparent 65%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 250% 100%;
            animation: scanMove 3s ease-in-out infinite;
        }

        @keyframes scanMove {
            0%,20% { background-position: 200% 0; }
            80%,100% { background-position: -200% 0; }
        }

        .t-visible {
            position: relative;
            z-index: 0;
            visibility: hidden;
        }

        /* 부제 */
        .title-sub {
            margin-top: 6px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 8px;
            color: rgba(255,200,100,0.8);
            text-shadow: 0 0 20px rgba(255,160,40,0.4);
        }

        /* 장식 */
        .title-deco {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .deco-line {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffa030, transparent);
        }

        .deco-star {
            color: #ffc040;
            font-size: 14px;
            animation: decoSpin 4s linear infinite;
        }

        @keyframes decoSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== VS 이펙트 ===== */
        .vs-area {
            position: absolute;
            left: 50%;
            top: 55%;
            transform: translate(-50%, -50%);
            z-index: 15;
        }

        .vs-burst {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,220,60,0.2) 0%, transparent 60%);
            animation: vsBurst 1.5s ease-in-out infinite;
        }

        @keyframes vsBurst {
            0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
        }

        .vs-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 80px;
            position: relative;
            user-select: none;
        }

        .vs-text .vs-shadow {
            position: absolute;
            color: #400000;
            transform: translate(3px, 4px);
        }

        .vs-text .vs-main {
            position: relative;
            background: linear-gradient(180deg, #ffffff 0%, #ffe040 30%, #ff8020 60%, #ff2000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(255,120,20,0.6));
        }

        .vs-text .vs-outline {
            position: absolute;
            left: 0;
            top: 0;
            -webkit-text-stroke: 3px #c02000;
            color: transparent;
        }

        /* 충돌 스파크 */
        .clash-fx {
            position: absolute;
            left: 50%;
            top: 55%;
            transform: translate(-50%, -50%);
            z-index: 14;
        }

        .spark-line {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 60px;
            height: 2px;
            transform-origin: 0 0;
            background: linear-gradient(90deg, #ffe060, transparent);
            border-radius: 2px;
        }

        /* ===== 입장 안내 ===== */
        .press-start {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            cursor: pointer;
            animation: pressIn 1s ease-out 0.5s both;
        }

        @keyframes pressIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .press-text {
            font-size: 20px;
            font-weight: 900;
            color: #ffe8c0;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(255,200,100,0.5), 0 2px 4px rgba(0,0,0,0.5);
            animation: pressBlink 2s ease-in-out infinite;
        }

        .press-sub {
            margin-top: 4px;
            font-size: 11px;
            color: rgba(255,220,160,0.3);
            letter-spacing: 3px;
        }

        @keyframes pressBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ===== 화면 전환 ===== */
        .transition { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        .transition.flash { animation: flashBang 0.6s ease-out forwards; }
        @keyframes flashBang {
            0% { background: rgba(255,255,255,1); }
            100% { background: rgba(255,255,255,0); }
        }

        /* ===== 오버레이 ===== */
        .vignette {
            position: absolute; inset: 0; z-index: 30;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        .noise {
            position: absolute; inset: 0; z-index: 31;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .chromatic {
            position: absolute; inset: 0; z-index: 32;
            mix-blend-mode: screen;
            opacity: 0.02;
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="screen" id="screen">

    <!-- 배경 -->
    <div class="bg">
        <div class="center-burst"></div>
        <div class="team-glow red"></div>
        <div class="team-glow blue"></div>
        <div class="energy-ring"></div>
        <div class="energy-ring"></div>
        <div class="energy-ring"></div>
        <div class="bg-floor"></div>
        <div class="bg-floor-line"></div>
    </div>

    <!-- 집중선 (JS로 생성) -->
    <div class="speed-lines" id="speedLines"></div>

    <!-- 파티클 -->
    <canvas id="bgCanvas"></canvas>

    <!-- 좌측 진영 (빨간 팀 - 3마리) -->
    <div class="team-left">
        <!-- 뒤쪽: 작은 펫 (독수리) -->
        <div class="pet-char a3" style="right: 10px; top: 20px; opacity: 0.85;">
            <svg width="140" height="140" viewBox="0 0 140 140">
                <defs>
                    <linearGradient id="eagleR" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d06030"/><stop offset="100%" stop-color="#802010"/></linearGradient>
                </defs>
                <g>
                    <!-- 날개 좌 -->
                    <path d="M20 55 Q5 30, 15 15 Q25 25, 40 40 Z" fill="url(#eagleR)" stroke="#c05020" stroke-width="1.5"/>
                    <path d="M15 50 Q0 25, 8 10 Q18 20, 30 38 Z" fill="#a04018" stroke="#903018" stroke-width="1"/>
                    <!-- 날개 우 -->
                    <path d="M120 55 Q135 30, 125 15 Q115 25, 100 40 Z" fill="url(#eagleR)" stroke="#c05020" stroke-width="1.5"/>
                    <path d="M125 50 Q140 25, 132 10 Q122 20, 110 38 Z" fill="#a04018" stroke="#903018" stroke-width="1"/>
                    <!-- 몸 -->
                    <ellipse cx="70" cy="65" rx="30" ry="28" fill="url(#eagleR)" stroke="#c05020" stroke-width="1.5"/>
                    <ellipse cx="70" cy="72" rx="18" ry="16" fill="#e8a880"/>
                    <!-- 머리 -->
                    <circle cx="70" cy="38" r="18" fill="url(#eagleR)" stroke="#c05020" stroke-width="1.5"/>
                    <circle cx="70" cy="38" r="12" fill="#f0c0a0"/>
                    <!-- 눈 -->
                    <ellipse cx="63" cy="35" rx="4" ry="4" fill="white"/>
                    <circle cx="64" cy="35" r="2.5" fill="#1a0a00"/>
                    <circle cx="65" cy="34" r="1" fill="white"/>
                    <ellipse cx="77" cy="35" rx="4" ry="4" fill="white"/>
                    <circle cx="76" cy="35" r="2.5" fill="#1a0a00"/>
                    <circle cx="77" cy="34" r="1" fill="white"/>
                    <!-- 화난 눈썹 -->
                    <path d="M56 28 L67 32" stroke="#601008" stroke-width="3" stroke-linecap="round"/>
                    <path d="M84 28 L73 32" stroke="#601008" stroke-width="3" stroke-linecap="round"/>
                    <!-- 부리 -->
                    <path d="M65 42 L70 52 L75 42 Z" fill="#f0a020" stroke="#c08010" stroke-width="1"/>
                    <!-- 다리 -->
                    <line x1="60" y1="90" x2="55" y2="110" stroke="#c08010" stroke-width="2.5"/>
                    <line x1="80" y1="90" x2="85" y2="110" stroke="#c08010" stroke-width="2.5"/>
                    <path d="M48 110 L55 110 L58 115" fill="none" stroke="#c08010" stroke-width="2"/>
                    <path d="M78 115 L85 110 L92 110" fill="none" stroke="#c08010" stroke-width="2"/>
                </g>
            </svg>
        </div>

        <!-- 중간: 중간 펫 (여우) -->
        <div class="pet-char a2" style="right: -20px; top: 140px; opacity: 0.92;">
            <svg width="170" height="200" viewBox="0 0 170 200">
                <defs>
                    <linearGradient id="foxR" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e06830"/><stop offset="100%" stop-color="#a03010"/></linearGradient>
                </defs>
                <g>
                    <!-- 꼬리 -->
                    <path d="M30 130 Q5 100, 10 70 Q15 60, 25 70 Q20 95, 40 120" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <path d="M10 70 Q12 62, 20 65" fill="white" stroke="none"/>
                    <!-- 귀 -->
                    <path d="M50 48 L38 8 L68 38 Z" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <path d="M52 42 L42 14 L62 36 Z" fill="#e89070"/>
                    <path d="M120 48 L132 8 L102 38 Z" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <path d="M118 42 L128 14 L108 36 Z" fill="#e89070"/>
                    <!-- 머리 -->
                    <ellipse cx="85" cy="60" rx="40" ry="35" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <ellipse cx="85" cy="68" rx="24" ry="20" fill="white"/>
                    <!-- 눈 -->
                    <ellipse cx="72" cy="55" rx="6" ry="7" fill="white" stroke="#a03010" stroke-width="0.5"/>
                    <ellipse cx="74" cy="56" rx="4" ry="5" fill="#2a1800"/>
                    <circle cx="76" cy="53" r="2" fill="white"/>
                    <ellipse cx="98" cy="55" rx="6" ry="7" fill="white" stroke="#a03010" stroke-width="0.5"/>
                    <ellipse cx="96" cy="56" rx="4" ry="5" fill="#2a1800"/>
                    <circle cx="98" cy="53" r="2" fill="white"/>
                    <!-- 화난 눈썹 -->
                    <path d="M62 44 L78 50" stroke="#601008" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M108 44 L92 50" stroke="#601008" stroke-width="3.5" stroke-linecap="round"/>
                    <!-- 코/입 -->
                    <ellipse cx="85" cy="68" rx="5" ry="3" fill="#2a1800"/>
                    <path d="M78 75 Q85 82, 92 75" fill="#500808" stroke="#701010" stroke-width="1"/>
                    <path d="M80 75 L83 80" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M90 75 L87 80" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <!-- 몸 -->
                    <ellipse cx="85" cy="120" rx="38" ry="42" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <ellipse cx="85" cy="128" rx="22" ry="28" fill="white"/>
                    <!-- 팔 (주먹) -->
                    <path d="M47 105 Q25 80, 35 65 Q40 58, 48 65 L52 100" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <circle cx="38" cy="64" r="12" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <path d="M123 105 Q145 80, 135 65 Q130 58, 122 65 L118 100" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <circle cx="132" cy="64" r="12" fill="url(#foxR)" stroke="#c05020" stroke-width="1.5"/>
                    <!-- 다리 -->
                    <ellipse cx="68" cy="162" rx="16" ry="12" fill="#a03010"/>
                    <ellipse cx="102" cy="162" rx="16" ry="12" fill="#a03010"/>
                    <ellipse cx="65" cy="173" rx="18" ry="7" fill="#a03010" stroke="#802008" stroke-width="1"/>
                    <ellipse cx="105" cy="173" rx="18" ry="7" fill="#a03010" stroke="#802008" stroke-width="1"/>
                </g>
            </svg>
        </div>

        <!-- 앞쪽: 메인 펫 (곰) -->
        <div class="pet-char a1" style="right: -60px; top: 200px; z-index: 3;">
            <svg width="260" height="300" viewBox="0 0 260 300">
                <defs>
                    <linearGradient id="bearR" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e04030"/><stop offset="100%" stop-color="#901818"/></linearGradient>
                    <linearGradient id="bearRD" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b03020"/><stop offset="100%" stop-color="#601010"/></linearGradient>
                    <filter id="redGlow"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(255,60,30,0.4)"/></filter>
                </defs>
                <g filter="url(#redGlow)">
                    <!-- 귀 -->
                    <circle cx="85" cy="42" r="24" fill="url(#bearR)" stroke="#c04030" stroke-width="2"/>

<script>
/* ===== 집중선 생성 ===== */
const speedContainer = document.getElementById('speedLines');
for (let i = 0; i < 40; i++) {
    const line = document.createElement('div');
    line.className = 'speed-line';
    const angle = (i / 40) * 360;
    line.style.transform = `rotate(${angle}deg)`;
    line.style.opacity = 0.3 + Math.random() * 0.5;
    speedContainer.appendChild(line);
}

/* ===== 충돌 스파크 ===== */
const clashEl = document.getElementById('clashFx');
for (let i = 0; i < 12; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark-line';
    const angle = (i / 12) * 360;
    spark.style.transform = `rotate(${angle}deg)`;
    spark.style.animation = `sparkShoot 1.2s ease-out infinite ${i * 0.1}s`;
    clashEl.appendChild(spark);
}

const style = document.createElement('style');
style.textContent = `
@keyframes sparkShoot {
    0% { width: 0; opacity: 1; }
    50% { width: 80px; opacity: 0.8; }
    100% { width: 0; opacity: 0; }
}`;
document.head.appendChild(style);

/* ===== 파티클 ===== */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1280;
canvas.height = 720;

class Particle {
    constructor(init) {
        this.reset(init);
    }
    reset(init) {
        /* 주로 양쪽에서 중앙으로 */
        const side = Math.random() > 0.5;
        this.x = side ? Math.random() * 200 : 1080 + Math.random() * 200;
        this.y = 100 + Math.random() * 500;
        this.targetX = 540 + (Math.random() - 0.5) * 200;
        this.targetY = 300 + (Math.random() - 0.5) * 100;
        this.size = Math.random() * 3 + 1;
        this.speed = Math.random() * 0.01 + 0.003;
        this.t = init ? Math.random() : 0;
        this.opacity = 0;
        this.color = side ? (Math.random() > 0.3 ? '#ff6040' : '#ffd060') : (Math.random() > 0.3 ? '#4080ff' : '#80c0ff');
    }
    update() {
        this.t += this.speed;
        if (this.t > 1) { this.reset(false); return; }
        const ease = this.t < 0.5 ? 2 * this.t * this.t : 1 - Math.pow(-2 * this.t + 2, 2) / 2;
        this.drawX = this.x + (this.targetX - this.x) * ease;
        this.drawY = this.y + (this.targetY - this.y) * ease;
        this.opacity = this.t < 0.3 ? this.t / 0.3 : this.t > 0.7 ? (1 - this.t) / 0.3 : 1;
        this.opacity *= 0.7;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.drawX, this.drawY, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fill();
    }
}

const particles = [];
for (let i = 0; i < 60; i++) particles.push(new Particle(true));

/* 떠오르는 파티클 */
class FloatParticle {
    constructor() { this.reset(true); }
    reset(init) {
        this.x = Math.random() * canvas.width;
        this.y = init ? Math.random() * canvas.height : canvas.height + 10;
        this.size = Math.random() * 1.5 + 0.5;
        this.vy = -(Math.random() * 0.6 + 0.1);
        this.vx = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.fade = Math.random() * 0.002 + 0.0005;
        this.color = Math.random() > 0.5 ? '#ffd060' : '#ffffff';
    }
    update() {
        this.y += this.vy;
        this.x += this.vx;
        this.opacity -= this.fade;
        if (this.opacity <= 0) this.reset(false);
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fill();
    }
}

const floats = [];
for (let i = 0; i < 40; i++) floats.push(new FloatParticle());

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    floats.forEach(p => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
}
animate();

/* ===== 키 입력 ===== */
let transitioning = false;
function enter() {
    if (transitioning) return;
    transitioning = true;
    document.getElementById('transition').classList.add('flash');
    setTimeout(() => {
        alert('입장 인트로 화면으로 이동합니다.\n(아직 미구현)');
        document.getElementById('transition').classList.remove('flash');
        transitioning = false;
    }, 600);
}

document.addEventListener('keydown', enter);
document.getElementById('pressStart').addEventListener('click', enter);
</script>
