<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펫 파이팅</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#080410;--gold:#ffc040;--gold-d:#a07020;
    --red:#ff4030;--blue:#3080ff;--green:#40c060;--purple:#a060e0;
}
body{background:#000;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Noto Sans KR',sans-serif;color:#e0e0e0;font-size:11px}
.game{width:1280px;height:720px;position:relative;overflow:hidden;background:var(--bg)}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#666}

/* ===== 공통 ===== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s}
.screen.active{opacity:1;pointer-events:auto}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse,transparent 40%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:90}
.noise{position:absolute;inset:0;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:91}
.flash-overlay{position:absolute;inset:0;background:#fff;z-index:100;opacity:0;pointer-events:none}
.flash-overlay.flash{animation:flashAnim .5s ease-out forwards}
@keyframes flashAnim{0%{opacity:.8}100%{opacity:0}}

/* ===== 타이틀 화면 ===== */
/* 레이어 0: 깊은 배경 */
.title-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,#1a0a30,#0c0418 50%,#040208)}
/* 레이어 1: 느린 성운 */
.title-nebula{position:absolute;inset:-100px;background:
    radial-gradient(ellipse at 20% 30%,rgba(255,40,20,.08),transparent 40%),
    radial-gradient(ellipse at 80% 70%,rgba(20,60,255,.08),transparent 40%),
    radial-gradient(ellipse at 50% 50%,rgba(160,40,200,.06),transparent 50%);
    animation:titleNebulaDrift 30s ease-in-out infinite alternate;filter:blur(20px)}
@keyframes titleNebulaDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.05)}}
/* 레이어 2: 빠른 방사형 버스트 */
.title-burst{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:1400px;height:1400px;
    background:conic-gradient(from 0deg,rgba(255,180,40,.05) 0deg,transparent 10deg,rgba(255,60,20,.04) 20deg,transparent 30deg,rgba(40,80,255,.03) 40deg,transparent 50deg);
    animation:spin 12s linear infinite;filter:blur(6px)}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
/* 레이어 3: 좌우 에너지 글로우 */
.title-glow-l{position:absolute;left:-50px;top:0;width:55%;height:100%;
    background:radial-gradient(ellipse at 30% 55%,rgba(255,60,20,.18),transparent 55%);animation:titleGlowPulseL 3s ease-in-out infinite}
.title-glow-r{position:absolute;right:-50px;top:0;width:55%;height:100%;
    background:radial-gradient(ellipse at 70% 55%,rgba(20,80,255,.18),transparent 55%);animation:titleGlowPulseR 3s ease-in-out infinite .5s}
@keyframes titleGlowPulseL{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
@keyframes titleGlowPulseR{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
/* 레이어 4: 중앙 격돌 에너지 */
.title-clash{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:200px;height:600px;
    background:linear-gradient(180deg,transparent,rgba(255,200,60,.06) 30%,rgba(255,200,60,.12) 50%,rgba(255,200,60,.06) 70%,transparent);
    animation:titleClashPulse 2s ease-in-out infinite;filter:blur(15px)}
@keyframes titleClashPulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scaleX(1)}50%{opacity:1;transform:translate(-50%,-50%) scaleX(1.8)}}
/* 레이어 5: 투기장 바닥 */
.title-floor{position:absolute;bottom:0;width:100%;height:120px;
    background:linear-gradient(180deg,transparent,rgba(30,15,5,.6) 30%,rgba(60,30,10,.8) 70%,rgba(40,20,8,1));
    border-top:1px solid rgba(255,160,40,.15)}
.title-floor::after{content:'';position:absolute;bottom:0;width:100%;height:3px;
    background:linear-gradient(90deg,rgba(255,60,30,.4),rgba(255,200,60,.7) 50%,rgba(30,100,255,.4));filter:blur(2px);box-shadow:0 0 30px rgba(255,200,60,.3)}
/* 레이어 6: 스피드라인 */
.title-speedlines{position:absolute;inset:0;overflow:hidden;opacity:0;pointer-events:none}
.title-speedlines.show{animation:titleSpeedIn .6s ease-out forwards}
@keyframes titleSpeedIn{0%{opacity:.6}100%{opacity:0}}
.title-speedline{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(255,200,100,.5),transparent);animation:titleSpeedDash .4s linear forwards}
@keyframes titleSpeedDash{0%{transform:scaleX(0);opacity:1}100%{transform:scaleX(1);opacity:0}}

/* 텍스트 영역 - 초기 숨김, JS로 연출 */
.title-text-area{position:absolute;top:30px;left:50%;transform:translateX(-50%);text-align:center;z-index:20;opacity:0;pointer-events:none}
.title-text-area.show{opacity:1;pointer-events:auto}
/* 타이틀 등장 연출 */
.title-text-area.entrance{animation:titleSlam .5s cubic-bezier(.2,1,.3,1) forwards}
@keyframes titleSlam{
    0%{opacity:0;transform:translateX(-50%) translateY(-120px) scale(2.5)}
    60%{opacity:1;transform:translateX(-50%) translateY(10px) scale(.95)}
    80%{transform:translateX(-50%) translateY(-5px) scale(1.02)}
    100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
.title-impact-flash{position:absolute;inset:0;background:rgba(255,220,100,.8);z-index:99;opacity:0;pointer-events:none}
.title-impact-flash.show{animation:titleFlash .4s ease-out forwards}
@keyframes titleFlash{0%{opacity:.9}100%{opacity:0}}
.title-impact-ring{position:absolute;left:50%;top:120px;transform:translate(-50%,-50%);width:60px;height:60px;border:3px solid rgba(255,200,60,.6);border-radius:50%;opacity:0;pointer-events:none;z-index:21}
.title-impact-ring.show{animation:titleRing .6s ease-out forwards}
@keyframes titleRing{0%{opacity:1;width:60px;height:60px;border-width:3px}100%{opacity:0;width:600px;height:600px;border-width:1px}}

.title-badge{display:inline-block;padding:5px 24px;background:linear-gradient(90deg,#ff4020,#ff8020);color:#fff;font-size:13px;font-weight:900;letter-spacing:4px;border-radius:20px;margin-bottom:10px;box-shadow:0 2px 16px rgba(255,64,32,.5);text-transform:uppercase}
.title-name{font-family:'Black Han Sans',sans-serif;font-size:120px;line-height:1;position:relative;filter:drop-shadow(0 0 40px rgba(255,100,20,.3))}
.title-name .shadow{position:absolute;left:0;top:0;color:#1a0000;transform:translate(6px,8px)}
.title-name .stroke{position:absolute;left:0;top:0;-webkit-text-stroke:5px #c02000;color:transparent}
.title-name .fill{position:relative;background:linear-gradient(180deg,#fff8a0,#ffc020 20%,#ff6010 50%,#d02000 75%,#800800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title-name .shine{position:absolute;left:0;top:0;background:linear-gradient(180deg,rgba(255,255,255,.9),transparent 30%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titleShineMove 3s ease-in-out infinite}
@keyframes titleShineMove{0%,100%{clip-path:inset(0 100% 0 0)}50%{clip-path:inset(0 0 0 0)}}
.title-glow-bg{position:absolute;inset:-80px -160px;background:radial-gradient(ellipse,rgba(255,180,40,.25),transparent 55%);filter:blur(40px);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.title-sub{margin-top:8px;font-size:20px;font-weight:900;letter-spacing:10px;color:rgba(255,200,100,.9);text-shadow:0 0 20px rgba(255,160,40,.5)}
.title-vs-spark{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);font-family:'Black Han Sans',sans-serif;font-size:80px;color:transparent;
    -webkit-text-stroke:2px rgba(255,200,60,.3);z-index:15;opacity:0;pointer-events:none}
.title-vs-spark.show{animation:titleVsSpark 1.5s ease-out forwards}
@keyframes titleVsSpark{0%{opacity:0;transform:translate(-50%,-50%) scale(3)}30%{opacity:.8;transform:translate(-50%,-50%) scale(1)}100%{opacity:.2;transform:translate(-50%,-50%) scale(1)}}

/* PRESS START */
.title-press{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;z-index:20;cursor:pointer;opacity:0;pointer-events:none}
.title-press.show{opacity:1;pointer-events:auto;animation:titlePressIn .5s ease-out}
@keyframes titlePressIn{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
.title-press-text{font-size:22px;font-weight:900;color:#ffe8c0;letter-spacing:8px;text-shadow:0 0 20px rgba(255,200,100,.5),0 0 60px rgba(255,160,40,.2);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* 펫 영역 - 슬라이드 인 */
.title-pets{position:absolute;bottom:0;z-index:10;width:520px;height:420px;pointer-events:none}
.title-pets.left{left:-20px}
.title-pets.right{right:-20px}
.title-pet-wrap{position:absolute;opacity:0;transform:translateX(0)}
.title-pet-wrap.slide-in-l{animation:titlePetSlideL var(--dur,.6s) var(--delay,0s) cubic-bezier(.2,1,.3,1) forwards}
.title-pet-wrap.slide-in-r{animation:titlePetSlideR var(--dur,.6s) var(--delay,0s) cubic-bezier(.2,1,.3,1) forwards}
@keyframes titlePetSlideL{0%{opacity:0;transform:translateX(-300px) scale(.8)}70%{opacity:1;transform:translateX(20px) scale(1.02)}100%{opacity:1;transform:translateX(0) scale(1)}}
@keyframes titlePetSlideR{0%{opacity:0;transform:translateX(300px) scale(.8)}70%{opacity:1;transform:translateX(-20px) scale(1.02)}100%{opacity:1;transform:translateX(0) scale(1)}}
.title-pet-svg{filter:drop-shadow(0 8px 25px rgba(0,0,0,.7))}
/* 펫 idle 숨쉬기 */
.title-pet-wrap.idle{animation:titlePetIdle 2.5s ease-in-out infinite}
@keyframes titlePetIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* 리더 펫 더 크게 숨쉬기 */
.title-pet-wrap.idle-leader{animation:titlePetIdleLeader 2.2s ease-in-out infinite}
@keyframes titlePetIdleLeader{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
/* 펫 아래 그림자 */
.title-pet-shadow{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:80%;height:15px;background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent 70%);border-radius:50%}

/* ===== 인트로 씬 ===== */
.intro-scene{position:absolute;inset:0;overflow:hidden;background:#000}
/* 시네마틱 레터박스 */
.intro-letterbox-top,.intro-letterbox-bot{position:absolute;left:0;width:100%;height:60px;background:#000;z-index:50;transition:height .6s}
.intro-letterbox-top{top:0}
.intro-letterbox-bot{bottom:0}
/* 캔버스 배경 */
.intro-canvas{position:absolute;inset:0;z-index:1}
/* 컷 컨테이너 */
.intro-cut{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;z-index:10;transition:opacity .6s;pointer-events:none}
.intro-cut.active{opacity:1}
/* 내레이션 텍스트 */
.intro-narr{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);text-align:center;z-index:30;
    font-size:20px;font-weight:700;color:#e0d8f0;letter-spacing:1px;line-height:1.8;
    text-shadow:0 2px 20px rgba(0,0,0,.8);white-space:nowrap;opacity:0;transition:opacity .3s}
.intro-narr.show{opacity:1}
/* 건너뛰기 */
.intro-skip{position:absolute;bottom:18px;right:30px;font-size:13px;color:rgba(255,255,255,.3);cursor:pointer;z-index:60;padding:6px 16px;border:1px solid rgba(255,255,255,.15);border-radius:4px;transition:all .2s}
.intro-skip:hover{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.05)}
/* 플래시 */
.intro-flash{position:absolute;inset:0;background:#fff;z-index:40;opacity:0;pointer-events:none}
.intro-flash.show{animation:introFlash .5s ease-out forwards}
@keyframes introFlash{0%{opacity:.9}100%{opacity:0}}
/* CUT2: 속성 아이콘 */
.intro-elem{position:absolute;font-size:60px;opacity:0;transform:scale(0);z-index:15;filter:drop-shadow(0 0 20px currentColor)}
.intro-elem.pop{animation:introElemPop .5s cubic-bezier(.2,1.5,.4,1) forwards}
@keyframes introElemPop{0%{opacity:0;transform:scale(0) rotate(-20deg)}60%{opacity:1;transform:scale(1.3) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.intro-elem-ring{position:absolute;width:100px;height:100px;border-radius:50%;border:2px solid;opacity:0;z-index:14}
.intro-elem-ring.expand{animation:introRingExpand .6s ease-out forwards}
@keyframes introRingExpand{0%{opacity:.8;transform:scale(.5)}100%{opacity:0;transform:scale(2.5)}}
/* CUT2: 실루엣 돌진 */
.intro-sil{position:absolute;top:50%;z-index:16;opacity:0;filter:brightness(0) drop-shadow(0 0 30px rgba(255,200,60,.5))}
.intro-sil.left{left:-200px;transform:translateY(-50%)}
.intro-sil.right{right:-200px;transform:translateY(-50%) scaleX(-1)}
.intro-sil.rush-l{animation:introRushL .4s cubic-bezier(.4,0,.2,1) forwards}
.intro-sil.rush-r{animation:introRushR .4s cubic-bezier(.4,0,.2,1) forwards}
@keyframes introRushL{0%{left:-200px;opacity:0}100%{left:440px;opacity:1}}
@keyframes introRushR{0%{right:-200px;opacity:0}100%{right:440px;opacity:1}}
/* CUT3: 투기장 */
.intro-arena{position:absolute;bottom:-300px;left:50%;transform:translateX(-50%);z-index:12;opacity:0;transition:all 1.2s cubic-bezier(.2,1,.3,1)}
.intro-arena.rise{bottom:80px;opacity:1}
.intro-spotlight{position:absolute;top:0;width:200px;height:100%;z-index:13;opacity:0}
.intro-spotlight.on{animation:introSpotlight 1s .5s ease-out forwards}
@keyframes introSpotlight{0%{opacity:0}100%{opacity:.6}}
/* CUT4: 펫 등장 */
.intro-lineup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;gap:16px;z-index:15}
.intro-pet-reveal{opacity:0;transform:translateY(60px) scale(.8);transition:all .4s cubic-bezier(.2,1,.3,1);text-align:center}
.intro-pet-reveal.show{opacity:1;transform:translateY(0) scale(1)}
.intro-pet-reveal .pet-name{margin-top:8px;font-size:16px;font-weight:900;color:#ffe080;letter-spacing:2px;opacity:0;transition:opacity .3s .2s;text-shadow:0 2px 10px rgba(0,0,0,.8)}
.intro-pet-reveal.show .pet-name{opacity:1}
.intro-pet-sil{filter:brightness(0) drop-shadow(0 0 20px rgba(255,200,60,.5));transition:filter .3s}
.intro-pet-reveal.color .intro-pet-sil{filter:brightness(1) drop-shadow(0 0 20px rgba(255,200,60,.4))}

/* ===== 캐릭터 선택 ===== */
.select-bg{position:absolute;inset:0;background:linear-gradient(180deg,#0a0818,#14102a)}
.select-header{padding:16px 24px;font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--gold);text-align:center;text-shadow:0 2px 8px rgba(255,192,64,.3);z-index:10}

/* 상세 정보 영역 (상단~중앙) */
.select-detail{position:absolute;top:60px;left:24px;right:24px;bottom:140px;display:flex;gap:16px;z-index:10}
.select-portrait-big{width:400px;flex-shrink:0;border:2px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
/* ── 펫별 초상화 등장 연출 ── */
/* 불곰: 왼쪽에서 주먹 돌진 → 쿵 착지 */
.select-portrait-big .portrait-pet-1{animation:pEnter1 .55s cubic-bezier(.15,1.2,.35,1) both}
@keyframes pEnter1{
    0%{opacity:0;transform:translateX(-200px) scale(1.3) rotate(-10deg)}
    45%{opacity:1;transform:translateX(20px) scale(1.1) rotate(3deg)}
    70%{transform:translateX(-5px) scale(.95) rotate(-1deg)}
    100%{opacity:1;transform:translateX(0) scale(1) rotate(0)}
}
/* 독수리왕: 위에서 급강하 → 날개 착지 */
.select-portrait-big .portrait-pet-4{animation:pEnter4 .6s cubic-bezier(.2,1,.3,1) both}
@keyframes pEnter4{
    0%{opacity:0;transform:translateY(-250px) translateX(60px) scale(.7) rotate(15deg)}
    50%{opacity:1;transform:translateY(15px) translateX(-5px) scale(1.1) rotate(-3deg)}
    75%{transform:translateY(-8px) scale(.97) rotate(1deg)}
    100%{opacity:1;transform:translateY(0) scale(1) rotate(0)}
}
/* 그림자고양이: 투명→실체화 (깜빡+흔들림) */
.select-portrait-big .portrait-pet-5{animation:pEnter5 .7s ease-out both}
@keyframes pEnter5{
    0%{opacity:0;transform:scale(1.1);filter:blur(8px) brightness(2)}
    30%{opacity:.4;transform:scale(.98) translateX(8px);filter:blur(4px) brightness(1.5)}
    50%{opacity:.2;transform:scale(1.02) translateX(-6px);filter:blur(6px) brightness(1.8)}
    70%{opacity:.8;transform:scale(.99) translateX(3px);filter:blur(1px) brightness(1.1)}
    100%{opacity:1;transform:scale(1) translateX(0);filter:blur(0) brightness(1)}
}
/* 철갑거북: 아래에서 땅 뚫고 올라옴 */
.select-portrait-big .portrait-pet-6{animation:pEnter6 .6s cubic-bezier(.2,1.3,.35,1) both}
@keyframes pEnter6{
    0%{opacity:0;transform:translateY(200px) scale(.85)}
    50%{opacity:1;transform:translateY(-20px) scale(1.05)}
    75%{transform:translateY(8px) scale(.98)}
    100%{opacity:1;transform:translateY(0) scale(1)}
}
/* 독사킹: 지그재그 사행 진입 */
.select-portrait-big .portrait-pet-7{animation:pEnter7 .7s cubic-bezier(.25,1,.35,1) both}
@keyframes pEnter7{
    0%{opacity:0;transform:translateX(200px) translateY(0) scale(.9)}
    15%{opacity:.5;transform:translateX(120px) translateY(-35px) rotate(-6deg) scale(.95)}
    30%{opacity:.7;transform:translateX(60px) translateY(30px) rotate(5deg) scale(.98)}
    45%{opacity:.85;transform:translateX(10px) translateY(-20px) rotate(-4deg) scale(1.02)}
    60%{opacity:.95;transform:translateX(-15px) translateY(12px) rotate(3deg) scale(1.01)}
    80%{transform:translateX(6px) translateY(-5px) rotate(-1deg) scale(.99)}
    100%{opacity:1;transform:translateX(0) translateY(0) rotate(0) scale(1)}
}
/* 폭탄쥐: 폭탄 POP (클로즈업→축소 복귀) */
.select-portrait-big .portrait-pet-8{animation:pEnter8 .65s cubic-bezier(.2,1,.3,1) both}
@keyframes pEnter8{
    0%{opacity:0;transform:scale(0.3)}
    20%{opacity:1;transform:scale(2.8) translateY(15%)}
    40%{transform:scale(2.5) translateY(12%)}
    55%{transform:scale(1.1) translateY(0)}
    70%{transform:scale(.92)}
    85%{transform:scale(1.04)}
    100%{opacity:1;transform:scale(1)}
}
/* 등장 후 idle 숨쉬기 */
.select-portrait-big .portrait-idle{animation:portraitIdle 2.5s ease-in-out infinite}
@keyframes portraitIdle{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.015)}}
/* 착지 흔들림 (불곰/철갑거북) */
@keyframes portraitShake{0%{transform:translateY(0)}20%{transform:translateY(4px)}40%{transform:translateY(-3px)}60%{transform:translateY(2px)}80%{transform:translateY(-1px)}100%{transform:translateY(0)}}
/* 플래시 */
.select-portrait-flash{position:absolute;inset:0;background:rgba(255,200,100,.2);opacity:0;pointer-events:none;z-index:5}
.select-portrait-flash.show{animation:portraitFlash .4s ease-out forwards}
@keyframes portraitFlash{0%{opacity:1}100%{opacity:0}}
/* 임팩트 링 */
.select-portrait-ring{position:absolute;top:50%;left:50%;width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,200,100,.5);opacity:0;pointer-events:none;z-index:4;transform:translate(-50%,-50%)}
.select-portrait-ring.show{animation:portraitRing .5s ease-out forwards}
@keyframes portraitRing{0%{opacity:.8;width:40px;height:40px;border-width:3px}100%{opacity:0;width:350px;height:350px;border-width:1px}}
/* 배경 오라 펄스 */
.select-portrait-aura{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:1;border-radius:8px}
.select-portrait-aura.show{animation:portraitAura .7s ease-out forwards}
@keyframes portraitAura{0%{opacity:.6;transform:scale(.85)}100%{opacity:0;transform:scale(1.15)}}
/* 스피드라인 */
.select-portrait-lines{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:3;opacity:0}
.select-portrait-lines.show{animation:portraitLinesIn .4s ease-out forwards}
@keyframes portraitLinesIn{0%{opacity:.7}100%{opacity:0}}
.portrait-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(255,200,100,.6),transparent)}
.select-empty-prompt{font-family:'Black Han Sans',sans-serif;font-size:20px;color:rgba(255,200,100,.4);letter-spacing:3px;text-align:center;animation:promptPulse 2s ease-in-out infinite}
@keyframes promptPulse{0%,100%{opacity:.4}50%{opacity:.8}}
.select-info{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;transition:opacity .3s ease-out}
.select-pet-name{font-family:'Black Han Sans',sans-serif;font-size:32px}
.select-pet-story{font-size:14px;color:#a098b8;line-height:1.7;min-height:42px}
.select-stats{display:flex;gap:8px}
.select-stat{flex:1;padding:14px 8px;background:rgba(255,200,100,.04);border:1px solid rgba(255,200,100,.12);border-radius:8px;text-align:center}
.select-stat-icon{font-size:32px;margin-bottom:6px}
.select-stat-name{font-size:13px;color:#a0a0c0;margin-bottom:6px;font-weight:700}
.select-stat-stars{color:var(--gold);font-size:20px;letter-spacing:3px;text-shadow:0 0 8px rgba(255,192,64,.3)}
.select-skills-area{display:flex;gap:10px;flex-direction:column}
.select-skill{padding:14px 16px;background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.2);border-radius:8px;display:flex;align-items:center;gap:12px;transition:all .2s}
.select-skill:hover{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.35)}
.select-skill-badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:900;letter-spacing:2px;flex-shrink:0}
.select-skill-badge.passive{background:rgba(40,160,80,.25);border:1px solid rgba(40,160,80,.5);color:#60d080;box-shadow:0 0 8px rgba(40,160,80,.15)}
.select-skill-badge.active{background:rgba(255,80,40,.2);border:1px solid rgba(255,80,40,.4);color:#ff8060;box-shadow:0 0 8px rgba(255,80,40,.15)}
.select-skill-name{font-size:16px;font-weight:900;color:var(--purple);flex-shrink:0;text-shadow:0 0 6px rgba(160,96,224,.2)}
.select-skill-desc{font-size:13px;color:#a098c0;line-height:1.4}

/* 하단 - 썸네일 + 확인 버튼 (항상 하단 고정) */
.select-footer{position:absolute;bottom:0;left:0;right:0;z-index:12;display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 24px 16px;background:linear-gradient(180deg,transparent,rgba(8,4,16,.8) 30%)}
.select-thumbs{display:flex;gap:10px;justify-content:center}
.select-thumb{width:80px;height:80px;border:2px solid rgba(255,255,255,.08);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;position:relative;overflow:hidden;background:rgba(0,0,0,.3)}
.select-thumb:hover{border-color:rgba(255,255,255,.25);transform:translateY(-4px);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.select-thumb.selected{border-color:var(--gold);box-shadow:0 0 16px rgba(255,192,64,.4)}
.select-thumb-name{position:absolute;bottom:4px;font-size:11px;color:rgba(255,255,255,.7);text-shadow:0 1px 2px #000;font-weight:700}
.select-confirm{padding:12px 50px;font-family:'Black Han Sans',sans-serif;font-size:18px;border:none;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:3px}
.select-confirm.disabled{background:#2a2a3a;color:#555;cursor:default}
.select-confirm.enabled{background:linear-gradient(180deg,#ffc040,#e08010);color:#1a0800;box-shadow:0 4px 16px rgba(255,192,64,.3)}
.select-confirm.enabled:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,192,64,.4)}
.select-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}

/* ===== 대전 상대 선택 ===== */
/* ===== VS 화면 (다크스토커즈 스타일) ===== */
.vs-screen-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0015,#050010,#0a0015)}

/* 대각선 분할 */
.vs-diagonal-split{position:absolute;inset:0;z-index:1;overflow:hidden}
.vs-split-left{position:absolute;top:0;left:0;width:55%;height:100%;clip-path:polygon(0 0,100% 0,85% 100%,0 100%);opacity:0;animation:splitSlideL .5s ease-out .1s forwards}
.vs-split-right{position:absolute;top:0;right:0;width:55%;height:100%;clip-path:polygon(15% 0,100% 0,100% 100%,0 100%);opacity:0;animation:splitSlideR .5s ease-out .1s forwards}
@keyframes splitSlideL{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes splitSlideR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* 대각선 분할선 (에너지 충돌) */
.vs-split-line{position:absolute;top:-10%;left:47%;width:6%;height:120%;background:linear-gradient(180deg,transparent,rgba(255,255,255,.15) 20%,rgba(255,200,100,.4) 50%,rgba(255,255,255,.15) 80%,transparent);transform:rotate(-8deg);z-index:2;animation:splitLineFlicker 2s ease-in-out infinite;filter:blur(1px)}
@keyframes splitLineFlicker{0%,100%{opacity:.6}25%{opacity:1}50%{opacity:.4}75%{opacity:.9}}

/* 번개 이펙트 */
.vs-lightning{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0}
.vs-lightning.strike{opacity:1;animation:lightningStrike .1s ease-out;
    background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.3),transparent 60%)}
@keyframes lightningStrike{0%{opacity:1}100%{opacity:0}}

/* 화면 흔들림 */
.vs-shake{animation:vsShake .3s ease-out!important}
@keyframes vsShake{
    0%{transform:translate(0,0)}
    20%{transform:translate(-8px,4px)}
    40%{transform:translate(6px,-3px)}
    60%{transform:translate(-4px,2px)}
    80%{transform:translate(3px,-1px)}
    100%{transform:translate(0,0)}
}
.vs-micro-shake{animation:vsMicroShake .15s ease-out!important}
@keyframes vsMicroShake{
    0%{transform:translate(0,0)}
    33%{transform:translate(-2px,1px)}
    66%{transform:translate(2px,-1px)}
    100%{transform:translate(0,0)}
}

/* VS 플래시 */
.vs-flash{position:absolute;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none}
.vs-flash.flash{animation:vsFlashAnim .2s ease-out forwards}
@keyframes vsFlashAnim{0%{opacity:.8}100%{opacity:0}}

.vs-screen-body{flex:1;display:flex;align-items:center;justify-content:center;gap:0;z-index:10}
.vs-screen-side{width:400px;display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px}

/* 캐릭터 등장: 양쪽에서 빠르게 슬라이드 + 약간의 바운스 */
.vs-screen-side.left{transform:translateX(-600px) scale(1.1);opacity:0;animation:vsSideSlideL .5s cubic-bezier(.2,1,.3,1) .15s forwards}
.vs-screen-side.right{transform:translateX(600px) scale(1.1);opacity:0;animation:vsSideSlideR .5s cubic-bezier(.2,1,.3,1) .15s forwards}
@keyframes vsSideSlideL{
    0%{transform:translateX(-600px) scale(1.1);opacity:0}
    60%{transform:translateX(20px) scale(1.02);opacity:1}
    80%{transform:translateX(-8px) scale(1)}
    100%{transform:translateX(0) scale(1);opacity:1}
}
@keyframes vsSideSlideR{
    0%{transform:translateX(600px) scale(1.1);opacity:0}
    60%{transform:translateX(-20px) scale(1.02);opacity:1}
    80%{transform:translateX(8px) scale(1)}
    100%{transform:translateX(0) scale(1);opacity:1}
}

/* 초상화에 글로우 + 호흡 애니메이션 */
.vs-screen-portrait{width:260px;height:280px;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
    border:3px solid rgba(255,255,255,.1);box-shadow:0 0 40px rgba(0,0,0,.6)}
.vs-screen-side.left .vs-screen-portrait{animation:vsPortraitPulseL 2.5s ease-in-out .8s infinite}
.vs-screen-side.right .vs-screen-portrait{animation:vsPortraitPulseR 2.5s ease-in-out 1s infinite}
@keyframes vsPortraitPulseL{0%,100%{box-shadow:0 0 40px rgba(0,0,0,.6)}50%{box-shadow:0 0 60px rgba(255,100,50,.3),0 0 40px rgba(0,0,0,.6)}}
@keyframes vsPortraitPulseR{0%,100%{box-shadow:0 0 40px rgba(0,0,0,.6)}50%{box-shadow:0 0 60px rgba(50,100,255,.3),0 0 40px rgba(0,0,0,.6)}}

.vs-screen-name{font-family:'Black Han Sans',sans-serif;font-size:36px;letter-spacing:3px}
.vs-screen-label{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:4px;font-weight:bold}

/* VS 텍스트: 크게 임팩트 등장 */
.vs-center{display:flex;flex-direction:column;align-items:center;gap:12px;z-index:20;
    transform:scale(4) rotate(-10deg);opacity:0;animation:vsCenterSlam .4s cubic-bezier(.2,1,.3,1) .4s forwards}
@keyframes vsCenterSlam{
    0%{transform:scale(4) rotate(-10deg);opacity:0}
    50%{transform:scale(.9) rotate(2deg);opacity:1}
    70%{transform:scale(1.1) rotate(-1deg)}
    100%{transform:scale(1) rotate(0);opacity:1}
}
.vs-center-text{font-family:'Black Han Sans',sans-serif;font-size:90px;
    background:linear-gradient(180deg,#fff,#ffe040,#ff8020,#ff2000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 20px rgba(255,120,20,.6)) drop-shadow(0 4px 12px rgba(0,0,0,.8));
    animation:vsTextPulse 1.5s ease-in-out .9s infinite}
@keyframes vsTextPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(255,120,20,.6)) drop-shadow(0 4px 12px rgba(0,0,0,.8))}50%{filter:drop-shadow(0 0 40px rgba(255,120,20,.9)) drop-shadow(0 4px 12px rgba(0,0,0,.8))}}
.vs-fight-btn{margin-top:16px;padding:16px 70px;font-family:'Black Han Sans',sans-serif;font-size:22px;
    background:linear-gradient(180deg,#ff6020,#c02000);color:#fff;border:2px solid rgba(255,255,255,.2);
    border-radius:8px;cursor:pointer;letter-spacing:6px;
    box-shadow:0 4px 24px rgba(255,64,32,.5);animation:fightPulse 1.5s ease-in-out infinite;z-index:20}
@keyframes fightPulse{0%,100%{transform:scale(1);box-shadow:0 4px 24px rgba(255,64,32,.4)}50%{transform:scale(1.06);box-shadow:0 8px 36px rgba(255,64,32,.7)}}
.vs-fight-btn:hover{background:linear-gradient(180deg,#ff8040,#e03010);transform:scale(1.1)!important}

/* ============================================= */
/* ===== 게임 화면 (격투 게임 스타일) ===== */
/* ============================================= */

/* 배경 + 무대 */
.battle-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#1a1040,#0c0820 50%,#060410);transition:background 1s ease}
.battle-stage-canvas{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.85}
.battle-arena{position:absolute;bottom:0;width:100%;height:180px;background:linear-gradient(180deg,rgba(40,25,15,.0) 0%,rgba(50,30,18,.5) 20%,rgba(60,35,20,.8) 50%,rgba(45,28,15,.95));border-top:none}
/* 무대 바닥 표면 */
.battle-arena::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent 5%,rgba(120,80,40,.4) 20%,rgba(160,100,50,.5) 50%,rgba(120,80,40,.4) 80%,transparent 95%);filter:blur(1px)}
.battle-arena::after{content:'';position:absolute;top:10px;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(80,50,25,.3),transparent 70%);pointer-events:none}
/* 에너지 기둥 배경 */
.battle-energy-left{position:absolute;left:0;bottom:0;width:50%;height:100%;background:radial-gradient(ellipse at 25% 70%,rgba(255,40,20,.06),transparent 50%);pointer-events:none}
.battle-energy-right{position:absolute;right:0;bottom:0;width:50%;height:100%;background:radial-gradient(ellipse at 75% 70%,rgba(20,80,255,.06),transparent 50%);pointer-events:none}
/* 스캔라인 */
.battle-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:88}

/* HUD 상단 - HP바 가운데 맞닿는 구조 */
.battle-hud{display:flex;justify-content:center;align-items:center;padding:10px 20px;z-index:15;position:relative;gap:0}
.battle-hud-side{display:flex;flex-direction:column;gap:4px;flex:1}
.battle-hud-side.right{align-items:flex-end}
.battle-pet-name{font-family:'Black Han Sans',sans-serif;font-size:28px;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
/* HP 바 - 크게 */
.battle-hp-bar{height:44px;background:linear-gradient(180deg,rgba(0,0,0,.7),rgba(0,0,0,.5));overflow:hidden;border:2px solid rgba(255,255,255,.15);position:relative;width:100%;box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 1px 2px rgba(0,0,0,.6)}
.battle-hud-side.left .battle-hp-bar{border-radius:4px 0 0 4px;border-right:none}
.battle-hud-side.right .battle-hp-bar{border-radius:0 4px 4px 0;border-left:none}
.battle-hp-bar::after{content:'';position:absolute;top:1px;left:2px;right:2px;height:6px;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);border-radius:2px;pointer-events:none;z-index:4}
/* 오른쪽(적): 게이지가 왼쪽에서 오른쪽으로 줄어듦 → direction:rtl */
.battle-hud-side.right .battle-hp-bar{direction:rtl}
.battle-hud-side.right .battle-hp-bar>*{direction:ltr}
/* 잔상 게이지 (뒤쪽 레이어) */
.battle-hp-trail{position:absolute;top:0;height:100%;transition:width .8s ease-out;z-index:1}
.battle-hud-side.left .battle-hp-trail{left:0}
.battle-hud-side.right .battle-hp-trail{right:0}
.battle-hp-trail.red-trail{background:linear-gradient(180deg,#882020,#661515,#551010)}
.battle-hp-trail.blue-trail{background:linear-gradient(180deg,#1a4080,#153060,#102050)}
.battle-hp-fill{height:100%;border-radius:0;transition:width .5s ease-out;overflow:hidden;position:relative;z-index:2}
.battle-hp-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);pointer-events:none}
.battle-hp-fill.red{background:linear-gradient(180deg,#ff5040,#cc2020,#aa1818);box-shadow:0 0 12px rgba(255,40,20,.3)}
.battle-hp-fill.blue{background:linear-gradient(180deg,#40a0ff,#2060cc,#1848aa);box-shadow:0 0 12px rgba(40,100,255,.3)}
.battle-hp-fill.low{animation:hpLowPulse 0.5s ease-in-out infinite}
@keyframes hpLowPulse{0%,100%{opacity:1}50%{opacity:.6}}
.battle-hp-text{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 8px rgba(0,0,0,.7);white-space:nowrap;z-index:3;letter-spacing:1px}
/* VS 뱃지 - HP바 중앙 접합부 */
.battle-vs{font-family:'Black Han Sans',sans-serif;font-size:38px;z-index:20;color:#fff;text-shadow:0 0 15px rgba(255,200,100,.6),0 0 30px rgba(255,160,40,.3),0 2px 4px rgba(0,0,0,.8);letter-spacing:3px;line-height:1;align-self:flex-end;padding:0 4px;margin-bottom:2px}

/* 중앙 필드 */
.battle-field{position:absolute;top:80px;bottom:180px;left:0;right:0;z-index:5}
.battle-pet{position:absolute;bottom:0;transition:all .3s;filter:drop-shadow(0 8px 20px rgba(0,0,0,.5))}
.battle-pet.left{left:60px}
.battle-pet.right{right:60px}
/* 아이들 호흡 애니메이션 */
.battle-pet.idle{animation:petIdle 2s ease-in-out infinite}
@keyframes petIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* 공격 이동 - 상대 쪽으로 돌진 */
.battle-pet.move-center-l{left:700px !important;transition:left .3s cubic-bezier(.4,0,.2,1)}
.battle-pet.move-center-r{right:700px !important;transition:right .3s cubic-bezier(.4,0,.2,1)}
/* 무승부 - 가운데로 빠르게 돌진 */
.battle-pet.draw-rush-l{left:420px !important;transition:left .2s cubic-bezier(.4,0,.2,1)}
.battle-pet.draw-rush-r{right:420px !important;transition:right .2s cubic-bezier(.4,0,.2,1)}
/* 무승부 - 튕겨나감 */
.battle-pet.draw-bounce-l{left:0px !important;transition:left .4s cubic-bezier(.2,0,.6,1)}
.battle-pet.draw-bounce-r{right:0px !important;transition:right .4s cubic-bezier(.2,0,.6,1)}
/* 오라 이펙트 */
.battle-pet-aura{position:absolute;inset:-20px;border-radius:50%;opacity:0;pointer-events:none;filter:blur(20px);transition:opacity .3s}
.battle-pet-aura.active{opacity:.4;animation:auraPulse 1s ease-in-out infinite}
@keyframes auraPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.15);opacity:.5}}
/* 바닥 그림자 (타원) */
.battle-pet-shadow{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:200px;height:40px;background:radial-gradient(ellipse,rgba(0,0,0,.5) 0%,rgba(0,0,0,.2) 40%,transparent 70%);border-radius:50%;pointer-events:none}

/* 하단 액션 버튼 */
.battle-actions{position:absolute;bottom:14px;z-index:20;display:flex;gap:8px}
.battle-actions.left{left:20px}
.battle-actions.right{right:20px}
.battle-action-btn{width:128px;padding:10px 8px;border:2px solid rgba(255,200,100,.15);background:linear-gradient(180deg,rgba(20,15,40,.95),rgba(10,8,25,.95));border-radius:8px;cursor:pointer;text-align:center;transition:all .12s;user-select:none;position:relative;overflow:hidden}
.battle-action-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,100,.2),transparent)}
.battle-action-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 40%);pointer-events:none}
.battle-action-btn:hover{border-color:rgba(255,200,100,.4);background:linear-gradient(180deg,rgba(40,30,80,.95),rgba(20,15,50,.95));transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.battle-action-btn.selected{border-color:var(--gold);background:linear-gradient(180deg,rgba(80,60,20,.9),rgba(40,30,10,.9));box-shadow:0 0 20px rgba(255,192,64,.4),inset 0 0 20px rgba(255,192,64,.1)}
.battle-action-btn.disabled{opacity:.35;cursor:default;pointer-events:none;filter:grayscale(.5)}
.battle-action-btn .icon{font-size:34px;margin-bottom:2px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.battle-action-btn .name{font-size:26px;font-weight:900;color:#e0d8f0;text-shadow:0 1px 2px rgba(0,0,0,.5);letter-spacing:1px}
.battle-action-btn .dmg{font-size:22px;color:var(--gold);margin-top:2px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
/* 시스템(적) 버튼 */
.battle-sys-btn{width:128px;padding:10px 8px;border:2px solid rgba(255,200,100,.08);background:linear-gradient(180deg,rgba(10,12,30,.9),rgba(5,8,20,.9));border-radius:8px;text-align:center;opacity:.5;transition:all .12s;position:relative;overflow:hidden}
.battle-sys-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,100,.1),transparent)}
.battle-sys-btn.flash{animation:sysFlash .3s ease-out 3;border-color:rgba(255,200,100,.3)}
@keyframes sysFlash{0%,100%{background:linear-gradient(180deg,rgba(10,12,30,.9),rgba(5,8,20,.9))}50%{background:linear-gradient(180deg,rgba(50,40,20,.9),rgba(30,25,10,.9))}}
.battle-sys-btn .icon{font-size:34px;margin-bottom:2px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.battle-sys-btn .name{font-size:26px;font-weight:900;color:#7080a0;letter-spacing:1px}
.battle-sys-btn .dmg{font-size:22px;color:rgba(100,160,255,.4);margin-top:2px}

/* 메시지 팝업 */
.battle-msg{position:absolute;z-index:30;font-family:'Black Han Sans',sans-serif;pointer-events:none;opacity:0}
.battle-msg.show{animation:msgPop .6s ease-out forwards}
@keyframes msgPop{0%{opacity:0;transform:scale(.3) translateY(20px)}30%{opacity:1;transform:scale(1.15) translateY(-10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.battle-msg-text{font-size:44px;text-shadow:0 3px 10px rgba(0,0,0,.7),0 0 30px rgba(255,200,100,.3)}
/* 대미지 숫자 */
.battle-damage{position:absolute;font-family:'Black Han Sans',sans-serif;font-size:112px;color:#ff4040;z-index:40;pointer-events:none;text-shadow:0 4px 12px rgba(0,0,0,.7),-2px -2px 0 #800000,2px 2px 0 #800000}
.battle-damage.show{animation:dmgPop .9s ease-out forwards}
@keyframes dmgPop{0%{opacity:0;transform:translateY(0) scale(.3) rotate(-10deg)}15%{opacity:1;transform:translateY(-30px) scale(1.3) rotate(5deg)}30%{transform:translateY(-25px) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-100px) scale(.7)}}
.battle-damage.skill{color:#c080ff;font-size:128px;text-shadow:0 4px 12px rgba(0,0,0,.7),0 0 30px rgba(160,96,224,.4),-2px -2px 0 #4a0080,2px 2px 0 #4a0080}
/* 공격 선택 완료 메시지 */
.battle-select-msg{position:absolute;z-index:35;font-family:'Black Han Sans',sans-serif;font-size:26px;pointer-events:none;opacity:0;letter-spacing:2px}
.battle-select-msg.left{left:30px;bottom:155px;text-shadow:0 2px 10px rgba(255,200,100,.5),0 0 20px rgba(255,160,40,.3)}
.battle-select-msg.right{right:30px;bottom:155px;text-shadow:0 2px 10px rgba(80,160,255,.5),0 0 20px rgba(40,100,255,.3)}
.battle-select-msg.show{animation:selectMsgPop .9s ease-out forwards}
@keyframes selectMsgPop{0%{opacity:0;transform:scale(.3) translateY(10px)}15%{opacity:1;transform:scale(1.2) translateY(-5px)}40%{opacity:1;transform:scale(1)}80%{opacity:.8}100%{opacity:0;transform:translateY(-15px)}}

/* 라운드 시작 연출 */
.battle-round{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);z-index:50;font-family:'Black Han Sans',sans-serif;pointer-events:none;opacity:0}
.battle-round.show{animation:roundIn .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes roundIn{0%{opacity:0;transform:translate(-50%,-50%) scale(3) rotate(-10deg)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(2deg)}50%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
.battle-round-text{font-size:72px;background:linear-gradient(180deg,#fff,#ffe060,#ff8020,#ff2000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 4px 16px rgba(255,120,20,.5))}

/* 히트 이펙트 */
.hit-effect{position:absolute;z-index:25;pointer-events:none;opacity:0}
.hit-effect.show{animation:hitEffectAnim .4s ease-out forwards}
@keyframes hitEffectAnim{0%{opacity:0;transform:scale(.3)}20%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1.8)}}

/* 화면 흔들림 */
.game.screen-shake{animation:screenShake .3s ease-out}
@keyframes screenShake{0%{transform:translate(0)}15%{transform:translate(-8px,4px)}30%{transform:translate(6px,-6px)}45%{transform:translate(-4px,3px)}60%{transform:translate(3px,-2px)}75%{transform:translate(-2px,1px)}100%{transform:translate(0)}}


/* ===== 스킬 컷씬 - 하이퍼 콤보 스타일 ===== */
.skill-cutscene{position:absolute;inset:0;z-index:60;opacity:0;pointer-events:none;overflow:hidden}
.skill-cutscene.show{opacity:1;pointer-events:auto;animation:cutsceneIn .15s ease-out}
@keyframes cutsceneIn{from{opacity:0}to{opacity:1}}

/* 배경 */
.skill-cutscene-bg{position:absolute;inset:0;background:#000;overflow:hidden}
.skill-bg-tint{position:absolute;inset:0;opacity:0;animation:tintPulse 4s ease-in-out}
@keyframes tintPulse{0%{opacity:0}8%{opacity:1}80%{opacity:.7}100%{opacity:0}}

/* 집중선 (이중, 회전) */
.skill-speedlines{position:absolute;inset:-400px;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(255,255,255,.06) 1.5deg,transparent 3deg,transparent 8deg);animation:speedSpin .4s linear infinite}
.skill-speedlines.delayed{animation-delay:-.2s;background:conic-gradient(from 45deg at 50% 50%,transparent 0deg,rgba(255,200,100,.04) 1deg,transparent 2deg,transparent 6deg);animation-duration:.6s}
@keyframes speedSpin{to{transform:rotate(360deg)}}

/* 대각선 슬래시 라인 */
.skill-slash-lines{position:absolute;inset:0}
.skill-slash{position:absolute;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);height:3px;width:200%;left:-50%;transform-origin:center}
.skill-slash.s1{top:30%;transform:rotate(-25deg) scaleX(0);animation:slashIn .3s ease-out .1s forwards}
.skill-slash.s2{top:55%;transform:rotate(-25deg) scaleX(0);animation:slashIn .25s ease-out .2s forwards;height:2px;opacity:.6}
.skill-slash.s3{top:75%;transform:rotate(-25deg) scaleX(0);animation:slashIn .2s ease-out .3s forwards;height:1px;opacity:.4}
@keyframes slashIn{0%{transform:rotate(-25deg) scaleX(0) translateX(-30%)}60%{transform:rotate(-25deg) scaleX(1.2) translateX(10%)}100%{transform:rotate(-25deg) scaleX(0) translateX(50%)}}

/* 중앙 버스트 */
.skill-burst{position:absolute;left:25%;top:30%;width:500px;height:500px;border-radius:50%;transform:scale(0);animation:burstGrow .6s ease-out .1s forwards;filter:blur(40px)}
@keyframes burstGrow{0%{transform:scale(0);opacity:1}60%{transform:scale(1.2);opacity:.5}100%{transform:scale(1.5);opacity:0}}

/* 초상화 영역 */
.skill-portrait-area{position:absolute;left:60px;top:50%;transform:translateY(-50%);z-index:3}

/* 캐릭터 얼굴 - 사이드에서 슬라이드 인 */
.skill-face{width:300px;height:300px;border-radius:12px;display:flex;align-items:center;justify-content:center;border:4px solid;position:relative;overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.8),0 0 80px rgba(0,0,0,.4);
    transform:translateX(-400px) scale(1.3) rotate(-3deg);
    animation:faceSlideIn .35s cubic-bezier(.2,1,.3,1) forwards}
.skill-cutscene.phase2 .skill-face{animation:facePunch .15s ease-out forwards}
@keyframes faceSlideIn{
    0%{transform:translateX(-400px) scale(1.3) rotate(-3deg);opacity:0}
    70%{transform:translateX(20px) scale(1.02) rotate(1deg);opacity:1}
    100%{transform:translateX(0) scale(1) rotate(0);opacity:1}
}
@keyframes facePunch{
    0%{transform:scale(1)}
    50%{transform:scale(1.08) rotate(-1deg)}
    100%{transform:scale(1) rotate(0)}
}
.skill-face::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%);z-index:1;pointer-events:none}
.skill-face::after{content:'';position:absolute;inset:-6px;border-radius:16px;border:2px solid;opacity:.4;animation:faceRing .8s ease-out forwards}
@keyframes faceRing{0%{transform:scale(.95);opacity:.6}100%{transform:scale(1.1);opacity:0}}

/* 얼굴 플래시 (등장 시 화이트아웃) */
.skill-face-flash{position:absolute;left:60px;top:50%;transform:translateY(-50%);width:300px;height:300px;border-radius:12px;border:4px solid;z-index:4;
    background:rgba(255,255,255,.9);opacity:0;animation:faceFlashAnim .5s ease-out .1s forwards;pointer-events:none}
@keyframes faceFlashAnim{0%{opacity:.9}100%{opacity:0}}

/* 텍스트 영역 - 오른쪽 */
.skill-text-area{position:absolute;right:80px;top:50%;transform:translateY(-50%);z-index:3;text-align:right}

/* 뱃지 */
.skill-badge-display{display:inline-block;padding:4px 16px;border-radius:3px;font-size:11px;font-weight:900;letter-spacing:3px;color:#fff;margin-bottom:8px;
    transform:translateX(100px);opacity:0;animation:badgeIn .3s ease-out .15s forwards}
@keyframes badgeIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* 스킬 이름 - 대형 */
.skill-name-display{font-family:'Black Han Sans',sans-serif;font-size:72px;z-index:2;letter-spacing:6px;position:relative;
    transform:translateX(200px) scale(1.5);opacity:0;animation:skillNameSlam .4s cubic-bezier(.2,1,.3,1) .25s forwards;
    -webkit-text-stroke:2px rgba(255,255,255,.3)}
.skill-cutscene.phase2 .skill-name-display{animation:skillNameSlam .4s cubic-bezier(.2,1,.3,1) .25s forwards,namePulse .15s ease-out forwards}
@keyframes skillNameSlam{
    0%{transform:translateX(200px) scale(1.5);opacity:0}
    70%{transform:translateX(-10px) scale(1.02);opacity:1}
    100%{transform:translateX(0) scale(1);opacity:1}
}
@keyframes namePulse{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.skill-name-display::after{content:'';position:absolute;bottom:-6px;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.5;border-radius:2px;
    transform:scaleX(0);animation:nameLineIn .3s ease-out .5s forwards}
@keyframes nameLineIn{to{transform:scaleX(1)}}

/* ===== 스킬 미니 연출 (패시브/소규모 스킬) ===== */
.skill-mini-overlay{position:absolute;inset:0;z-index:95;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:rgba(0,0,0,.6);opacity:0;transition:opacity .1s}
.skill-mini-overlay.show{opacity:1}
.skill-mini-overlay.show .skill-mini-name{animation:miniNameSlam .2s cubic-bezier(.2,1,.3,1) forwards}
.skill-mini-overlay.show .skill-mini-desc{animation:miniDescIn .25s ease-out .1s forwards}
.skill-mini-name{font-family:'Black Han Sans',sans-serif;font-size:64px;letter-spacing:6px;white-space:nowrap;
    -webkit-text-stroke:1px rgba(255,255,255,.2);
    transform:scale(2);opacity:0}
.skill-mini-desc{font-family:'Black Han Sans',sans-serif;font-size:24px;letter-spacing:3px;white-space:nowrap;
    opacity:0}
@keyframes miniNameSlam{
    0%{transform:scale(2.5) rotate(-3deg);opacity:0}
    50%{transform:scale(.95) rotate(1deg);opacity:1}
    100%{transform:scale(1) rotate(0);opacity:1}
}
@keyframes miniDescIn{
    from{transform:translateY(10px);opacity:0}
    to{transform:translateY(0);opacity:.9}
}

/* 스킬 효과 설명 */
.skill-desc-display{font-family:'Black Han Sans',sans-serif;font-size:28px;letter-spacing:2px;margin-top:12px;z-index:2;position:relative;
    transform:translateX(150px);opacity:0;animation:descSlideIn .35s cubic-bezier(.2,1,.3,1) .4s forwards;
    text-shadow:0 2px 8px rgba(0,0,0,.9)}
@keyframes descSlideIn{
    0%{transform:translateX(150px);opacity:0}
    70%{transform:translateX(-5px);opacity:1}
    100%{transform:translateX(0);opacity:1}
}
/* 페이드아웃 단계 */
.skill-cutscene.phase-fadeout .skill-name-display,
.skill-cutscene.phase-fadeout .skill-desc-display,
.skill-cutscene.phase-fadeout .skill-badge-display{animation:textFadeOut .4s ease-in forwards}
@keyframes textFadeOut{to{opacity:0;transform:translateY(-10px)}}

/* 텍스트 흔들림 (0.2초 임팩트 셰이크) */
.skill-name-display.shake{animation:textImpactShake .2s ease-out!important}
.skill-desc-display.shake{animation:textImpactShake .2s ease-out .05s!important}
@keyframes textImpactShake{
    0%{transform:translate(0,0)}
    15%{transform:translate(-6px,3px)}
    30%{transform:translate(5px,-2px)}
    45%{transform:translate(-4px,-3px)}
    60%{transform:translate(3px,2px)}
    75%{transform:translate(-2px,-1px)}
    100%{transform:translate(0,0)}
}

/* 잉크 스플래시 (길티기어 스타일) */
.skill-ink-splash{position:absolute;inset:-100px;z-index:2;pointer-events:none;opacity:0;
    clip-path:polygon(0% 35%,15% 20%,25% 40%,40% 15%,55% 35%,65% 10%,80% 30%,90% 20%,100% 45%,85% 60%,100% 75%,80% 85%,60% 70%,45% 90%,30% 75%,15% 85%,0% 65%);
    transform:scale(0);filter:blur(2px)}
.skill-ink-splash.splash{animation:inkSplash .5s cubic-bezier(.2,1,.3,1) forwards}
@keyframes inkSplash{
    0%{transform:scale(0) rotate(-10deg);opacity:.8}
    50%{transform:scale(1.3) rotate(2deg);opacity:.5}
    100%{transform:scale(1.5) rotate(0deg);opacity:0}
}

/* 이름 그림자 (뒤에 큰 글자) */
.skill-name-shadow{font-family:'Black Han Sans',sans-serif;font-size:120px;position:absolute;right:-30px;top:50%;transform:translateY(-50%);opacity:.06;letter-spacing:10px;z-index:1;white-space:nowrap}

/* 스킬 플래시 오버레이 - 강화 */
.skill-flash-overlay{position:absolute;inset:0;z-index:5;background:#fff;opacity:0;pointer-events:none}
.skill-flash-overlay.flash{animation:skillFlash .15s ease-out forwards}
@keyframes skillFlash{0%{opacity:.9}100%{opacity:0}}

/* 스파크 캔버스 */
.skill-spark-canvas{position:absolute;inset:0;z-index:4;pointer-events:none}

/* 스킬 이름 더 크게 (길티기어 스타일) */
.skill-cutscene.phase2 .skill-name-display{font-size:88px;animation:skillNameSlam .4s cubic-bezier(.2,1,.3,1) .25s forwards,namePulse .15s ease-out forwards}

/* KO 연출 */
.battle-ko{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);z-index:55;pointer-events:none;opacity:0}
.battle-ko.show{animation:koIn 1s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes koIn{0%{opacity:0;transform:translate(-50%,-50%) scale(5) rotate(-15deg)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(3deg)}50%{transform:translate(-50%,-50%) scale(1) rotate(0)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.battle-ko-text{font-family:'Black Han Sans',sans-serif;font-size:90px;background:linear-gradient(180deg,#fff,#ffe040,#ff6020,#cc0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 6px 20px rgba(255,60,20,.6));letter-spacing:8px}

/* ===== 결과 화면 (KOF 2002 UM 스타일) ===== */
.result-bg{position:absolute;inset:0;transition:background .3s}

/* 대각선 컬러 슬래시 */
.result-color-slash{position:absolute;inset:0;z-index:1;opacity:0;animation:slashFadeIn .8s ease-out .2s forwards}
@keyframes slashFadeIn{to{opacity:1}}

/* 집중선 */
.result-speedlines{position:absolute;inset:-400px;z-index:2;animation:resultSpeedSpin 3s linear infinite;opacity:.5}
@keyframes resultSpeedSpin{to{transform:rotate(360deg)}}

/* 승리자 영역 (왼쪽 대형) */
.result-winner-area{position:absolute;left:40px;top:50%;transform:translateY(-50%);z-index:10;width:400px;height:400px;display:flex;align-items:center;justify-content:center;transform-origin:center center}
.result-winner-pet{position:relative;z-index:2}
.result-winner-glow{position:absolute;inset:-80px;z-index:1;border-radius:50%;
    opacity:0;animation:glowPulse 2s ease-in-out .3s infinite}
@keyframes glowPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.1)}}
/* 패배자 쓰러진 상태 */
.result-loser-area{position:absolute;left:100px;bottom:60px;z-index:5;width:200px;height:200px;display:flex;align-items:center;justify-content:center;opacity:0;animation:loserAppear .5s ease-out .8s forwards}
@keyframes loserAppear{to{opacity:1}}

/* 오른쪽 텍스트 영역 */
.result-text-area{position:absolute;right:80px;top:50%;transform:translateY(-50%);z-index:10;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px}

/* WINNER 뱃지 */
.result-badge{display:inline-block;padding:4px 20px;border-radius:3px;font-family:'Black Han Sans',sans-serif;font-size:14px;font-weight:900;letter-spacing:6px;color:#fff;
    transform:translateX(100px);opacity:0;animation:badgeIn .3s ease-out .3s forwards}

/* 승리자 이름 (대형) */
.result-winner-name{font-family:'Black Han Sans',sans-serif;font-size:64px;letter-spacing:6px;z-index:2;
    transform:translateX(200px) scale(1.3);opacity:0;
    animation:resultNameIn .5s cubic-bezier(.2,1,.3,1) .4s forwards;
    -webkit-text-stroke:1px rgba(255,255,255,.2)}
@keyframes resultNameIn{
    0%{transform:translateX(200px) scale(1.3);opacity:0}
    70%{transform:translateX(-10px) scale(1.02);opacity:1}
    100%{transform:translateX(0) scale(1);opacity:1}
}

/* YOU WIN / YOU LOSE 타이틀 */
.result-title-kof{font-family:'Black Han Sans',sans-serif;font-size:100px;letter-spacing:10px;z-index:2;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 6px 24px rgba(0,0,0,.6));
    transform:scale(3) rotate(-5deg);opacity:0;
    animation:kofTitleSlam .5s cubic-bezier(.2,1,.3,1) .6s forwards}
@keyframes kofTitleSlam{
    0%{transform:scale(3) rotate(-5deg);opacity:0}
    60%{transform:scale(.95) rotate(1deg);opacity:1}
    80%{transform:scale(1.05) rotate(-0.5deg)}
    100%{transform:scale(1) rotate(0);opacity:1}
}

/* 설명 텍스트 */
.result-desc{font-size:18px;color:#c0b8d8;letter-spacing:2px;
    opacity:0;animation:descFadeIn .4s ease-out .9s forwards}
@keyframes descFadeIn{to{opacity:1}}

/* 버튼 영역 */
.result-buttons{display:flex;gap:12px;margin-top:16px;
    opacity:0;animation:descFadeIn .4s ease-out 1.1s forwards}
.result-btn{padding:16px 60px;font-family:'Black Han Sans',sans-serif;font-size:20px;border:none;border-radius:8px;cursor:pointer;letter-spacing:4px;transition:all .2s}
.result-btn.next{background:linear-gradient(180deg,#ffc040,#e08010);color:#1a0800;box-shadow:0 4px 16px rgba(255,192,64,.3)}
.result-btn.retry{background:linear-gradient(180deg,#606080,#404060);color:#e0e0e0}
.result-btn:hover{transform:translateY(-3px)}

/* 결과 플래시 */
.result-flash{position:absolute;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none}
.result-flash.flash{animation:resultFlash .3s ease-out forwards}
@keyframes resultFlash{0%{opacity:.9}100%{opacity:0}}

/* ===== SVG 펫 부위별 애니메이션 ===== */
/* 기본: SVG 내부 그룹에 transform-box 적용 */
.pet-svg g{transform-box:fill-box}

/* idle - 부위별 미세 동작 */
.battle-pet.idle .pet-head{animation:headBob 2.5s ease-in-out infinite}
.battle-pet.idle .pet-tail{animation:tailWag 1.8s ease-in-out infinite}
.battle-pet.idle .pet-arm-l{animation:armSwayL 3.2s ease-in-out infinite}
.battle-pet.idle .pet-arm-r{animation:armSwayR 3.2s ease-in-out infinite .4s}
.battle-pet.idle .pet-tongue{animation:tongueFlick 2s ease-in-out infinite}
.battle-pet.idle .pet-effect{animation:effectPulse 2s ease-in-out infinite}

@keyframes headBob{
    0%,100%{transform:translateY(0) rotate(0deg)}
    50%{transform:translateY(-3px) rotate(.5deg)}
}
@keyframes tailWag{
    0%,100%{transform:rotate(0deg)}
    25%{transform:rotate(6deg)}
    75%{transform:rotate(-4deg)}
}
@keyframes armSwayL{
    0%,100%{transform:rotate(0deg)}
    50%{transform:rotate(-3deg)}
}
@keyframes armSwayR{
    0%,100%{transform:rotate(0deg)}
    50%{transform:rotate(3deg)}
}
@keyframes tongueFlick{
    0%,40%,100%{transform:scaleY(1)}
    45%{transform:scaleY(0)}
    50%{transform:scaleY(1.2)}
}
@keyframes effectPulse{
    0%,100%{opacity:.8}
    50%{opacity:1}
}

/* ===== 공격 포즈 - 바위 ===== */
.battle-pet.atk-punch{animation:punchLunge .4s cubic-bezier(.4,0,.2,1) !important}
.battle-pet.atk-punch .pet-arm-l{animation:punchArmL .4s cubic-bezier(.2,1,.3,1) forwards !important}
.battle-pet.atk-punch .pet-arm-r{animation:punchArmR .4s ease-out forwards !important}
.battle-pet.atk-punch .pet-body{animation:punchBody .4s ease-out forwards !important}
.battle-pet.atk-punch .pet-head{animation:punchHead .4s ease-out forwards !important}
@keyframes punchLunge{
    0%{transform:translateX(0)}20%{transform:translateX(-10px)}
    50%{transform:translateX(30px)}100%{transform:translateX(0)}
}
@keyframes punchArmL{
    0%{transform:rotate(0deg)}20%{transform:rotate(40deg) translateY(-10px)}
    45%{transform:rotate(-50deg) translateX(30px) translateY(-5px)}100%{transform:rotate(0deg)}
}
@keyframes punchArmR{
    0%{transform:rotate(0deg)}30%{transform:rotate(15deg) translateY(-5px)}100%{transform:rotate(0deg)}
}
@keyframes punchBody{

@keyframes punchHead{

}

/* ===== 공격 포즈 - 가위 ===== */
.battle-pet.atk-kick{animation:kickLunge .45s cubic-bezier(.4,0,.2,1) !important}
.battle-pet.atk-kick .pet-leg{animation:kickLeg .45s cubic-bezier(.2,1,.3,1) forwards !important}
.battle-pet.atk-kick .pet-body{animation:kickBody .45s ease-out forwards !important}
.battle-pet.atk-kick .pet-head{animation:kickHead .45s ease-out forwards !important}
@keyframes kickLunge{
    0%{transform:translateX(0) translateY(0)}20%{transform:translateX(-8px) translateY(5px)}
    50%{transform:translateX(25px) translateY(-8px)}100%{transform:translateX(0) translateY(0)}
}
@keyframes kickLeg{
    0%{transform:translateX(0) translateY(0)}
    30%{transform:translateX(-5px) translateY(5px)}
    55%{transform:translateX(35px) translateY(-15px) rotate(-10deg)}
    100%{transform:translateX(0) translateY(0) rotate(0deg)}
}
@keyframes kickBody{
    0%{transform:rotate(0deg)}30%{transform:rotate(8deg)}55%{transform:rotate(-12deg) translateX(5px)}100%{transform:rotate(0deg)}
}
@keyframes kickHead{
    0%{transform:translateY(0)}30%{transform:translateY(3px)}55%{transform:translateY(-5px) translateX(8px)}100%{transform:translateY(0) translateX(0)}
}

/* ===== 공격 포즈 - 보 ===== */

.battle-pet.atk-fly .pet-leg{animation:flyLeg .5s cubic-bezier(.2,1,.3,1) forwards !important}
.battle-pet.atk-fly .pet-arm-l,.battle-pet.atk-fly .pet-arm-r{animation:flyArms .5s ease-out forwards !important}
.battle-pet.atk-fly .pet-body{animation:flyBody .5s ease-out forwards !important}
@keyframes flyKick{
    0%{transform:translateY(0) translateX(0) rotate(0deg)}
    15%{transform:translateY(10px) translateX(-15px)}
    40%{transform:translateY(-60px) translateX(20px) rotate(-15deg)}
    60%{transform:translateY(-40px) translateX(40px) rotate(10deg)}
    100%{transform:translateY(0) translateX(0) rotate(0deg)}
}
@keyframes flyLeg{
    0%{transform:translateX(0)}40%{transform:translateY(-10px)}
    60%{transform:translateX(40px) translateY(-20px) rotate(-15deg)}100%{transform:translateX(0) translateY(0) rotate(0deg)}
}
@keyframes flyArms{
    0%{transform:rotate(0deg)}30%{transform:rotate(-30deg) translateY(-10px)}
    60%{transform:rotate(20deg)}100%{transform:rotate(0deg)}
}
@keyframes flyBody{
    0%{transform:rotate(0deg)}40%{transform:rotate(-20deg)}60%{transform:rotate(15deg)}100%{transform:rotate(0deg)}
}

/* ===== 피격 - 약한 히트 (기본) ===== */
.battle-pet.hit-react{animation:hitRecoil .4s ease-out !important}
.battle-pet.hit-react .pet-head{animation:hitHeadSnap .4s ease-out !important}
.battle-pet.hit-react .pet-body{animation:hitBodySquash .4s ease-out !important}
.battle-pet.hit-react .pet-arm-l,.battle-pet.hit-react .pet-arm-r{animation:hitArmFlail .4s ease-out !important}
@keyframes hitRecoil{
    0%{transform:translateX(0)}15%{transform:translateX(-20px) rotate(3deg)}
    40%{transform:translateX(-15px) rotate(-2deg)}70%{transform:translateX(5px)}100%{transform:translateX(0) rotate(0deg)}
}
@keyframes hitHeadSnap{
    0%{transform:translateX(0) rotate(0deg)}
    15%{transform:translateX(-12px) rotate(-10deg) scaleY(.9)}

}
@keyframes hitArmFlail{
    0%{transform:rotate(0deg)}15%{transform:rotate(20deg) translateY(5px)}
    40%{transform:rotate(-10deg)}100%{transform:rotate(0deg)}
}

/* ===== 피격 - 강한 히트 (스킬/크리티컬) ===== */
.battle-pet.hit-heavy{animation:hitHeavyRecoil .6s ease-out !important}
.battle-pet.hit-heavy .pet-head{animation:hitHeavyHead .6s ease-out !important}
.battle-pet.hit-heavy .pet-body{animation:hitHeavyBody .6s ease-out !important}
.battle-pet.hit-heavy .pet-arm-l,.battle-pet.hit-heavy .pet-arm-r{animation:hitHeavyArm .6s ease-out !important}

    0%{transform:translateX(0)}
    10%{transform:translateX(-35px) rotate(8deg)}
    25%{transform:translateX(-25px) rotate(-5deg) translateY(-10px)}
    50%{transform:translateX(-15px) rotate(3deg) translateY(0)}
    100%{transform:translateX(0) rotate(0deg)}
}
@keyframes hitHeavyHead{
    0%{transform:rotate(0deg) scaleY(1)}
    10%{transform:rotate(-15deg) scaleY(.8) translateX(-15px)}
    30%{transform:rotate(10deg) scaleY(.85) translateX(-8px)}

    100%{transform:rotate(0deg) scaleY(1) translateX(0)}
}
@keyframes hitHeavyBody{
    0%{transform:scale(1)}10%{transform:scale(.85,.9) translateX(-8px)}
    30%{transform:scale(1.08,.95)}60%{transform:scale(.98,1.02)}100%{transform:scale(1)}
}
@keyframes hitHeavyArm{
    0%{transform:rotate(0deg)}10%{transform:rotate(35deg) translateY(8px)}
    30%{transform:rotate(-20deg) translateY(-5px)}100%{transform:rotate(0deg) translateY(0)}
}

.battle-pet.hit-flash .pet-svg{animation:hitRedFlash .3s ease-out !important}
@keyframes hitRedFlash{
    0%{filter:brightness(1)}15%{filter:brightness(3) saturate(2) hue-rotate(-20deg)}

.battle-pet.victory .pet-head{animation:victoryBounce .4s ease-in-out infinite !important}
.battle-pet.victory .pet-arm-l{animation:victoryArmL .6s ease-in-out infinite !important}
.battle-pet.victory .pet-arm-r{animation:victoryArmR .6s ease-in-out infinite .1s !important}
.battle-pet.victory .pet-tail{animation:victoryTail .3s ease-in-out infinite !important}
@keyframes victoryJump{
    0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}
}
@keyframes victoryBounce{
    0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(5deg)}
}
@keyframes victoryArmL{
    0%,100%{transform:rotate(0deg)}50%{transform:rotate(-40deg) translateY(-15px)}
}
@keyframes victoryArmR{
    0%,100%{transform:rotate(0deg)}50%{transform:rotate(40deg) translateY(-15px)}
}
@keyframes victoryTail{
    0%,100%{transform:rotate(0deg)}25%{transform:rotate(15deg)}75%{transform:rotate(-15deg)}
}

/* ===== 패배 - 다단계 쓰러짐 ===== */
.battle-pet.defeat-stagger{animation:defeatStagger .6s ease-out forwards !important}
.battle-pet.defeat-stagger .pet-head{animation:defeatStaggerHead .6s ease-out forwards !important}
@keyframes defeatStagger{
    0%{transform:translateX(0)}20%{transform:translateX(-15px) rotate(5deg)}
    50%{transform:translateX(10px) rotate(-3deg)}80%{transform:translateX(-8px) rotate(2deg)}
    100%{transform:translateX(-5px)}
}
@keyframes defeatStaggerHead{
    0%{transform:rotate(0deg)}30%{transform:rotate(-8deg) translateY(3px)}
    60%{transform:rotate(5deg) scaleY(.9)}100%{transform:rotate(-3deg) scaleY(.92) translateY(2px)}

.battle-pet.defeat-fall{animation:defeatFall .8s cubic-bezier(.6,0,1,.4) forwards !important}
.battle-pet.defeat-fall .pet-head{animation:defeatFallHead .8s ease-out forwards !important}
.battle-pet.defeat-fall .pet-arm-l,.battle-pet.defeat-fall .pet-arm-r{animation:defeatFallArm .8s ease-out forwards !important}

    0%{transform:translateX(-5px) translateY(0) rotate(0deg);filter:brightness(1)}
    30%{transform:translateX(-10px) translateY(-20px) rotate(-15deg);filter:brightness(.8)}
    60%{transform:translateX(-20px) translateY(10px) rotate(60deg) scaleY(.85);filter:brightness(.5)}
    80%{transform:translateX(-25px) translateY(15px) rotate(75deg) scaleY(.8);filter:brightness(.4)}
    100%{transform:translateX(-30px) translateY(20px) rotate(80deg) scaleY(.75);filter:grayscale(.7) brightness(.4)}
}
@keyframes defeatFallHead{
    0%{transform:rotate(0deg)}40%{transform:rotate(-20deg) scaleY(.8)}
    100%{transform:rotate(-15deg) scaleY(.75) translateY(5px)}
}
@keyframes defeatFallArm{
    0%{transform:rotate(0deg)}50%{transform:rotate(30deg) translateY(10px)}
    100%{transform:rotate(25deg) translateY(15px)}
}

/* 패배 바운스 (바닥에 부딪힘) */
.battle-pet.defeat-bounce{animation:defeatBounce .3s ease-out forwards !important}
@keyframes defeatBounce{
    0%{transform:translateX(-30px) translateY(20px) rotate(80deg) scaleY(.75)}
    50%{transform:translateX(-28px) translateY(12px) rotate(78deg) scaleY(.78)}
    100%{transform:translateX(-30px) translateY(20px) rotate(80deg) scaleY(.75);filter:grayscale(.7) brightness(.35)}
}

/* 패배 최종 상태 */
.battle-pet.defeat-final{
    transform:translateX(-30px) translateY(20px) rotate(80deg) scaleY(.75) !important;
    filter:grayscale(.7) brightness(.35) !important;
    transition:none !important;
}

/* 피격 이모티콘 오버레이 */
.hit-emotion{position:absolute;z-index:30;pointer-events:none;font-size:28px;opacity:0}
.hit-emotion.show{animation:emotionPop .6s ease-out forwards}
@keyframes emotionPop{
    0%{opacity:0;transform:scale(.3) translateY(0)}
    30%{opacity:1;transform:scale(1.3) translateY(-15px)}
    100%{opacity:0;transform:scale(1) translateY(-40px)}
}
/* 패배 별/어지러움 이펙트 */
.defeat-stars{position:absolute;z-index:30;pointer-events:none;opacity:0}
.defeat-stars.show{opacity:1;animation:starsOrbit 1s linear infinite}
@keyframes starsOrbit{to{transform:rotate(360deg)}}

/* 파티클 캔버스 */
.particle-canvas{position:absolute;inset:0;pointer-events:none;z-index:5}

// ===== 게임데이터 (메인 인터페이스) =====
const 게임데이터 = {
    설정: null,
    펫목록: [],
    로딩완료: false,

    // 펫 데이터 정규화 - 빠진 필드를 기본값으로 채움
    펫정규화(원본) {
        const 결과 = {};
        for (const 키 of Object.keys(_펫스키마)) {
            결과[키] = (원본[키] !== undefined && 원본[키] !== null && 원본[키] !== '')
                ? 원본[키] : _펫스키마[키];
        }
        // 엑셀에서 추가된 알 수 없는 필드도 보존
        for (const 키 of Object.keys(원본)) {
            if (!(키 in 결과)) 결과[키] = 원본[키];
        }
        return 결과;
    },

    // 설정 정규화
    설정정규화(원본) {
        const 결과 = {};
        for (const 키 of Object.keys(_설정스키마)) {
            결과[키] = (원본[키] !== undefined && 원본[키] !== null && 원본[키] !== '')
                ? 원본[키] : _설정스키마[키];
        }
        for (const 키 of Object.keys(원본)) {
            if (!(키 in 결과)) 결과[키] = 원본[키];
        }
        return 결과;
    },

    // 내장 데이터로 로드
    async 로드() {
        this.설정 = this.설정정규화(_펫원본데이터.기본설정);
        this.펫목록 = _펫원본데이터.펫목록.map(p => this.펫정규화(p));
        this.로딩완료 = true;
        return true;
    },

    // 외부 데이터 적용 (나중에 엑셀 파싱 결과를 받아서 적용)
    외부데이터적용(데이터) {
        if (데이터.기본설정) {
            this.설정 = this.설정정규화(데이터.기본설정);
        }
        if (데이터.펫목록 && Array.isArray(데이터.펫목록)) {
            this.펫목록 = 데이터.펫목록.map(p => this.펫정규화(p));
        }
        this.로딩완료 = true;
    },

    // 속성 효과 가져오기
    속성가져오기(속성명) {
        return 속성효과[속성명] || 속성효과['불'];
    },

    // 스킬 전체 목록
    스킬목록() {
        return _스킬테이블;
    },

    // 스킬 찾기
    스킬찾기(id) {
        return _스킬테이블.find(s => s.id === id) || null;
    },

    // 펫의 스킬 가져오기
    펫스킬(펫) {
        return [this.스킬찾기(펫.스킬1), this.스킬찾기(펫.스킬2), this.스킬찾기(펫.스킬3)].filter(Boolean);
    },

    // 펫이 특정 스킬ID를 보유하는지
    스킬보유(펫, 스킬id) {
        return 펫.스킬1 === 스킬id || 펫.스킬2 === 스킬id || 펫.스킬3 === 스킬id;
    },

    펫찾기(id) {
        return this.펫목록.find(p => p.id === id);
    },

    랜덤상대(내id) {
        const 후보 = this.펫목록.filter(p => p.id !== 내id);
        return 후보[Math.floor(Math.random() * 후보.length)];
    }
};

        const 오른쪽 = document.getElementById('타이틀오른쪽펫');
        if (!왼쪽 || !오른쪽) return;

        // V자 대형: 리더가 앞쪽 중앙, 나머지가 뒤쪽에 펼쳐짐
        // 리더는 기울임(transform)으로 돌진 자세
        const 왼쪽팀 = [
            { id: 1, 크기: 340, x: 140, y: 10, z: 3, 리더: true, 딜레이: 0.6 },   // 불곰 - 앞쪽
            { id: 7, 크기: 230, x: -20, y: 50, z: 2, 리더: false, 딜레이: 0.9 },  // 독사킹 - 뒤 왼쪽
            { id: 8, 크기: 200, x: 320, y: 60, z: 1, 리더: false, 딜레이: 1.1 },  // 폭탄쥐 - 뒤 오른쪽
        ];
        const 오른쪽팀 = [
            { id: 4, 크기: 340, x: 140, y: 10, z: 3, 리더: true, 딜레이: 0.7 },   // 독수리왕 - 앞쪽
            { id: 5, 크기: 230, x: -20, y: 40, z: 2, 리더: false, 딜레이: 1.0 },  // 그림자고양이 - 뒤 왼쪽
            { id: 6, 크기: 200, x: 320, y: 60, z: 1, 리더: false, 딜레이: 1.2 },  // 철갑거북 - 뒤 오른쪽
        ];

        왼쪽.innerHTML = '';
        오른쪽.innerHTML = '';

        왼쪽팀.forEach(cfg => {
            const 펫 = 게임데이터.펫찾기(cfg.id);
            if (!펫) return;
            const wrap = document.createElement('div');
            wrap.className = 'title-pet-wrap';
            wrap.style.position = 'absolute';
            wrap.style.bottom = cfg.y + 'px';
            wrap.style.left = cfg.x + 'px';
            wrap.style.zIndex = cfg.z;
            wrap.style.setProperty('--delay', cfg.딜레이 + 's');
            wrap.style.setProperty('--dur', cfg.리더 ? '.7s' : '.5s');
            // 리더는 앞으로 살짝 기울임 (돌진 느낌)
            if (cfg.리더) wrap.style.transform = 'rotate(3deg)';

            const el = 펫렌더러.그리기(펫, cfg.크기, false);
            el.classList.add('title-pet-svg');
            wrap.appendChild(el);
            // 바닥 그림자
            const shadow = document.createElement('div');
            shadow.className = 'title-pet-shadow';
            wrap.appendChild(shadow);
            왼쪽.appendChild(wrap);
        });

        오른쪽팀.forEach(cfg => {
            const 펫 = 게임데이터.펫찾기(cfg.id);
            if (!펫) return;
            const wrap = document.createElement('div');
            wrap.className = 'title-pet-wrap';
            wrap.style.position = 'absolute';
            wrap.style.bottom = cfg.y + 'px';
            wrap.style.right = cfg.x + 'px';
            wrap.style.zIndex = cfg.z;
            wrap.style.setProperty('--delay', cfg.딜레이 + 's');
            wrap.style.setProperty('--dur', cfg.리더 ? '.7s' : '.5s');
            if (cfg.리더) wrap.style.transform = 'rotate(-3deg)';

            const el = 펫렌더러.그리기(펫, cfg.크기, true);
            el.classList.add('title-pet-svg');
            wrap.appendChild(el);
            const shadow = document.createElement('div');
            shadow.className = 'title-pet-shadow';
            wrap.appendChild(shadow);
            오른쪽.appendChild(wrap);
        });
    },

    // 타이틀 입장 연출 시퀀스
    async 타이틀연출시작() {
        const 텍스트 = document.getElementById('타이틀텍스트');
        const 임팩트 = document.getElementById('타이틀임팩트');
        const 링 = document.getElementById('타이틀링');
        const 프레스 = document.getElementById('타이틀시작');
        const vs = document.getElementById('타이틀VS');
        const 왼쪽펫들 = document.querySelectorAll('#타이틀왼쪽펫 .title-pet-wrap');
        const 오른쪽펫들 = document.querySelectorAll('#타이틀오른쪽펫 .title-pet-wrap');

        // 초기화
        텍스트.classList.remove('show', 'entrance');
        프레스.classList.remove('show');
        vs.classList.remove('show');
        임팩트.classList.remove('show');
        링.classList.remove('show');
        왼쪽펫들.forEach(el => { el.classList.remove('slide-in-l', 'idle', 'idle-leader'); el.style.opacity = '0'; });
        오른쪽펫들.forEach(el => { el.classList.remove('slide-in-r', 'idle', 'idle-leader'); el.style.opacity = '0'; });

        // 0.3초 대기 (배경만 보임)
        await new Promise(r => setTimeout(r, 300));

        // 1) 타이틀 슬램 등장 + 임팩트 플래시
        텍스트.classList.add('show', 'entrance');
        setTimeout(() => {
            임팩트.classList.add('show');
            링.classList.add('show');
            // 스피드라인 생성
            this._타이틀스피드라인();
        }, 350);

        // 2) 펫들 시차 슬라이드 (타이틀 0.6초 후부터)
        왼쪽펫들.forEach((el, i) => {
            el.classList.add('slide-in-l');
        });
        오른쪽펫들.forEach((el, i) => {
            el.classList.add('slide-in-r');
        });

        // 3) VS 등장 (1.2초 후)
        setTimeout(() => vs.classList.add('show'), 1200);

        // 4) 모든 펫 등장 완료 후 idle 시작 + PRESS START (1.8초 후)
        setTimeout(() => {
            왼쪽펫들.forEach((el, i) => {
                el.style.opacity = '1';
                el.classList.remove('slide-in-l');
                el.classList.add(i === 0 ? 'idle-leader' : 'idle');
                el.style.animationDelay = (i * 0.3) + 's';
            });
            오른쪽펫들.forEach((el, i) => {
                el.style.opacity = '1';
                el.classList.remove('slide-in-r');
                el.classList.add(i === 0 ? 'idle-leader' : 'idle');
                el.style.animationDelay = (i * 0.3 + 0.15) + 's';
            });
            프레스.classList.add('show');
        }, 1800);
    },

    _타이틀스피드라인() {
        const container = document.getElementById('타이틀스피드라인');
        if (!container) return;
        container.innerHTML = '';
        container.classList.remove('show');
        void container.offsetWidth;
        container.classList.add('show');
        for (let i = 0; i < 20; i++) {
            const line = document.createElement('div');
            line.className = 'title-speedline';
            line.style.top = (Math.random() * 720) + 'px';
            line.style.left = (Math.random() * 400 + 440) + 'px';
            line.style.width = (Math.random() * 200 + 100) + 'px';
            line.style.animationDelay = (Math.random() * 0.2) + 's';
            container.appendChild(line);
        }
    },

    타이틀파티클시작() {
        const canvas = document.getElementById('타이틀파티클');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = 1280;
        canvas.height = 720;

        const 입자들 = [];
        // 불꽃 파티클 (위로 올라감)
        for (let i = 0; i < 40; i++) {
            입자들.push({
                x: Math.random() * 1280, y: Math.random() * 720,
                vx: (Math.random() - 0.5) * 0.3, vy: -Math.random() * 1.2 - 0.3,
                크기: Math.random() * 2.5 + 0.5, 투명: Math.random() * 0.4 + 0.1,
                색: ['#ff6030', '#ffc040', '#ff4020'][Math.floor(Math.random() * 3)],
                타입: 'fire'
            });
        }
        // 먼지 파티클 (바닥에서 천천히)
        for (let i = 0; i < 20; i++) {
            입자들.push({
                x: Math.random() * 1280, y: 600 + Math.random() * 120,
                vx: (Math.random() - 0.5) * 0.8, vy: -Math.random() * 0.5 - 0.1,
                크기: Math.random() * 2 + 1, 투명: Math.random() * 0.15 + 0.05,
                색: '#c0a060', 타입: 'dust'
            });
        }
        // 에너지 스파크 (빠르게 흩날림)
        for (let i = 0; i < 15; i++) {
            const 쪽 = Math.random() < 0.5 ? -1 : 1;
            입자들.push({
                x: 640 + 쪽 * (Math.random() * 100), y: 300 + Math.random() * 200,
                vx: 쪽 * (Math.random() * 2 + 1), vy: (Math.random() - 0.5) * 2,
                크기: Math.random() * 1.5 + 0.5, 투명: Math.random() * 0.6 + 0.2,
                색: ['#ffc040', '#fff', '#80c0ff'][Math.floor(Math.random() * 3)],
                타입: 'spark', 수명: Math.random()
            });
        }

        const 그리기 = () => {
            ctx.clearRect(0, 0, 1280, 720);
            입자들.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.타입 === 'fire') {
                    if (p.y < -10) { p.y = 730; p.x = Math.random() * 1280; }
                } else if (p.타입 === 'dust') {
                    if (p.y < 550) { p.y = 650 + Math.random() * 70; p.x = Math.random() * 1280; }
                } else if (p.타입 === 'spark') {
                    p.수명 -= 0.008;
                    if (p.수명 <= 0) {
                        const 쪽 = Math.random() < 0.5 ? -1 : 1;
                        p.x = 640 + 쪽 * (Math.random() * 100);
                        p.y = 300 + Math.random() * 200;
                        p.vx = 쪽 * (Math.random() * 2 + 1);
                        p.vy = (Math.random() - 0.5) * 2;
                        p.수명 = Math.random();
                    }
                    p.투명 = p.수명 * 0.6;
                }
                if (p.x < -10) p.x = 1290;
                if (p.x > 1290) p.x = -10;
                ctx.globalAlpha = p.투명;
                ctx.fillStyle = p.색;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            if (document.getElementById('타이틀화면')?.classList.contains('active')) {
                requestAnimationFrame(그리기);
            }
        };
        그리기();
    },

    인트로표시(펫목록, 콜백) {
        let 중단됨 = false;
        let 애니프레임 = null;
        let 현재컷 = 0;
        let 컷스킵 = null; // 현재 컷의 resolve 함수

        const 플래시 = () => { const el = document.getElementById('인트로플래시'); el.classList.remove('show'); void el.offsetWidth; el.classList.add('show'); };
        const 내레이션 = (텍스트) => {
            const el = document.getElementById('인트로내레이션');
            el.classList.remove('show');
            el.textContent = 텍스트;
            setTimeout(() => el.classList.add('show'), 50);
        };
        const 내레이션숨김 = () => { document.getElementById('인트로내레이션').classList.remove('show'); };
        const 컷전환 = (번호) => {
            현재컷 = 번호;
            for (let i = 1; i <= 4; i++) {
                const el = document.getElementById('인트로컷' + i);
                if (el) { el.classList.toggle('active', i === 번호); if (i !== 번호) el.innerHTML = ''; }
            }
            내레이션숨김();
        };
        // 컷이 끝날 때까지 대기 (클릭하면 즉시 resolve)
        const 컷대기 = () => new Promise(r => { 컷스킵 = r; });

        // 캔버스 배경
        const canvas = document.getElementById('인트로캔버스');
        const ctx = canvas.getContext('2d');
        const 별들 = [];
        for (let i = 0; i < 120; i++) {
            별들.push({ x: Math.random() * 1280, y: Math.random() * 720, 크기: Math.random() * 2 + 0.5,
                밝기: Math.random(), 속도: Math.random() * 0.01 + 0.003, 위상: Math.random() * Math.PI * 2 });
        }
        let 배경밝기 = 0;
        let 프레임 = 0;
        const 캔버스그리기 = () => {
            프레임++;
            ctx.fillStyle = 'rgba(4,2,8,1)';
            ctx.fillRect(0, 0, 1280, 720);
            별들.forEach(s => {
                ctx.globalAlpha = Math.min(1, s.밝기 * (Math.sin(프레임 * s.속도 + s.위상) * 0.4 + 0.6) * 배경밝기);
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(s.x, s.y, s.크기, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 배경밝기 * 0.15;
            const grd = ctx.createRadialGradient(640, 360, 0, 640, 360, 500);
            grd.addColorStop(0, '#2a1860'); grd.addColorStop(1, 'transparent');
            ctx.fillStyle = grd; ctx.fillRect(0, 0, 1280, 720);
            ctx.globalAlpha = 1;
            if (!중단됨) 애니프레임 = requestAnimationFrame(캔버스그리기);
        };
        캔버스그리기();

        // 화면 클릭 → 다음 컷
        const 화면 = document.getElementById('인트로화면');
        const 클릭핸들러 = (e) => {
            if (e.target.closest('.intro-skip')) return; // 건너뛰기 버튼 제외
            if (컷스킵) { const fn = 컷스킵; 컷스킵 = null; fn(); }
        };
        화면.addEventListener('click', 클릭핸들러);

        // 건너뛰기 (전체 스킵)
        document.getElementById('인트로스킵').onclick = () => { 중단됨 = true; 콜백(); };

        // === 각 컷을 함수로 분리 ===
        const 컷1 = async () => {
            컷전환(1);
            배경밝기 = 0;
            const 밝기업 = setInterval(() => { 배경밝기 = Math.min(1, 배경밝기 + 0.02); }, 50);
            setTimeout(() => 내레이션('오래전부터... 이 세계의 동물들에게는 특별한 힘이 깃들어 있었다'), 500);
            await 컷대기(); // 자동 or 클릭
            clearInterval(밝기업); 배경밝기 = 1;
        };
        // CUT1 자동 진행 (3.5초)
        const 컷1자동 = () => setTimeout(() => { if (현재컷 === 1 && 컷스킵) 컷스킵(); }, 3500);

        const 컷2 = async () => {
            컷전환(2);
            const 컷el = document.getElementById('인트로컷2');
            내레이션('불, 전기, 금속, 독... 서로 다른 힘은 충돌을 부른다');
            // 속성 아이콘 한꺼번에 빠르게
            const 속성들 = [
                { 글자: '🔥', 색: '#ff4020', x: 320, y: 280 },
                { 글자: '⚡', 색: '#40a0ff', x: 540, y: 240 },
