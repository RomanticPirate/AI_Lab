            속성들.forEach((a, i) => {
                setTimeout(() => {
                    if (현재컷 !== 2) return;
                    const el = document.createElement('div');
                    el.className = 'intro-elem';
                    el.textContent = a.글자; el.style.left = a.x + 'px'; el.style.top = a.y + 'px'; el.style.color = a.색;
                    컷el.appendChild(el);
                    const ring = document.createElement('div');
                    ring.className = 'intro-elem-ring';
                    ring.style.left = (a.x - 20) + 'px'; ring.style.top = (a.y - 20) + 'px'; ring.style.borderColor = a.색;
                    컷el.appendChild(ring);

            // 실루엣 돌진 (1.8초 후)
            setTimeout(() => {
                if (현재컷 !== 2) return;
                const 왼 = document.createElement('div'); 왼.className = 'intro-sil left';
                왼.appendChild(펫렌더러.그리기(펫목록[0], 250, false)); 컷el.appendChild(왼);

                setTimeout(() => { if (현재컷 === 2) 플래시(); }, 400);
            }, 1800);
            await 컷대기();
        };
        const 컷2자동 = () => setTimeout(() => { if (현재컷 === 2 && 컷스킵) 컷스킵(); }, 3500);

        const 컷3 = async () => {

                <line x1="50" y1="80" x2="10" y2="40" stroke="rgba(255,160,40,.2)" stroke-width="1"/>
                <line x1="450" y1="80" x2="490" y2="40" stroke="rgba(255,160,40,.2)" stroke-width="1"/>
                <rect x="10" y="40" width="480" height="40" rx="4" fill="rgba(30,15,8,.5)" stroke="rgba(255,160,40,.25)" stroke-width="1"/>
                <text x="250" y="130" text-anchor="middle" fill="rgba(255,200,100,.5)" font-size="16" font-weight="bold" letter-spacing="8">ARENA</text>

    VS연출시작(내펫, 상대펫) {
        const VS화면 = document.getElementById('VS화면');
        const 플래시 = document.getElementById('VS플래시');
        const 번개 = document.getElementById('VS번개');

        // Phase 1: 초기 임팩트 플래시 (0ms)
        플래시.classList.add('flash');
        setTimeout(() => 플래시.classList.remove('flash'), 200);

        // Phase 2: 화면 흔들림 + 두 번째 플래시 (300ms)
        setTimeout(() => {
            VS화면.classList.add('vs-shake');
            setTimeout(() => VS화면.classList.remove('vs-shake'), 300);
            플래시.classList.add('flash');
            setTimeout(() => 플래시.classList.remove('flash'), 150);
        }, 300);

        // Phase 3: 번개 이펙트 깜빡임 (500ms~)
        const 번개타이머 = setInterval(() => {
            번개.classList.add('strike');
            setTimeout(() => 번개.classList.remove('strike'), 100);
        }, 800 + Math.random() * 400);

        // 화면 벗어나면 정리
        setTimeout(() => {
            if (!document.getElementById('VS화면')?.classList.contains('active')) {
                clearInterval(번개타이머);
            }
        }, 10000);

        // Phase 4: 주기적 미세 흔들림 (긴장감)
        const 흔들림 = setInterval(() => {
            if (!document.getElementById('VS화면')?.classList.contains('active')) {
                clearInterval(흔들림);
                clearInterval(번개타이머);
                return;
            }
            VS화면.classList.add('vs-micro-shake');
            setTimeout(() => VS화면.classList.remove('vs-micro-shake'), 150);
        }, 2000);
    },

    VS파티클시작(왼색, 오색) {
        const canvas = document.getElementById('VS파티클');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = 1280;
        canvas.height = 720;
        const 입자들 = [];
        // 중앙 충돌 스파크
        for (let i = 0; i < 60; i++) {
            const 각 = Math.random() * Math.PI * 2;
            const 속도 = 1 + Math.random() * 5;
            입자들.push({
                ox: 640, oy: 360,
                x: 640, y: 360,
                vx: Math.cos(각) * 속도,
                vy: Math.sin(각) * 속도,
                크기: Math.random() * 2.5 + 0.5,
                수명: 1,
                감쇠: 0.008 + Math.random() * 0.012,
                색: [왼색 || '#ff4020', 오색 || '#4080ff', '#fff', '#ffe080'][Math.floor(Math.random() * 4)],
                종류: 'spark'
            });
        }
        // 양쪽 대립 에너지 입자
        for (let i = 0; i < 30; i++) {
            입자들.push({
                ox: 0, oy: 0,
                x: Math.random() * 300, y: Math.random() * 720,
                vx: 2 + Math.random() * 3, vy: (Math.random() - 0.5) * 2,
                크기: Math.random() * 3 + 1,
                수명: 1, 감쇠: 0.003,
                색: 왼색 || '#ff4020', 종류: 'energy'
            });
            입자들.push({
                ox: 0, oy: 0,
                x: 980 + Math.random() * 300, y: Math.random() * 720,
                vx: -(2 + Math.random() * 3), vy: (Math.random() - 0.5) * 2,
                크기: Math.random() * 3 + 1,
                수명: 1, 감쇠: 0.003,
                색: 오색 || '#4080ff', 종류: 'energy'
            });
        }

        const 그리기 = () => {
            ctx.clearRect(0, 0, 1280, 720);
            입자들.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.수명 -= p.감쇠;

                if (p.종류 === 'spark') {
                    if (p.수명 <= 0) {
                        p.x = 640 + (Math.random() - 0.5) * 80;
                        p.y = 360 + (Math.random() - 0.5) * 80;
                        const 각 = Math.random() * Math.PI * 2;
                        const 속도 = 1 + Math.random() * 5;
                        p.vx = Math.cos(각) * 속도;
                        p.vy = Math.sin(각) * 속도;
                        p.수명 = 1;
                    }
                    ctx.globalAlpha = p.수명 * 0.8;
                    ctx.fillStyle = p.색;
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = p.색;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    if (p.x < -20 || p.x > 1300 || p.수명 <= 0) {
                        p.x = p.vx > 0 ? Math.random() * 200 : 1080 + Math.random() * 200;
                        p.y = Math.random() * 720;
                        p.수명 = 1;
                    }
                    ctx.globalAlpha = p.수명 * 0.5;
                    ctx.fillStyle = p.색;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.색;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2);
                    ctx.fill();
                    // 꼬리
                    ctx.globalAlpha = p.수명 * 0.2;
                    ctx.strokeStyle = p.색;
                    ctx.lineWidth = p.크기 * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 4, p.y - p.vy * 4);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            });
            ctx.globalAlpha = 1;
            if (document.getElementById('VS화면')?.classList.contains('active')) {
                requestAnimationFrame(그리기);
            }
        };
        그리기();
    },

    전투초기화(내펫, 상대펫) {
        // 이름
        document.getElementById('전투왼쪽이름').textContent = 내펫.이름;
        document.getElementById('전투왼쪽이름').style.color = 내펫.색상;
        document.getElementById('전투오른쪽이름').textContent = 상대펫.이름;
        document.getElementById('전투오른쪽이름').style.color = 상대펫.색상;

        // 캐릭터 배치 (크게!)
        const 왼쪽 = document.getElementById('전투왼쪽펫');
        const 오른쪽 = document.getElementById('전투오른쪽펫');
        // 오라/그림자는 유지하면서 펫 SVG만 교체
        const 왼쪽오라 = 왼쪽.querySelector('.battle-pet-aura');
        const 왼쪽그림자 = 왼쪽.querySelector('.battle-pet-shadow');
        const 오른쪽오라 = 오른쪽.querySelector('.battle-pet-aura');
        const 오른쪽그림자 = 오른쪽.querySelector('.battle-pet-shadow');
        왼쪽.innerHTML = '';
        오른쪽.innerHTML = '';
        왼쪽.appendChild(펫렌더러.그리기(내펫, 320, false));
        if (왼쪽오라) { 왼쪽오라.style.background = 내펫.색상; 왼쪽.appendChild(왼쪽오라); }
        if (왼쪽그림자) 왼쪽.appendChild(왼쪽그림자);
        오른쪽.appendChild(펫렌더러.그리기(상대펫, 320, true));
        if (오른쪽오라) { 오른쪽오라.style.background = 상대펫.색상; 오른쪽.appendChild(오른쪽오라); }
        if (오른쪽그림자) 오른쪽.appendChild(오른쪽그림자);
        // 상태 클래스 리셋 + 아이들 애니메이션 활성화
        ['idle','victory','defeat','hit-react','atk-punch','atk-kick','atk-fly'].forEach(c => {
            왼쪽.classList.remove(c);
            오른쪽.classList.remove(c);
        });
        왼쪽.classList.add('idle');
        오른쪽.classList.add('idle');

        // 플레이어 대미지 표시
        document.getElementById('바위대미지표시').textContent = `대미지: ${내펫.바위대미지}`;
        document.getElementById('가위대미지표시').textContent = `대미지: ${내펫.가위대미지}`;
        document.getElementById('보대미지표시').textContent = `대미지: ${내펫.보대미지}`;

        // 적 대미지 표시
        document.getElementById('적바위대미지표시').textContent = `대미지: ${상대펫.바위대미지}`;
        document.getElementById('적가위대미지표시').textContent = `대미지: ${상대펫.가위대미지}`;
        document.getElementById('적보대미지표시').textContent = `대미지: ${상대펫.보대미지}`;

        // HP 초기화
        this.HP업데이트('왼쪽', 내펫.HP, 내펫.HP);
        this.HP업데이트('오른쪽', 상대펫.HP, 상대펫.HP);

        // 버튼 활성화
        document.querySelectorAll('.battle-action-btn').forEach(btn => {
            btn.classList.remove('selected', 'disabled');
        });

        // 시스템 버튼 초기화
        document.querySelectorAll('.battle-sys-btn').forEach(btn => {
            btn.style.opacity = '0.5';
            btn.style.borderColor = 'rgba(255,255,255,.06)';
        });

        // 스테이지 배경 시작 (상대 펫 기준)
        스테이지.시작(상대펫);

        // 연출 요소 리셋
        document.getElementById('KO연출')?.classList.remove('show');
        document.getElementById('라운드연출')?.classList.remove('show');
        // 오라 리셋
        document.getElementById('왼쪽오라')?.classList.remove('active');
        document.getElementById('오른쪽오라')?.classList.remove('active');
    },

    HP업데이트(쪽, 현재HP, 최대HP) {
        const 바 = document.getElementById(`전투${쪽}HP`);
        const 잔상 = document.getElementById(`전투${쪽}HP잔상`);
        const 텍스트 = document.getElementById(`전투${쪽}HP텍스트`);
        const 비율 = Math.max(0, 현재HP / 최대HP * 100);
        // 메인 게이지 즉시 감소
        바.style.width = 비율 + '%';
        텍스트.textContent = `${Math.max(0, 현재HP)} / ${최대HP}`;
        // 잔상 게이지 - 0.4초 딜레이 후 0.8초에 걸쳐 천천히 감소
        if (잔상) {
            setTimeout(() => {
                잔상.style.width = 비율 + '%';
            }, 400);
        }
        // low HP 깜빡임
        if (비율 <= 30 && 비율 > 0) {
            바.classList.add('low');
        } else {
            바.classList.remove('low');
        }
    },

    전투메시지표시(텍스트, 색 = '#ffe080') {
        const msg = document.getElementById('전투메시지');
        const txt = document.getElementById('전투메시지텍스트');
        txt.textContent = 텍스트;
        txt.style.color = 색;
        msg.classList.remove('show');
        void msg.offsetWidth; // 리플로우
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 1500);
    },

    전투플래시() {
        const 플래시 = document.getElementById('전투플래시');
        플래시.classList.remove('flash');

    시스템선택표시(선택) {
        document.querySelectorAll('.battle-sys-btn').forEach(btn => {
            if (btn.dataset.sys === 선택) {

    // 스킬 미니 연출 (패시브/소규모 스킬용 — 어두운 배경 + 큰 텍스트 + 흔들림)
    스킬미니연출(이름, 설명, 색) {
        // CSS 클래스 의존 없이 완전 인라인 방식으로 구현
        const 전투화면 = document.getElementById('전투화면');
        if (!전투화면) return;

        // 이전 오버레이 제거
        const 이전 = 전투화면.querySelector('.skill-mini-pop');
        if (이전) 이전.remove();

        // 새 오버레이 생성 (인라인 스타일만 사용)
        const 오버레이 = document.createElement('div');
        오버레이.className = 'skill-mini-pop';
        Object.assign(오버레이.style, {
            position: 'absolute', inset: '0', zIndex: '200',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '8px',
            background: 'rgba(0,0,0,.65)', pointerEvents: 'none',
            opacity: '0', transition: 'opacity .1s'
        });

        // 스킬 이름
        const 이름el = document.createElement('div');
        Object.assign(이름el.style, {
            fontFamily: "'Black Han Sans', sans-serif",
            fontSize: '64px', letterSpacing: '6px', whiteSpace: 'nowrap',
            color: '#fff',
            textShadow: `0 0 30px ${색}, 0 0 60px ${색}80, 0 4px 12px rgba(0,0,0,.9)`,
            WebkitTextStroke: '1px rgba(255,255,255,.2)',
            transform: 'scale(2.5) rotate(-3deg)', opacity: '0',
            transition: 'transform .2s cubic-bezier(.2,1,.3,1), opacity .15s'
        });
        이름el.textContent = 이름;

        // 스킬 설명
        const 설명el = document.createElement('div');
        Object.assign(설명el.style, {
            fontFamily: "'Black Han Sans', sans-serif",
            fontSize: '24px', letterSpacing: '3px', whiteSpace: 'nowrap',
            color: 색,
            textShadow: `0 0 15px ${색}80, 0 2px 6px rgba(0,0,0,.9)`,
            transform: 'translateY(10px)', opacity: '0',
            transition: 'transform .25s ease-out .1s, opacity .25s ease-out .1s'
        });
        설명el.textContent = 설명;

        오버레이.appendChild(이름el);
        오버레이.appendChild(설명el);
        전투화면.appendChild(오버레이);

        // 다음 프레임에서 트랜지션 트리거
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                오버레이.style.opacity = '1';
                이름el.style.transform = 'scale(1) rotate(0)';
                이름el.style.opacity = '1';
                설명el.style.transform = 'translateY(0)';
                설명el.style.opacity = '0.9';
            });
        });

        // 플래시 + 흔들림
        this.전투플래시();
        this.화면흔들림();

        // 1.1초 후 제거
        setTimeout(() => {
            오버레이.style.opacity = '0';
            setTimeout(() => 오버레이.remove(), 200);
        }, 1100);
    },

    // 포커싱 전부 제거 (선택 완료 후 뭘 골랐는지 숨김)

        얼굴.style.background = `radial-gradient(ellipse, ${펫.배경색}, #0a0818)`;
        얼굴.style.borderColor = 색;
        얼굴.appendChild(펫렌더러.그리기(펫, 220));
        얼굴플래시.style.borderColor = 색;
        얼굴플래시.style.boxShadow = `0 0 60px ${색}, 0 0 120px ${색}80`;

        이름.textContent = 스킬이름;
        이름.style.color = '#fff';
        이름.style.textShadow = `0 0 20px ${색}, 0 0 40px ${색}80, 0 4px 8px rgba(0,0,0,.8)`;
        그림자.textContent = 스킬이름;
        그림자.style.color = 색;

        // 스킬 효과 설명 세팅
        효과.textContent = 스킬설명;
        효과.style.color = '#fff';
        효과.style.textShadow = `0 0 10px ${색}, 0 2px 4px rgba(0,0,0,.9)`;

        뱃지.style.background = `linear-gradient(90deg, ${색}cc, ${색}60)`;
        뱃지.style.boxShadow = `0 0 20px ${색}40`;

        틴트.style.background = `radial-gradient(ellipse at 30% 50%, ${색}25, transparent 70%)`;
        버스트.style.background = `radial-gradient(circle, ${색}30, ${색}10 30%, transparent 60%)`;

        // 잉크 스플래시 색상 세팅
        잉크.style.background = `radial-gradient(ellipse at 40% 50%, ${색}50, ${색}20 40%, transparent 70%)`;

        // 스파크 파티클 캔버스
        캔버스.width = 1280;
        캔버스.height = 720;
        const ctx = 캔버스.getContext('2d');
        const 속성 = 게임데이터.속성가져오기(펫.속성 || '불');
        const 파티클색 = [...속성.파티클, '#fff', '#ffe080'];
        const 스파크들 = [];

        // 스파크 생성
        for (let i = 0; i < 50; i++) {
            const 각 = Math.random() * Math.PI * 2;
            const 속도 = 3 + Math.random() * 12;
            스파크들.push({
                x: 350, y: 360,
                vx: Math.cos(각) * 속도,
                vy: Math.sin(각) * 속도,
                크기: Math.random() * 3 + 1,
                수명: 0.6 + Math.random() * 0.4,
                감쇠: 0.008 + Math.random() * 0.012,
                색: 파티클색[Math.floor(Math.random() * 파티클색.length)],
                지연: Math.random() * 300
            });
        }

        let 시작시간 = 0;
        const 스파크그리기 = (timestamp) => {
            if (!시작시간) 시작시간 = timestamp;
            const 경과 = timestamp - 시작시간;
            ctx.clearRect(0, 0, 1280, 720);

            스파크들.forEach(s => {
                if (경과 < s.지연) return;
                s.x += s.vx; s.y += s.vy;
                s.vy += 0.1; s.vx *= 0.99;
                s.수명 -= s.감쇠;
                if (s.수명 <= 0) return;

                ctx.globalAlpha = s.수명;
                ctx.fillStyle = s.색;
                ctx.shadowBlur = 6;
                ctx.shadowColor = s.색;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.크기, 0, Math.PI * 2);
                ctx.fill();

                // 꼬리
                ctx.globalAlpha = s.수명 * 0.3;
                ctx.strokeStyle = s.색;
                ctx.lineWidth = s.크기 * 0.5;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.vx * 3, s.y - s.vy * 3);
                ctx.stroke();
            });

            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            if (컷씬.classList.contains('show')) {
                requestAnimationFrame(스파크그리기);
            }
        };

        // 시퀀스 시작
        컷씬.classList.remove('show', 'phase2', 'phase-shake', 'phase-fadeout');
        잉크.classList.remove('splash');
        효과.classList.remove('shake');
        이름.classList.remove('shake');
        void 컷씬.offsetWidth;

        // Phase 1: 히트스톱 + 등장 (0ms) — 길티기어 스타일 임팩트 프리즈
        컷씬.classList.add('show');
        requestAnimationFrame(스파크그리기);

        // 강렬한 초기 플래시 (이중)
        플래시.classList.add('flash');
        setTimeout(() => 플래시.classList.remove('flash'), 150);
        setTimeout(() => { 플래시.classList.add('flash'); setTimeout(() => 플래시.classList.remove('flash'), 100); }, 200);

        // 잉크 스플래시 등장
        setTimeout(() => 잉크.classList.add('splash'), 50);

        // Phase 2: 줌인 + 텍스트 흔들림 (350ms)
        setTimeout(() => {
            컷씬.classList.add('phase2');
            // 이름 + 효과 텍스트 0.2초 흔들림
            이름.classList.add('shake');
            효과.classList.add('shake');
            setTimeout(() => { 이름.classList.remove('shake'); 효과.classList.remove('shake'); }, 200);
            // 세 번째 임팩트 플래시
            플래시.classList.add('flash');
            setTimeout(() => 플래시.classList.remove('flash'), 120);
            // 강한 화면 흔들림
            this.화면흔들림();
            // 추가 흔들림 (연쇄 임팩트)
            setTimeout(() => this.화면흔들림(), 200);
        }, 350);

        // Phase 3: 페이드아웃 시작 (1500ms)
        setTimeout(() => {
            컷씬.classList.add('phase-fadeout');
        }, 1500);

        // Phase 4: 종료 (1900ms)
        setTimeout(() => {
            컷씬.classList.remove('show', 'phase2', 'phase-shake', 'phase-fadeout');
            잉크.classList.remove('splash');
            ctx.clearRect(0, 0, 1280, 720);
            if (콜백) 콜백();
        }, 1900);
    },

    결과표시(승리, 내펫, 상대펫, 다시콜백, 타이틀콜백) {

        // 대각선 컬러 슬래시

        // 집중선

        집중선.style.background = `conic-gradient(from 0deg at 30% 50%, transparent 0deg, ${색}08 1.5deg, transparent 3deg, transparent 8deg)`;

        // 승리자 글로우
        const 글로우 = document.getElementById('결과승자글로우');

        글로우.style.boxShadow = `0 0 120px ${색}30`;

        // 패배자 쓰러진 상태로 렌더링

        const 펫영역 = document.getElementById('결과승자펫');

        펫영역.appendChild(펫렌더러.그리기(승자, 320));

        // 승리자 이름
        const 이름 = document.getElementById('결과승자이름');
        이름.textContent = 승자.이름;
        이름.style.color = 색;
        이름.style.textShadow = `0 0 30px ${색}, 0 0 60px ${색}60, 0 4px 12px rgba(0,0,0,.8)`;

        // 뱃지
        const 뱃지 = document.getElementById('결과뱃지');
        뱃지.style.background = `linear-gradient(90deg, ${색}cc, ${색}60)`;
        뱃지.style.boxShadow = `0 0 20px ${색}40`;

        // 타이틀
        const 타이틀 = document.getElementById('결과타이틀');
        if (승리) {
            타이틀.textContent = 'YOU WIN';
            타이틀.style.background = `linear-gradient(180deg, #fff, ${색}, ${색}80)`;
        } else {
            타이틀.textContent = 'YOU LOSE';
            타이틀.style.background = `linear-gradient(180deg, #fff, ${색}, ${색}80)`;
        }
        타이틀.style.webkitBackgroundClip = 'text';
        타이틀.style.webkitTextFillColor = 'transparent';

        // 설명
        const 설명 = document.getElementById('결과설명');

            설명.textContent = `${승자.이름}이(가) ${패자.이름}을(를) 쓰러뜨렸다!`;
        } else {
            설명.textContent = `${승자.이름}이(가) ${패자.이름}을(를) 쓰러뜨렸다!`;
        }

        // 버튼: 승리 시 자동 다음 상대 / 패배 시 버튼 표시
        const 다시버튼 = document.getElementById('결과다시');
        const 타이틀버튼 = document.getElementById('결과타이틀로');
        if (승리) {

    결과연출시작(색) {
        // 초기 플래시
        const 플래시 = document.getElementById('결과플래시');
        플래시.classList.add('flash');
        setTimeout(() => 플래시.classList.remove('flash'), 300);

        // 두 번째 플래시 (임팩트)
        setTimeout(() => {
            플래시.classList.add('flash');
            setTimeout(() => 플래시.classList.remove('flash'), 200);
        }, 400);

        // 승자 클로즈업 연출 (바스트 샷)
        const 승자영역 = document.getElementById('결과승자영역');
        승자영역.style.transition = 'none';
        승자영역.style.transform = 'scale(0.6) translateX(-100px)';
        승자영역.style.opacity = '0';
        // 빠르게 확대되면서 등장
        requestAnimationFrame(() => {
            승자영역.style.transition = 'transform .5s cubic-bezier(.2,0,.3,1.4), opacity .3s ease-out';
            승자영역.style.transform = 'scale(1.15) translateX(0)';
            승자영역.style.opacity = '1';
        });
        // 약간 줄어들면서 안정
        setTimeout(() => {
            승자영역.style.transition = 'transform .3s ease-out';
            승자영역.style.transform = 'scale(1)';
        }, 500);

        // 파티클 시작
        this.결과파티클시작(색);
    },

    결과파티클시작(색) {
        const canvas = document.getElementById('결과파티클');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = 1280;
        canvas.height = 720;

        // 색상 기반 파티클 팔레트
        const 팔레트 = [색, '#fff', '#ffe080', 색 + '80', '#ffd060'];

        const 입자들 = [];
        // 컨페티 + 스파크 파티클
        for (let i = 0; i < 100; i++) {
            입자들.push({
                x: Math.random() * 1280,
                y: -20 - Math.random() * 300,
                vx: (Math.random() - 0.5) * 3,
                vy: Math.random() * 4 + 1.5,
                크기: Math.random() * 5 + 2,
                색: 팔레트[Math.floor(Math.random() * 팔레트.length)],
                회전: Math.random() * 360,
                회전속도: (Math.random() - 0.5) * 8,
                종류: Math.random() > 0.3 ? 'rect' : 'spark'
            });
        }
        // 승리자 주변 방사형 스파크
        for (let i = 0; i < 30; i++) {
            const 각 = Math.random() * Math.PI * 2;
            const 속도 = 2 + Math.random() * 6;
            입자들.push({
                x: 380, y: 360,
                vx: Math.cos(각) * 속도,
                vy: Math.sin(각) * 속도,
                크기: Math.random() * 3 + 1,
                색: 팔레트[Math.floor(Math.random() * 팔레트.length)],
                회전: 0,
                회전속도: 0,
                종류: 'glow',
                수명: 1.0,
                감쇠: 0.005 + Math.random() * 0.01
            });
        }

        const 그리기 = () => {
            ctx.clearRect(0, 0, 1280, 720);
            입자들.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.회전 += p.회전속도;

                if (p.종류 === 'glow') {
                    p.수명 -= p.감쇠;
                    if (p.수명 <= 0) return;
                    ctx.globalAlpha = p.수명;
                    ctx.fillStyle = p.색;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.색;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (p.종류 === 'spark') {
                    if (p.y > 740) { p.y = -20; p.x = Math.random() * 1280; }
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.회전 * Math.PI / 180);
                    ctx.globalAlpha = 0.8;
                    ctx.fillStyle = p.색;
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = p.색;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.크기 * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.restore();
                } else {
                    if (p.y > 740) { p.y = -20; p.x = Math.random() * 1280; }
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.회전 * Math.PI / 180);
                    ctx.globalAlpha = 0.7;
                    ctx.fillStyle = p.색;
                    ctx.fillRect(-p.크기 / 2, -p.크기 / 2, p.크기, p.크기 * 0.6);
                    ctx.restore();
                }
            });
            ctx.globalAlpha = 1;
            if (document.getElementById('결과화면')?.classList.contains('active')) {
                requestAnimationFrame(그리기);
            }
        };
        그리기();
    }
};

    시작(상대펫) {

                    알파: 0.3 + Math.random() * 0.5,

                });
            }
        } else if (효과 === '번개') {
            // 느리게 떨어지는 빗방울 + 간헐적 번개

                    x: Math.random() * 1280,
                    y: Math.random() * 500,
                    vy: 2 + Math.random() * 3,
                    vx: -0.5,
                    크기: 1 + Math.random() * 2,
                    길이: 8 + Math.random() * 15,

                    알파: 0.15 + Math.random() * 0.2,
                });
            }
            this._번개타이머 = 0;
            this._번개알파 = 0;
            this._번개X = 640;
        } else if (효과 === '안개') {
            // 느리게 흐르는 안개 덩어리
            for (let i = 0; i < 20; i++) {
                this._파티클들.push({
                    x: Math.random() * 1280,
                    y: 200 + Math.random() * 400,
                    vx: 0.2 + Math.random() * 0.4,
                    크기: 60 + Math.random() * 120,
                    색: 색들[Math.floor(Math.random() * 색들.length)],
                    알파: 0.04 + Math.random() * 0.06,
                    흔들림: Math.random() * Math.PI * 2,
                });
            }
        } else if (효과 === '스파크') {
            // 금속 스파크가 튀는 효과
            for (let i = 0; i < 30; i++) {
                this._파티클들.push({
                    x: Math.random() * 1280,
                    y: 400 + Math.random() * 200,
                    vx: (Math.random() - 0.5) * 2,
                    vy: -(1 + Math.random() * 2),
                    크기: 1 + Math.random() * 3,
                    수명: Math.random(),
                    최대수명: 0.5 + Math.random() * 1.5,
                    색: 색들[Math.floor(Math.random() * 색들.length)],
                });
            }
        } else if (효과 === '버블') {
            // 아래에서 올라오는 독 버블
            for (let i = 0; i < 25; i++) {
                this._파티클들.push({
                    x: Math.random() * 1280,
                    y: 500 + Math.random() * 220,
                    vy: -(0.2 + Math.random() * 0.6),
                    크기: 4 + Math.random() * 12,
                    색: 색들[Math.floor(Math.random() * 색들.length)],
                    알파: 0.15 + Math.random() * 0.2,
                    흔들림: Math.random() * Math.PI * 2,
                });
            }
        } else if (효과 === '폭발') {
            // 불꽃 파편이 사방으로
            for (let i = 0; i < 35; i++) {
                this._파티클들.push({
                    x: Math.random() * 1280,
                    y: 300 + Math.random() * 300,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: -(0.5 + Math.random() * 1.5),
                    크기: 2 + Math.random() * 6,
                    색: 색들[Math.floor(Math.random() * 색들.length)],
                    알파: 0.3 + Math.random() * 0.4,
                    흔들림: Math.random() * Math.PI * 2,
                });
            }
        }

        let t = 0;
        const 그리기 = () => {
            ctx.clearRect(0, 0, 1280, 720);
            t += 0.016;

            if (효과 === '용암') {
                // 바닥 용암 글로우
                const grd = ctx.createRadialGradient(640, 720, 0, 640, 720, 500);
                grd.addColorStop(0, 'rgba(180,40,10,.12)');
                grd.addColorStop(0.5, 'rgba(120,20,5,.06)');
                grd.addColorStop(1, 'transparent');
                ctx.fillStyle = grd;
                ctx.fillRect(0, 200, 1280, 520);

                for (const p of this._파티클들) {
                    p.x += p.vx + Math.sin(p.흔들림 + t * 2) * 0.3;
                    p.y += p.vy;
                    ctx.globalAlpha = p.알파 * (1 - Math.max(0, (400 - p.y) / 400));
                    ctx.fillStyle = p.색;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2);
                    ctx.fill();
                    // 글로우
                    ctx.globalAlpha = p.알파 * 0.3;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기 * 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    if (p.y < 200) { p.y = 700 + Math.random() * 50; p.x = Math.random() * 1280; }
                }
            } else if (효과 === '번개') {
                // 빗방울
                for (const p of this._파티클들) {
                    p.x += p.vx;
                    p.y += p.vy;
                    ctx.globalAlpha = p.알파;
                    ctx.strokeStyle = p.색;
                    ctx.lineWidth = p.크기;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + p.vx * 3, p.y + p.길이);
                    ctx.stroke();
                    if (p.y > 550) { p.y = -20; p.x = Math.random() * 1280; }
                }
                // 번개
                this._번개타이머 += 0.016;
                if (this._번개알파 > 0) {
                    this._번개알파 -= 0.04;
                    ctx.globalAlpha = Math.max(0, this._번개알파) * 0.3;
                    ctx.fillStyle = '#a0c0ff';
                    ctx.fillRect(0, 0, 1280, 720);
                    // 번개 줄기
                    ctx.globalAlpha = Math.max(0, this._번개알파) * 0.6;
                    ctx.strokeStyle = '#c0e0ff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    let bx = this._번개X, by = 0;
                    ctx.moveTo(bx, by);
                    for (let s = 0; s < 8; s++) {
                        bx += (Math.random() - 0.5) * 60;
                        by += 50 + Math.random() * 40;
                        ctx.lineTo(bx, by);
                    }
                    ctx.stroke();
                }
                if (this._번개타이머 > 2 + Math.random() * 3) {
                    this._번개타이머 = 0;
                    this._번개알파 = 1;
                    this._번개X = 200 + Math.random() * 880;
                }
            } else if (효과 === '안개') {
                for (const p of this._파티클들) {
                    p.x += p.vx;
                    p.y += Math.sin(p.흔들림 + t * 0.5) * 0.3;
                    ctx.globalAlpha = p.알파;
                    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.크기);
                    grd.addColorStop(0, p.색);
                    grd.addColorStop(1, 'transparent');
                    ctx.fillStyle = grd;
                    ctx.fillRect(p.x - p.크기, p.y - p.크기, p.크기 * 2, p.크기 * 2);
                    if (p.x > 1280 + p.크기) { p.x = -p.크기; p.y = 200 + Math.random() * 400; }
                }
            } else if (효과 === '스파크') {
                for (const p of this._파티클들) {
                    p.수명 += 0.016;
                    if (p.수명 > p.최대수명) {
                        p.수명 = 0;
                        p.x = Math.random() * 1280;
                        p.y = 400 + Math.random() * 200;
                        p.vx = (Math.random() - 0.5) * 2;
                        p.vy = -(1 + Math.random() * 2);
                    }
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05; // 중력
                    const life = 1 - (p.수명 / p.최대수명);
                    ctx.globalAlpha = life * 0.6;
                    ctx.fillStyle = p.색;
                    // 스파크 선
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기 * life, 0, Math.PI * 2);
                    ctx.fill();
                    // 꼬리
                    ctx.globalAlpha = life * 0.2;
                    ctx.strokeStyle = p.색;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 4, p.y - p.vy * 4);
                    ctx.stroke();
                }
            } else if (효과 === '버블') {
                for (const p of this._파티클들) {
                    p.x += Math.sin(p.흔들림 + t * 1.5) * 0.5;
                    p.y += p.vy;
                    ctx.globalAlpha = p.알파;
                    ctx.strokeStyle = p.색;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2);
                    ctx.stroke();
                    // 하이라이트
                    ctx.globalAlpha = p.알파 * 0.5;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(p.x - p.크기 * 0.3, p.y - p.크기 * 0.3, p.크기 * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                    if (p.y < 100) { p.y = 700 + Math.random() * 50; p.x = Math.random() * 1280; }
                }
            } else if (효과 === '폭발') {
                // 바닥 불꽃 글로우
                const grd = ctx.createRadialGradient(640, 600, 0, 640, 600, 400);
                grd.addColorStop(0, `rgba(200,120,20,${0.06 + Math.sin(t * 3) * 0.03})`);
                grd.addColorStop(1, 'transparent');
                ctx.fillStyle = grd;
                ctx.fillRect(0, 200, 1280, 520);

                for (const p of this._파티클들) {
                    p.x += p.vx + Math.sin(p.흔들림 + t * 3) * 0.4;
                    p.y += p.vy;
                    p.vy += 0.02;
                    ctx.globalAlpha = p.알파 * Math.max(0, 1 - Math.max(0, (300 - p.y) / 300));
                    ctx.fillStyle = p.색;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = p.알파 * 0.2;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.크기 * 3, 0, Math.PI * 2);
                    ctx.fill();
                    if (p.y < 100 || p.y > 720) {
                        p.y = 500 + Math.random() * 200;
                        p.x = Math.random() * 1280;
                        p.vy = -(0.5 + Math.random() * 1.5);
                    }
                }
            }

            ctx.globalAlpha = 1;
            if (document.getElementById('전투화면')?.classList.contains('active')) {
                this._raf = requestAnimationFrame(그리기);
            }
        };
        this._raf = requestAnimationFrame(그리기);
    },

    중지() {
        if (this._raf) {
            cancelAnimationFrame(this._raf);
            this._raf = null;
        }
        const canvas = document.getElementById('스테이지캔버스');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 1280, 720);
        }
        // 배경 원래대로
        const bg = document.querySelector('.battle-bg');
        if (bg) bg.style.background = '';
        const arena = document.querySelector('.battle-arena');
        if (arena) arena.style.background = '';
    }
};

// battle.js - 전투 시스템 (스킬 시스템 통합)
const 전투시스템 = {
    내펫: null,
    상대펫: null,
    내HP: 0,
    상대HP: 0,
    내최대HP: 0,
    상대최대HP: 0,
    진행중: false,
    내턴완료: false,
    상대턴완료: false,
    내선택: null,
    상대선택: null,
    상대타이머: null,
    종료콜백: null,
    라운드수: 0,
    파티클상태: null,
    좀비사용_나: false,
    좀비사용_상대: false,

    // 가위바위보 상성: 바위>가위, 가위>보, 보>바위
    상성표: {
        '바위': '가위',
        '가위': '보',
        '보': '바위'
    },

    async 초기화(내펫, 상대펫, 종료콜백) {
        this.내펫 = 내펫;
        this.상대펫 = 상대펫;
        this.내HP = 내펫.HP;
        this.상대HP = 상대펫.HP;
        this.내최대HP = 내펫.HP;
        this.상대최대HP = 상대펫.HP;
        this.진행중 = true;
        this.종료콜백 = 종료콜백;
        this.내턴완료 = false;
        this.상대턴완료 = false;
        this.내선택 = null;
        this.상대선택 = null;
        this.라운드수 = 1;
        this.좀비사용_나 = false;
        this.좀비사용_상대 = false;

        // 화면 초기화
        화면.전투초기화(내펫, 상대펫);

        // 전투 파티클 시작
        this.파티클시작();

        // "대전 시작!" 라운드 연출
        await new Promise(resolve => {
            화면.라운드연출('대전 시작!', resolve);
        });

        // 버튼 이벤트 연결
        this.버튼연결();

        // 상대 AI 시작
        this.상대AI시작();
    },

    버튼연결() {
        const 버튼들 = document.querySelectorAll('.battle-action-btn');
        버튼들.forEach(btn => {
            btn.onclick = () => {
                if (!this.진행중 || this.내턴완료) return;
                if (btn.classList.contains('disabled')) return;

                버튼들.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');

                this.내선택 = btn.dataset.action;
                this.내턴완료 = true;
                버튼들.forEach(b => b.classList.add('disabled'));
                this.선택완료메시지('left');
                this.판정체크();
            };
        });
    },

    선택완료메시지(쪽) {
        const id = 쪽 === 'left' ? '왼쪽선택완료' : '오른쪽선택완료';
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = '공격 선택 완료!';
        el.style.color = 쪽 === 'left' ? '#ffe080' : '#80c0ff';
        el.classList.remove('show');
        void el.offsetWidth;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1200);
    },

    상대AI시작() {
        const 최소 = 게임데이터.설정.시스템선택최소시간;
        const 최대 = 게임데이터.설정.시스템선택최대시간;
        const 시간 = 최소 + Math.random() * (최대 - 최소);

        // 야바위 스타일: 포커싱이 느리게 이동 (눈으로 추적 가능)
        const 버튼들 = document.querySelectorAll('.battle-sys-btn');
        let 커서위치 = 0;
        const 커서속도 = 200; // ms - 눈으로 따라갈 수 있는 속도
        const 깜빡임 = setInterval(() => {
            버튼들.forEach((btn, i) => {
                if (i === 커서위치 % 버튼들.length) {
                    btn.style.opacity = '1';
                    btn.style.borderColor = 'rgba(255,200,100,.6)';
                    btn.style.boxShadow = '0 0 12px rgba(255,200,100,.3)';
                    btn.style.transform = 'scale(1.05)';
                } else {
                    btn.style.opacity = '0.3';
                    btn.style.borderColor = 'rgba(255,255,255,.03)';
                    btn.style.boxShadow = 'none';
                    btn.style.transform = 'scale(1)';
                }
            });
            커서위치++;
        }, 커서속도);

        this.상대타이머 = setTimeout(() => {
            clearInterval(깜빡임);
            const 액션들 = ['바위', '가위', '보'];
            this.상대선택 = 액션들[Math.floor(Math.random() * 3)];
            this.상대턴완료 = true;
            // 선택 완료 → 포커싱 전부 제거 (뭘 골랐는지 숨김)
            화면.시스템포커싱초기화();
            this.선택완료메시지('right');
            this.판정체크();
        }, 시간);
    },

    판정체크() {
        if (!this.내턴완료 || !this.상대턴완료) return;
        setTimeout(() => this.판정실행(), 500);
    },

    // ========== 스킬 헬퍼 ==========
    _스킬보유(펫, 스킬id) {
        return 게임데이터.스킬보유(펫, 스킬id);
    },

    _확률체크(확률) {
        return Math.random() * 100 < 확률;
    },

    // 더블 패시브 매핑: 액션 → 스킬ID
    _더블스킬: { '바위': 1, '가위': 2, '보': 3 },

    // ========== 판정 실행 ==========
    async 판정실행() {
        const 내 = this.내선택;
        const 상대 = this.상대선택;

        // 적군 선택 공개
        화면.시스템선택공개(상대);
        await this.지연(600);

        let 결과;
        if (내 === 상대) {
            결과 = 'draw';
        } else if (this.상성표[내] === 상대) {
            결과 = 'win';
        } else {
            결과 = 'lose';
        }

        const 결과텍스트 = { win: '때렸다!', lose: '맞았다!', draw: '무승부!' };
        const 결과색 = { win: '#40ff60', lose: '#ff4040', draw: '#ffe080' };

        // idle 멈춤
        this.idle토글(false);

        // 공격 애니메이션
        await this.공격애니메이션(결과, 내, 상대);

        // 대미지 계산 및 적용
        if (결과 === 'win') {
            await this.대미지처리(내, this.내펫, this.상대펫, '상대');
        } else if (결과 === 'lose') {
            await this.대미지처리(상대, this.상대펫, this.내펫, '나');
        } else {
            // 무승부: 양쪽 1 대미지 (판이 끝나지 않는 문제 방지)
            this.내HP = Math.max(0, this.내HP - 1);
            this.상대HP = Math.max(0, this.상대HP - 1);
            화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
            화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
            화면.대미지팝업('왼쪽', 1, false);
            화면.대미지팝업('오른쪽', 1, false);
        }

        화면.전투메시지표시(결과텍스트[결과], 결과색[결과]);

        // idle 복귀
        this.idle토글(true);

        // HP 0 체크 (좀비 스킬 포함)
        await this.지연(1200);
        if (await this.종료체크()) return;

        // 다음 라운드
        this.다음라운드();
    },

    // ========== 대미지 처리 (스킬 통합) ==========
    async 대미지처리(액션, 공격펫, 방어펫, 피격대상) {
        // 1) 기본 대미지 산출
        let 대미지;
        switch (액션) {
            case '바위': 대미지 = 공격펫.바위대미지; break;
            case '가위': 대미지 = 공격펫.가위대미지; break;
            case '보': 대미지 = 공격펫.보대미지; break;
            default: 대미지 = 1;
        }

        let 액티브발동 = false;
        let 발동스킬이름 = '';

        // 2) 패시브: 더블 체크 (바위더블/가위더블/보더블) - 확률 적용
        const 더블id = this._더블스킬[액션];
        if (더블id && this._스킬보유(공격펫, 더블id)) {
            const 스킬 = 게임데이터.스킬찾기(더블id);
            if (this._확률체크(스킬.확률)) {
                대미지 *= 2;
                화면.스킬미니연출(스킬.이름, 스킬.설명, 공격펫.색상);
                await this.지연(1200);
            }
        }

        // 3) 액티브: 분노 체크 (HP 30% 이하 + 60%)
        const 공격HP = 피격대상 === '상대' ? this.내HP : this.상대HP;
        const 공격최대HP = 피격대상 === '상대' ? this.내최대HP : this.상대최대HP;
        if (this._스킬보유(공격펫, 7) && 공격HP <= 공격최대HP * 0.3) {
            const 스킬 = 게임데이터.스킬찾기(7);
            if (this._확률체크(스킬.확률)) {
                대미지 *= 3;
                액티브발동 = true;
                발동스킬이름 = 스킬.이름;
            }
        }

        // 3-1) 액티브: 폭주 체크 (조건 없이 30% 확률 대미지 3배)
        if (!액티브발동 && this._스킬보유(공격펫, 11)) {
            const 스킬 = 게임데이터.스킬찾기(11);
            if (this._확률체크(스킬.확률)) {
                대미지 *= 스킬.배율;
                액티브발동 = true;
                발동스킬이름 = 스킬.이름;
            }
        }

        // 3-2) 액티브: 급강하 체크 (30% 확률 대미지 2배)
        if (!액티브발동 && this._스킬보유(공격펫, 13)) {
            const 스킬 = 게임데이터.스킬찾기(13);
            if (this._확률체크(스킬.확률)) {
                대미지 *= 스킬.배율;
                액티브발동 = true;
                발동스킬이름 = 스킬.이름;
            }
        }

        // 3-3) 액티브: 회피 체크 (방어측 30% 확률 대미지 0)
        let 회피발동 = false;
        if (this._스킬보유(방어펫, 14)) {
            const 스킬 = 게임데이터.스킬찾기(14);
            if (this._확률체크(스킬.확률)) {
                대미지 = 0;
                회피발동 = true;
                this.오라활성화(피격대상 === '나' ? 'left' : 'right');
                await new Promise(resolve => {
                    화면.스킬컷씬표시(방어펫, 스킬.이름, resolve);
                });

        }

        // 4) 패시브: 철벽 체크 (방어측, 회피 시 스킵) - 확률 적용
        if (!회피발동 && this._스킬보유(방어펫, 4)) {
            const 스킬 = 게임데이터.스킬찾기(4);
            if (this._확률체크(스킬.확률)) {
                대미지 = Math.max(1, 대미지 - 1);
                화면.스킬미니연출(스킬.이름, 스킬.설명, 방어펫.색상);

        if (액티브발동) {

            await new Promise(resolve => {

        // 6) 대미지 적용 - 히트이펙트는 맞는 쪽(방어자) 위치에 표시
        화면.화면흔들림();
        화면.전투플래시();
        const 충돌X = 피격대상 === '나' ? 180 : 1060;
        화면.히트이펙트(충돌X, 220);
        this.히트스파크(충돌X, 220, 액티브발동, 공격펫);
        // 액티브 발동 시 추가 임팩트
        if (액티브발동) {
            await this.지연(100);
            화면.전투플래시();
            화면.화면흔들림();
            this.히트스파크(충돌X + (Math.random()-0.5)*40, 220 + (Math.random()-0.5)*30, true, 공격펫);
        }

        if (피격대상 === '나') {
            this.내HP = Math.max(0, this.내HP - 대미지);
            화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
            화면.대미지팝업('왼쪽', 대미지, 액티브발동);
            this.히트애니메이션('왼쪽', 액티브발동 || 대미지 >= 4);
        } else {
            this.상대HP = Math.max(0, this.상대HP - 대미지);
            화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
            화면.대미지팝업('오른쪽', 대미지, 액티브발동);
            this.히트애니메이션('오른쪽', 액티브발동 || 대미지 >= 4);
        }

        if (액티브발동) {
            setTimeout(() => this.오라비활성화(), 800);
        }

        await this.지연(300);

        // 7) 패시브: 흡혈 (공격측 HP 2 회복) - 확률 적용
        if (this._스킬보유(공격펫, 5)) {
            const 스킬 = 게임데이터.스킬찾기(5);
            if (this._확률체크(스킬.확률)) {
                if (피격대상 === '상대') {
                    this.내HP = Math.min(this.내최대HP, this.내HP + 2);
                    화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                } else {
                    this.상대HP = Math.min(this.상대최대HP, this.상대HP + 2);
                    화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                }
                화면.스킬미니연출(스킬.이름, 'HP +2 회복!', 공격펫.색상);
                await this.지연(1200);
            }
        }

        // 8) 액티브: 연속타 (35% 확률로 추가 2 대미지)
        if (this._스킬보유(공격펫, 8)) {
            const 스킬 = 게임데이터.스킬찾기(8);
            if (this._확률체크(스킬.확률)) {
                const 추가대미지 = 스킬.대미지 || 2;
                화면.스킬미니연출(스킬.이름, `추가 ${추가대미지} 대미지!`, 공격펫.색상);
                await this.지연(1000);
                화면.화면흔들림();
                this.히트스파크(충돌X, 220, true, 공격펫);
                if (피격대상 === '나') {
                    this.내HP = Math.max(0, this.내HP - 추가대미지);
                    화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                    화면.대미지팝업('왼쪽', 추가대미지, true);
                } else {
                    this.상대HP = Math.max(0, this.상대HP - 추가대미지);
                    화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                    화면.대미지팝업('오른쪽', 추가대미지, true);
                }
                await this.지연(400);
            }
        }

        // 9) 액티브: 카운터 (방어측 40% 확률로 반격 2 대미지)
        if (this._스킬보유(방어펫, 9)) {
            const 스킬 = 게임데이터.스킬찾기(9);
            if (this._확률체크(스킬.확률)) {
                const 반격대미지 = 스킬.대미지 || 2;
                화면.스킬미니연출(스킬.이름, `반격 ${반격대미지} 대미지!`, 방어펫.색상);
                await this.지연(1000);
                화면.화면흔들림();
                const 반격X = 피격대상 === '나' ? 1060 : 180;
                this.히트스파크(반격X, 220, true, 방어펫);
                if (피격대상 === '나') {
                    this.상대HP = Math.max(0, this.상대HP - 반격대미지);
                    화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                    화면.대미지팝업('오른쪽', 반격대미지, true);
                } else {
                    this.내HP = Math.max(0, this.내HP - 반격대미지);
                    화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                    화면.대미지팝업('왼쪽', 반격대미지, true);
                }
                await this.지연(400);
            }
        }

        // 10) 액티브: 불굴 (방어측 40% 확률 HP 3 회복)
        if (!회피발동 && this._스킬보유(방어펫, 12)) {
            const 스킬 = 게임데이터.스킬찾기(12);
            if (this._확률체크(스킬.확률)) {
                const 회복량 = 스킬.회복량 || 3;
                this.오라활성화(피격대상 === '나' ? 'left' : 'right');
                await new Promise(resolve => {
                    화면.스킬컷씬표시(방어펫, 스킬.이름, resolve);
                });
                if (피격대상 === '나') {
                    this.내HP = Math.min(this.내최대HP, this.내HP + 회복량);
                    화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                } else {
                    this.상대HP = Math.min(this.상대최대HP, this.상대HP + 회복량);
                    화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                }
                setTimeout(() => this.오라비활성화(), 800);
                await this.지연(400);
            }
        }

        // 11) 액티브: 반사 (방어측 25% 확률 받은 대미지 반격)
        if (!회피발동 && 대미지 > 0 && this._스킬보유(방어펫, 15)) {
            const 스킬 = 게임데이터.스킬찾기(15);
            if (this._확률체크(스킬.확률)) {
                const 반사대미지 = 대미지;
                this.오라활성화(피격대상 === '나' ? 'left' : 'right');
                await new Promise(resolve => {
                    화면.스킬컷씬표시(방어펫, 스킬.이름, resolve);
                });
                화면.화면흔들림();
                const 반격X = 피격대상 === '나' ? 1060 : 180;
                this.히트스파크(반격X, 220, true, 방어펫);
                if (피격대상 === '나') {
                    this.상대HP = Math.max(0, this.상대HP - 반사대미지);
                    화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                    화면.대미지팝업('오른쪽', 반사대미지, true);
                } else {
                    this.내HP = Math.max(0, this.내HP - 반사대미지);
                    화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                    화면.대미지팝업('왼쪽', 반사대미지, true);
                }
                setTimeout(() => this.오라비활성화(), 800);
                await this.지연(400);
            }
        }

        // 12) 액티브: 탈피 (방어측 35% 확률 HP 2 회복)
        if (!회피발동 && this._스킬보유(방어펫, 16)) {
            const 스킬 = 게임데이터.스킬찾기(16);
            if (this._확률체크(스킬.확률)) {
                const 회복량 = 스킬.회복량 || 2;
                this.오라활성화(피격대상 === '나' ? 'left' : 'right');
                await new Promise(resolve => {
                    화면.스킬컷씬표시(방어펫, 스킬.이름, resolve);
                });
                if (피격대상 === '나') {
                    this.내HP = Math.min(this.내최대HP, this.내HP + 회복량);
                    화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                } else {
                    this.상대HP = Math.min(this.상대최대HP, this.상대HP + 회복량);
                    화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                }
                setTimeout(() => this.오라비활성화(), 800);
                await this.지연(400);
            }
        }
    },

    // ========== HP 0 체크 + 좀비 ==========
    async 종료체크() {
        // 내 HP 체크
        if (this.내HP <= 0) {
            // 좀비 체크
            if (this._스킬보유(this.내펫, 6) && !this.좀비사용_나) {
                const 스킬 = 게임데이터.스킬찾기(6);
                if (this._확률체크(스킬.확률)) {
                    const 부활HP = 스킬.회복량 || 3;
                    this.좀비사용_나 = true;
                    this.내HP = 부활HP;
                    화면.HP업데이트('왼쪽', 부활HP, this.내최대HP);
                    화면.전투메시지표시(`좀비! HP ${부활HP} 부활!`, '#ff4040');
                    await this.지연(1000);
                    return false;
                }
            }
            this.진행중 = false;
            this.idle토글(false);
            await this.패배연출('왼쪽');
            document.getElementById('전투오른쪽펫').classList.add('victory');
            await new Promise(resolve => { 화면.KO연출(resolve); });
            this.종료콜백(false);
            return true;
        }

        // 상대 HP 체크
        if (this.상대HP <= 0) {
            if (this._스킬보유(this.상대펫, 6) && !this.좀비사용_상대) {
                const 스킬 = 게임데이터.스킬찾기(6);
                if (this._확률체크(스킬.확률)) {
                    const 부활HP = 스킬.회복량 || 3;
                    this.좀비사용_상대 = true;
                    this.상대HP = 부활HP;
                    화면.HP업데이트('오른쪽', 부활HP, this.상대최대HP);
                    화면.전투메시지표시(`좀비! HP ${부활HP} 부활!`, '#ff4040');
                    await this.지연(1000);
                    return false;
                }
            }
            this.진행중 = false;
            this.idle토글(false);
            await this.패배연출('오른쪽');
            document.getElementById('전투왼쪽펫').classList.add('victory');
            await new Promise(resolve => { 화면.KO연출(resolve); });
            this.종료콜백(true);
            return true;
        }

        return false;
    },

    // ========== 패배 다단계 연출 ==========
    async 패배연출(쪽) {
        const id = 쪽 === '왼쪽' ? '전투왼쪽펫' : '전투오른쪽펫';
        const el = document.getElementById(id);

        // 1단계: 비틀거림
        el.classList.add('defeat-stagger');
        화면.화면흔들림();
        await this.지연(600);
        el.classList.remove('defeat-stagger');

        // 2단계: 쓰러짐
        el.classList.add('defeat-fall');
        await this.지연(500);

        // 3단계: 바닥 바운스 + 먼지 이펙트
        el.classList.remove('defeat-fall');
        el.classList.add('defeat-bounce');
        화면.화면흔들림();
        this.패배먼지(쪽);
        await this.지연(300);

        // 4단계: 최종 상태 (바닥에 누워있음)
        el.classList.remove('defeat-bounce');
        el.classList.add('defeat-final');

        // 어지러움 별 이펙트
        this.패배별이펙트(쪽);
        await this.지연(400);
    },

    패배먼지(쪽) {
        if (!this.파티클상태) return;
        const x = 쪽 === '왼쪽' ? 160 : 1060;
        const y = 420;
        for (let i = 0; i < 12; i++) {
            const 각도 = -Math.PI * 0.2 + Math.random() * Math.PI * 0.4 + (쪽 === '왼쪽' ? Math.PI : 0);
            this.파티클상태.스파크.push({
                x: x + (Math.random() - 0.5) * 30,
                y: y + Math.random() * 10,
                vx: Math.cos(각도) * (1 + Math.random() * 3),
                vy: -Math.random() * 2 - 1,
                크기: Math.random() * 2 + 1,
                수명: 1, 감쇠: 0.03,
                색: ['#a09080', '#c0b0a0', '#8070650', '#d0c0b0'][Math.floor(Math.random() * 4)] || '#a09080',
                꼬리: false
            });
        }
    },

    패배별이펙트(쪽) {
        const 펫el = document.getElementById(쪽 === '왼쪽' ? '전투왼쪽펫' : '전투오른쪽펫');
        const field = document.querySelector('.battle-field');

        const 별 = document.createElement('div');
        별.className = 'defeat-stars show';
        별.style.cssText = `font-size:16px;width:60px;height:60px;display:flex;align-items:center;justify-content:center;`;
        별.innerHTML = '⭐💫⭐';

        // 펫 머리 위에 배치
        const rect = 펫el.getBoundingClientRect();
        const fieldRect = field.getBoundingClientRect();
        별.style.left = (rect.left - fieldRect.left + rect.width * 0.3) + 'px';
        별.style.top = (rect.top - fieldRect.top - 10) + 'px';
        field.appendChild(별);
    },

    // ========== 다음 라운드 (치유 스킬 포함) ==========
    async 다음라운드() {
        this.라운드수++;

        // 라운드 전환 중에는 입력 차단
        this.내턴완료 = true;
        this.상대턴완료 = false;
        this.내선택 = null;
        this.상대선택 = null;

        // 시스템 버튼 초기화
        document.querySelectorAll('.battle-sys-btn').forEach(btn => {
            btn.style.opacity = '0.5';
            btn.style.borderColor = 'rgba(255,255,255,.06)';
            btn.style.boxShadow = 'none';
            btn.style.transform = 'scale(1)';
            btn.classList.remove('flash');
        });

        // 라운드 연출 (이 동안 버튼 비활성)
        await new Promise(resolve => {
            화면.라운드연출(`ROUND ${this.라운드수}`, resolve);
        });

        // 치유 스킬 체크 (양쪽)
        await this.치유체크();

        // 라운드 연출 끝난 후에 입력 허용 + 버튼 재활성화
        this.내턴완료 = false;
        document.querySelectorAll('.battle-action-btn').forEach(btn => {
            btn.classList.remove('selected', 'disabled');
        });

        // 상대 AI 다시 시작
        this.상대AI시작();
    },

    async 치유체크() {
        // 내 펫 치유 (id 10)
        if (this._스킬보유(this.내펫, 10)) {
            const 스킬 = 게임데이터.스킬찾기(10);
            if (this._확률체크(스킬.확률) && this.내HP < this.내최대HP) {
                this.내HP = Math.min(this.내최대HP, this.내HP + 2);
                화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                화면.전투메시지표시(`${this.내펫.이름} 치유! HP +2`, '#40ff80');
                await this.지연(800);
            }
        }
        // 상대 펫 치유
        if (this._스킬보유(this.상대펫, 10)) {
            const 스킬 = 게임데이터.스킬찾기(10);
            if (this._확률체크(스킬.확률) && this.상대HP < this.상대최대HP) {
                this.상대HP = Math.min(this.상대최대HP, this.상대HP + 2);
                화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                화면.전투메시지표시(`${this.상대펫.이름} 치유! HP +2`, '#40ff80');
                await this.지연(800);
            }
        }
        // 내 펫 기습 (id 17) - 라운드 시작 시 상대에게 선제 대미지
        if (this._스킬보유(this.내펫, 17)) {
            const 스킬 = 게임데이터.스킬찾기(17);
            if (this._확률체크(스킬.확률)) {
                const 기습대미지 = 스킬.대미지 || 2;
                this.오라활성화('left');
                await new Promise(resolve => {
                    화면.스킬컷씬표시(this.내펫, 스킬.이름, resolve);
                });
                화면.화면흔들림();
                this.히트스파크(1060, 220, true, this.내펫);
                this.상대HP = Math.max(0, this.상대HP - 기습대미지);
                화면.HP업데이트('오른쪽', this.상대HP, this.상대최대HP);
                화면.대미지팝업('오른쪽', 기습대미지, true);
                setTimeout(() => this.오라비활성화(), 800);
                await this.지연(600);
                if (await this.종료체크()) return;
            }
        }
        // 상대 펫 기습
        if (this._스킬보유(this.상대펫, 17)) {
            const 스킬 = 게임데이터.스킬찾기(17);
            if (this._확률체크(스킬.확률)) {
                const 기습대미지 = 스킬.대미지 || 2;
                this.오라활성화('right');
                await new Promise(resolve => {
                    화면.스킬컷씬표시(this.상대펫, 스킬.이름, resolve);
                });
                화면.화면흔들림();
                this.히트스파크(180, 220, true, this.상대펫);
                this.내HP = Math.max(0, this.내HP - 기습대미지);
                화면.HP업데이트('왼쪽', this.내HP, this.내최대HP);
                화면.대미지팝업('왼쪽', 기습대미지, true);
                setTimeout(() => this.오라비활성화(), 800);
                await this.지연(600);
                if (await this.종료체크()) return;
            }
        }
    },

    // ========== 기존 유틸 ==========
    _액션클래스: { '바위': 'atk-punch', '가위': 'atk-kick', '보': 'atk-fly' },

    async 공격애니메이션(결과, 내액션, 상대액션) {
        const 왼쪽펫 = document.getElementById('전투왼쪽펫');
        const 오른쪽펫 = document.getElementById('전투오른쪽펫');
        const 내클래스 = this._액션클래스[내액션];
        const 상대클래스 = this._액션클래스[상대액션];

        // 방어자 위치 기준으로 히트이펙트 표시
        const 왼쪽펫X = 180;
        const 오른쪽펫X = 1060;

        if (결과 === 'win') {
            // 내 펫(왼쪽)이 공격 → 상대(오른쪽)가 맞음
            왼쪽펫.classList.add(내클래스, 'move-center-l');
            await this.지연(250);
            // 타격 순간
            화면.전투플래시();
            화면.화면흔들림();
            화면.히트이펙트(오른쪽펫X, 220);
            this.히트스파크(오른쪽펫X, 220, false);
            // 방어자 피격 리액션
            오른쪽펫.classList.add('hit-react', 'hit-flash');
            this.피격이모티콘('오른쪽', false);
            await this.지연(150);
            // 추가 스파크
            this.히트스파크(오른쪽펫X + (Math.random()-0.5)*30, 230, false);
            await this.지연(300);
            왼쪽펫.classList.remove('move-center-l', 내클래스);
            오른쪽펫.classList.remove('hit-react', 'hit-flash');
        } else if (결과 === 'lose') {
            // 상대(오른쪽)가 공격 → 내 펫(왼쪽)이 맞음
            오른쪽펫.classList.add(상대클래스, 'move-center-r');
            await this.지연(250);
            화면.전투플래시();
            화면.화면흔들림();
            화면.히트이펙트(왼쪽펫X, 220);
            this.히트스파크(왼쪽펫X, 220, false);
            왼쪽펫.classList.add('hit-react', 'hit-flash');
            this.피격이모티콘('왼쪽', false);
            await this.지연(150);
            this.히트스파크(왼쪽펫X + (Math.random()-0.5)*30, 230, false);
            await this.지연(300);
            오른쪽펫.classList.remove('move-center-r', 상대클래스);
            왼쪽펫.classList.remove('hit-react', 'hit-flash');
        } else {
            // 무승부 - 가운데로 빠르게 돌진 → 충돌 → 튕겨나감
            왼쪽펫.classList.remove('idle');
            오른쪽펫.classList.remove('idle');
            왼쪽펫.classList.add(내클래스, 'draw-rush-l');
            오른쪽펫.classList.add(상대클래스, 'draw-rush-r');
            await this.지연(200);
            // 충돌 순간
            화면.전투플래시();
            화면.화면흔들림();
            화면.히트이펙트(640, 220);
            this.히트스파크(640, 220, false);
            왼쪽펫.classList.add('hit-flash');
            오른쪽펫.classList.add('hit-flash');
            await this.지연(100);
            // 튕겨나감
            왼쪽펫.classList.remove('draw-rush-l');
            오른쪽펫.classList.remove('draw-rush-r');
            왼쪽펫.classList.add('draw-bounce-l');
            오른쪽펫.classList.add('draw-bounce-r');
            await this.지연(400);
            // 원래 위치로 복귀
            왼쪽펫.classList.remove('draw-bounce-l', 내클래스, 'hit-flash');
            오른쪽펫.classList.remove('draw-bounce-r', 상대클래스, 'hit-flash');
            왼쪽펫.classList.add('idle');
            오른쪽펫.classList.add('idle');
        }
    },

    히트애니메이션(쪽, 강한히트 = false) {
        const id = 쪽 === '왼쪽' ? '전투왼쪽펫' : '전투오른쪽펫';
        const el = document.getElementById(id);
        const 클래스 = 강한히트 ? 'hit-heavy' : 'hit-react';
        const 시간 = 강한히트 ? 600 : 400;

        // 빨간 플래시
        el.classList.add('hit-flash');
        setTimeout(() => el.classList.remove('hit-flash'), 300);

        // 히트 리액션
        el.classList.add(클래스);
        setTimeout(() => el.classList.remove(클래스), 시간);

        // 피격 이모티콘 (💢 or 💥)
        this.피격이모티콘(쪽, 강한히트);
    },

    피격이모티콘(쪽, 강한) {
        const 펫el = document.getElementById(쪽 === '왼쪽' ? '전투왼쪽펫' : '전투오른쪽펫');
        const rect = 펫el.getBoundingClientRect();
        const field = document.querySelector('.battle-field');
        const fieldRect = field.getBoundingClientRect();

        const 이모 = document.createElement('div');
        이모.className = 'hit-emotion';
        이모.textContent = 강한 ? '💥' : '💢';
        이모.style.left = (rect.left - fieldRect.left + rect.width * 0.3 + Math.random() * rect.width * 0.4) + 'px';
        이모.style.top = (rect.top - fieldRect.top + 10) + 'px';
        field.appendChild(이모);
        void 이모.offsetWidth;
        이모.classList.add('show');
        setTimeout(() => 이모.remove(), 700);
    },

    idle토글(활성) {
        const 왼쪽 = document.getElementById('전투왼쪽펫');
        const 오른쪽 = document.getElementById('전투오른쪽펫');
        if (활성) { 왼쪽.classList.add('idle'); 오른쪽.classList.add('idle'); }
        else { 왼쪽.classList.remove('idle'); 오른쪽.classList.remove('idle'); }
    },

    오라활성화(쪽) {
        const id = 쪽 === 'left' ? '왼쪽오라' : '오른쪽오라';
        document.getElementById(id)?.classList.add('active');
    },

    오라비활성화() {
        document.getElementById('왼쪽오라')?.classList.remove('active');
        document.getElementById('오른쪽오라')?.classList.remove('active');
    },

    정리() {
        this.진행중 = false;
        if (this.상대타이머) clearTimeout(this.상대타이머);
        this.파티클상태 = null;
        // 패배/승리 이펙트 정리
        document.querySelectorAll('.hit-emotion, .defeat-stars').forEach(el => el.remove());
        ['전투왼쪽펫', '전투오른쪽펫'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.remove('defeat-stagger', 'defeat-fall', 'defeat-bounce', 'defeat-final', 'victory', 'hit-react', 'hit-heavy', 'hit-flash');
        });
        // 스테이지 배경 정리
        스테이지.중지();
    },

    지연(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    },

    // ========== 히트 스파크 (속성 색상 반영) ==========
    히트스파크(x, y, 강화, 공격펫 = null) {
        if (!this.파티클상태) return;
        const 개수 = 강화 ? 30 : 15;
        let 색상들;
        if (강화 && 공격펫) {
            const 속성 = 게임데이터.속성가져오기(공격펫.속성 || '불');
            색상들 = [...속성.파티클, '#fff'];
        } else {
            색상들 = ['#ffe040', '#ff8020', '#ffaa40', '#fff'];
        }
        for (let i = 0; i < 개수; i++) {
            const 각도 = Math.random() * Math.PI * 2;
            const 속도 = 2 + Math.random() * (강화 ? 8 : 5);
            this.파티클상태.스파크.push({
                x, y,
                vx: Math.cos(각도) * 속도,
                vy: Math.sin(각도) * 속도 - 2,
                크기: Math.random() * 3 + 1,
                수명: 1,
                감쇠: 0.02 + Math.random() * 0.03,
                색: 색상들[Math.floor(Math.random() * 색상들.length)],
                꼬리: 강화
            });
        }
    },

    // ========== 파티클 시스템 ==========
    파티클시작() {
        const canvas = document.getElementById('전투파티클');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = 1280;
        canvas.height = 720;

        const 내속성 = 게임데이터.속성가져오기(this.내펫.속성 || '불');
        const 상대속성 = 게임데이터.속성가져오기(this.상대펫.속성 || '불');
        const 내색 = 내속성.주색;
        const 상대색 = 상대속성.주색;

        this.파티클상태 = { 에너지: [], 바닥: [], 스파크: [], 시간: 0 };
        const 상태 = this.파티클상태;

        for (let i = 0; i < 35; i++) {
            const 왼쪽 = i < 18;
            상태.에너지.push({
                x: 왼쪽 ? Math.random() * 500 : 780 + Math.random() * 500,
                y: Math.random() * 720,
                vx: (Math.random() - 0.5) * 0.4,
                vy: -0.3 - Math.random() * 0.8,
                크기: Math.random() * 3 + 1,
                투명: Math.random() * 0.3 + 0.05,
                색: 왼쪽 ? 내색 : 상대색,
                빛남: Math.random() * Math.PI * 2,
                빛남속도: 0.02 + Math.random() * 0.03
            });
        }

        for (let i = 0; i < 12; i++) {
            상태.바닥.push({
                x: 100 + Math.random() * 1080,
                y: 650 + Math.random() * 60,
                vy: -0.2 - Math.random() * 0.4,
                크기: Math.random() * 1.5 + 0.5,
                투명: Math.random() * 0.08 + 0.02,
                수명: Math.random()
            });
        }

        const 그리기 = () => {
            ctx.clearRect(0, 0, 1280, 720);
            상태.시간++;

            ctx.strokeStyle = 'rgba(255,200,100,.03)';
            ctx.lineWidth = 1;
            const 바닥Y = 560;
            for (let i = 0; i < 5; i++) {
                const y = 바닥Y + i * 30 + Math.sin(상태.시간 * 0.01 + i) * 2;
                ctx.globalAlpha = 0.04 - i * 0.007;
                ctx.beginPath(); ctx.moveTo(100, y); ctx.lineTo(1180, y); ctx.stroke();
            }
            for (let i = 0; i < 12; i++) {
                const x = 160 + i * 88;
                const 상단X = 640 + (x - 640) * 0.7;
                ctx.globalAlpha = 0.025;
                ctx.beginPath(); ctx.moveTo(상단X, 바닥Y); ctx.lineTo(x, 720); ctx.stroke();
            }

            상태.에너지.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.빛남 += p.빛남속도;
                if (p.y < -20) { p.y = 730; p.x = p.x < 640 ? Math.random() * 500 : 780 + Math.random() * 500; }
                if (p.x < -20) p.x = 1300; if (p.x > 1300) p.x = -20;
                const 밝기 = 0.5 + Math.sin(p.빛남) * 0.5;
                ctx.globalAlpha = p.투명 * 밝기;
                ctx.fillStyle = p.색; ctx.shadowBlur = 8; ctx.shadowColor = p.색;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            상태.바닥.forEach(p => {
                p.y += p.vy; p.수명 -= 0.003;
                if (p.수명 <= 0 || p.y < 500) { p.x = 100 + Math.random() * 1080; p.y = 650 + Math.random() * 60; p.수명 = 1; }
                ctx.globalAlpha = p.투명 * p.수명; ctx.fillStyle = '#a090c0';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.크기, 0, Math.PI * 2); ctx.fill();
            });

            for (let i = 상태.스파크.length - 1; i >= 0; i--) {
                const s = 상태.스파크[i];
                s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.vx *= 0.98; s.수명 -= s.감쇠;
                if (s.수명 <= 0) { 상태.스파크.splice(i, 1); continue; }
                ctx.globalAlpha = s.수명; ctx.fillStyle = s.색;
                ctx.shadowBlur = s.꼬리 ? 6 : 3; ctx.shadowColor = s.색;
                if (s.꼬리) {
                    ctx.strokeStyle = s.색; ctx.lineWidth = s.크기 * 0.6;
                    ctx.globalAlpha = s.수명 * 0.3;
                    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x - s.vx * 3, s.y - s.vy * 3); ctx.stroke();
                    ctx.globalAlpha = s.수명;
                }
                ctx.beginPath(); ctx.arc(s.x, s.y, s.크기, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            const 파동투명 = 0.015 + Math.sin(상태.시간 * 0.03) * 0.01;
            const 파동크기 = 100 + Math.sin(상태.시간 * 0.02) * 30;
            ctx.globalAlpha = 파동투명; ctx.strokeStyle = '#ffe080'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(640, 350, 파동크기, 0, Math.PI * 2); ctx.stroke();
            ctx.globalAlpha = 1;

            if (document.getElementById('전투화면')?.classList.contains('active') && this.파티클상태 === 상태) {
                requestAnimationFrame(그리기);
            }
        };
        그리기();
    }
};

// 히트 애니메이션 CSS 동적 추가
(function() {
    const style = document.createElement('style');
    style.textContent = `
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }
        @keyframes hitShake {
            0%, 100% { transform: translateX(0) translateY(0); }
            20% { transform: translateX(-12px) translateY(-8px); }
            40% { transform: translateX(12px) translateY(6px); }
            60% { transform: translateX(-8px) translateY(-4px); }
            80% { transform: translateX(6px) translateY(3px); }
        }
    `;
    document.head.appendChild(style);
})();

// app.js - 메인 게임 컨트롤러
const 게임 = {
    현재화면: null,
    내펫: null,
    상대펫: null,
    인트로정리: null,

    async 시작() {
        // 데이터 로드
        await 게임데이터.로드();

        // 화면 생성
        const 게임영역 = document.getElementById('game');
        게임영역.innerHTML = '';

        게임영역.appendChild(화면.타이틀생성());
        게임영역.appendChild(화면.인트로생성());
        게임영역.appendChild(화면.캐릭터선택생성());
        게임영역.appendChild(화면.VS화면생성());
        게임영역.appendChild(화면.전투화면생성());
        게임영역.appendChild(화면.결과화면생성());

        // 타이틀 화면 표시
        this.화면전환('타이틀화면');
        화면.타이틀펫배치();
        화면.타이틀파티클시작();
        화면.타이틀연출시작();

        // 타이틀 화면 전체 클릭으로 시작
        document.getElementById('타이틀화면').onclick = () => {
            this.인트로시작();
        };
    },

    화면전환(화면id) {
        // 이전 화면 비활성화
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        // 새 화면 활성화
        const 새화면 = document.getElementById(화면id);
        if (새화면) {
            새화면.classList.add('active');
            this.현재화면 = 화면id;
        }
    },

    인트로시작() {
        this.화면전환('인트로화면');
        this.인트로정리 = 화면.인트로표시(게임데이터.펫목록, () => {
            this.캐릭터선택시작();
        });
    },

    캐릭터선택시작() {
        if (this.인트로정리) {
            this.인트로정리();
            this.인트로정리 = null;
        }
        this.화면전환('선택화면');
        화면.캐릭터선택초기화((선택된펫) => {
            this.내펫 = 선택된펫;
            this.상대선택시작();
        });
    },

    상대선택시작() {
        // 랜덤 상대 선택
        this.상대펫 = 게임데이터.랜덤상대(this.내펫.id);
        this.화면전환('VS화면');
        화면.VS표시(this.내펫, this.상대펫, () => {
            this.전투시작();
        });
    },

    전투시작() {
        this.화면전환('전투화면');
        전투시스템.초기화(this.내펫, this.상대펫, (승리) => {
            this.전투종료(승리);
        });
    },

    전투종료(승리) {
        // 정리는 화면전환 직전에 (죽은 모션 유지를 위해)
        setTimeout(() => {
            전투시스템.정리();
            this.화면전환('결과화면');
            화면.결과표시(
                승리,
                this.내펫,
                this.상대펫,
                () => {
                    // 다시 하기 - 같은 캐릭터로 새 상대
                    this.상대선택시작();
                },
                () => {
                    // 타이틀로
                    this.화면전환('타이틀화면');
                    화면.타이틀펫배치();
                    화면.타이틀파티클시작();
                    화면.타이틀연출시작();
                }
            );
        }, 1000);
    }
};

// 게임 시작
window.addEventListener('DOMContentLoaded', () => {
    게임.시작();
});
</script>
