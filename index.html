<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무사의 길</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'GameFont';
      src: local('Noto Serif KR'), local('Malgun Gothic');
    }

    body {
      font-family: 'GameFont', 'Noto Serif KR', serif;
      background: #0a0a0f;
      color: #e0d5c0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── Scenes ── */
    .scene {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .scene.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ══════════════════════════════════
       ENTRANCE SCENE
    ══════════════════════════════════ */
    #scene-entrance {
      display: flex;
      background: radial-gradient(ellipse at 30% 50%, #1a1520 0%, #0a0a0f 70%);
    }

    /* 3D Character Area */
    .character-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #character-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .character-loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #554433;
      font-size: 14px;
      letter-spacing: 2px;
    }
    .character-loading.hidden { display: none; }

    /* Buttons Panel */
    .buttons-panel {
      width: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      padding: 40px 40px 40px 0;
    }

    .game-btn {
      position: relative;
      height: 180px;
      border: 2px solid #3a2a1a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    .game-btn:hover {
      border-color: #c8a050;
      transform: scale(1.03);
      box-shadow: 0 0 40px rgba(200, 160, 80, 0.2);
    }
    .game-btn:active { transform: scale(0.98); }

    .game-btn .btn-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.4;
      transition: opacity 0.4s;
    }
    .game-btn:hover .btn-bg { opacity: 0.6; }

    .btn-growth .btn-bg {
      background: radial-gradient(circle at 50% 60%, #4a2a00 0%, #1a0a00 100%);
    }
    .btn-skill .btn-bg {
      background: radial-gradient(circle at 50% 40%, #002a4a 0%, #000a1a 100%);
    }

    .game-btn .btn-glow {
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 50%;
      filter: blur(30px);
      opacity: 0.3;
      transition: opacity 0.4s;
    }
    .game-btn:hover .btn-glow { opacity: 0.6; }

    .btn-growth .btn-glow {
      background: #ff8c00;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .btn-skill .btn-glow {
      background: #4488ff;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .game-btn .btn-label {
      position: relative;
      z-index: 2;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
    .btn-growth .btn-label { color: #f0c060; }
    .btn-skill .btn-label { color: #70b0ff; }

    .game-btn .btn-sub {
      position: absolute;
      bottom: 14px;
      font-size: 11px;
      color: #665544;
      letter-spacing: 2px;
      z-index: 2;
    }
    .game-btn:hover .btn-sub { color: #998877; }

    /* Particles */
    .entrance-particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      background: #c8a050;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp 4s ease-in-out infinite;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(0) scale(1); }
      20% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-200px) scale(0); }
    }

    /* ══════════════════════════════════
       GROWTH SCENE (스탯)
    ══════════════════════════════════ */
    #scene-growth {
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 50% 30%, #201a10 0%, #0a0a0f 70%);
    }

    .scene-header {
      display: flex;
      align-items: center;
      padding: 24px 32px;
    }
    .back-btn {
      background: none;
      border: 1px solid #3a2a1a;
      color: #998877;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }
    .back-btn:hover {
      border-color: #c8a050;
      color: #c8a050;
    }
    .scene-title {
      flex: 1;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #f0c060;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(240, 192, 96, 0.3);
    }
    .scene-title-spacer { width: 80px; }

    .growth-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .stat-panel {
      background: rgba(20, 16, 10, 0.8);
      border: 1px solid #3a2a1a;
      border-radius: 16px;
      padding: 40px;
      width: 500px;
    }

    .stat-points {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #2a1a0a;
    }
    .stat-points-label {
      font-size: 13px;
      color: #665544;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .stat-points-value {
      font-size: 36px;
      font-weight: 700;
      color: #f0c060;
      text-shadow: 0 0 15px rgba(240, 192, 96, 0.4);
    }

    .stat-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #1a1510;
    }
    .stat-row:last-child { border-bottom: none; }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 14px;
      flex-shrink: 0;
    }
    .stat-icon.str { background: rgba(255, 80, 50, 0.15); }
    .stat-icon.vit { background: rgba(50, 200, 80, 0.15); }
    .stat-icon.int { background: rgba(80, 120, 255, 0.15); }
    .stat-icon.agi { background: rgba(255, 200, 50, 0.15); }
    .stat-icon.luk { background: rgba(200, 100, 255, 0.15); }

    .stat-name {
      width: 50px;
      font-size: 16px;
      font-weight: 600;
      color: #c0b090;
    }

    .stat-bar-wrap {
      flex: 1;
      height: 8px;
      background: #1a1510;
      border-radius: 4px;
      margin: 0 16px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .stat-bar.str { background: linear-gradient(90deg, #ff5032, #ff8060); }
    .stat-bar.vit { background: linear-gradient(90deg, #32c850, #60e880); }
    .stat-bar.int { background: linear-gradient(90deg, #5078ff, #80a0ff); }
    .stat-bar.agi { background: linear-gradient(90deg, #ffc832, #ffe060); }
    .stat-bar.luk { background: linear-gradient(90deg, #c864ff, #e0a0ff); }

    .stat-value {
      width: 30px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #e0d0b0;
    }

    .stat-btns {
      display: flex;
      gap: 6px;
      margin-left: 12px;
    }
    .stat-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid #3a2a1a;
      background: rgba(200, 160, 80, 0.1);
      color: #c8a050;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-family: inherit;
    }
    .stat-btn:hover {
      background: rgba(200, 160, 80, 0.25);
      border-color: #c8a050;
    }
    .stat-btn:active { transform: scale(0.9); }
    .stat-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .reset-btn {
      display: block;
      margin: 24px auto 0;
      padding: 10px 32px;
      background: none;
      border: 1px solid #3a2020;
      color: #aa6655;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      letter-spacing: 2px;
    }
    .reset-btn:hover {
      border-color: #cc5544;
      color: #cc5544;
    }

    /* ══════════════════════════════════
       SKILL TREE SCENE
    ══════════════════════════════════ */
    #scene-skill {
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at 50% 30%, #0a1520 0%, #0a0a0f 70%);
    }

    .skill-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .skill-tree {
      position: relative;
      width: 700px;
      height: 500px;
    }

    .skill-tree svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .skill-tree svg line {
      stroke: #2a3040;
      stroke-width: 2;
    }
    .skill-tree svg line.active {
      stroke: #4488cc;
      stroke-width: 2;
      filter: drop-shadow(0 0 4px rgba(68, 136, 204, 0.5));
    }

    .skill-node {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid #2a3040;
      background: rgba(10, 15, 25, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      transform: translate(-50%, -50%);
    }
    .skill-node:hover {
      border-color: #4488cc;
      box-shadow: 0 0 20px rgba(68, 136, 204, 0.3);
    }
    .skill-node.learned {
      border-color: #4488cc;
      background: rgba(20, 40, 70, 0.9);
      box-shadow: 0 0 15px rgba(68, 136, 204, 0.2);
    }
    .skill-node.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .skill-node .skill-icon {
      font-size: 24px;
      margin-bottom: 2px;
    }
    .skill-node .skill-name {
      font-size: 9px;
      color: #8899aa;
      letter-spacing: 1px;
    }
    .skill-node.learned .skill-name {
      color: #aaccee;
    }

    .skill-points-display {
      position: absolute;
      top: 0; right: 0;
      background: rgba(10, 15, 25, 0.8);
      border: 1px solid #2a3040;
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
    }
    .skill-points-display .sp-label {
      font-size: 11px;
      color: #556677;
      letter-spacing: 2px;
    }
    .skill-points-display .sp-value {
      font-size: 28px;
      font-weight: 700;
      color: #70b0ff;
    }

    /* Skill tooltip */
    .skill-tooltip {
      display: none;
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 15, 25, 0.95);
      border: 1px solid #3a4a5a;
      border-radius: 8px;
      padding: 8px 14px;
      white-space: nowrap;
      z-index: 10;
      font-size: 12px;
      color: #aabbcc;
    }
    .skill-node:hover .skill-tooltip {
      display: block;
    }

    /* ══════════════════════════════════
       SHARED
    ══════════════════════════════════ */
    /* Corner decoration */
    .corner-deco {
      position: absolute;
      width: 40px; height: 40px;
      border-color: #3a2a1a;
      pointer-events: none;
    }
    .corner-deco.tl { top: 16px; left: 16px; border-top: 1px solid; border-left: 1px solid; }
    .corner-deco.tr { top: 16px; right: 16px; border-top: 1px solid; border-right: 1px solid; }
    .corner-deco.bl { bottom: 16px; left: 16px; border-bottom: 1px solid; border-left: 1px solid; }
    .corner-deco.br { bottom: 16px; right: 16px; border-bottom: 1px solid; border-right: 1px solid; }

    /* Version */
    .version-tag {
      position: absolute;
      bottom: 12px;
      right: 20px;
      font-size: 10px;
      color: #2a2a2a;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- ══════ ENTRANCE SCENE ══════ -->
  <div id="scene-entrance" class="scene active">
    <div class="entrance-particles" id="particles"></div>

    <div class="character-area">
      <canvas id="character-canvas"></canvas>
      <div class="character-loading" id="charLoading">불러오는 중...</div>
    </div>

    <div class="buttons-panel">
      <div class="game-btn btn-growth" onclick="goToScene('growth')">
        <div class="btn-bg"></div>
        <div class="btn-glow"></div>
        <span class="btn-label">성 장</span>
        <span class="btn-sub">스탯 배분</span>
      </div>
      <div class="game-btn btn-skill" onclick="goToScene('skill')">
        <div class="btn-bg"></div>
        <div class="btn-glow"></div>
        <span class="btn-label">스 킬</span>
        <span class="btn-sub">스킬 트리</span>
      </div>
    </div>

    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>
    <div class="version-tag">PROTOTYPE v0.1</div>
  </div>

  <!-- ══════ GROWTH SCENE ══════ -->
  <div id="scene-growth" class="scene">
    <div class="scene-header">
      <button class="back-btn" onclick="goToScene('entrance')">&#9664; 돌아가기</button>
      <div class="scene-title">성 장</div>
      <div class="scene-title-spacer"></div>
    </div>
    <div class="growth-content">
      <div class="stat-panel">
        <div class="stat-points">
          <div class="stat-points-label">배분 가능 포인트</div>
          <div class="stat-points-value" id="availablePoints">10</div>
        </div>
        <div id="statsContainer"></div>
        <button class="reset-btn" onclick="resetStats()">초기화</button>
      </div>
    </div>
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>
  </div>

  <!-- ══════ SKILL TREE SCENE ══════ -->
  <div id="scene-skill" class="scene">
    <div class="scene-header">
      <button class="back-btn" onclick="goToScene('entrance')">&#9664; 돌아가기</button>
      <div class="scene-title" style="color: #70b0ff;">스 킬</div>
      <div class="scene-title-spacer"></div>
    </div>
    <div class="skill-content">
      <div class="skill-tree" id="skillTree">
        <svg id="skillLines"></svg>
      </div>
    </div>
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>
  </div>

  <!-- ══════ SCRIPTS ══════ -->
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Three.js Setup ──
    const canvas = document.getElementById('character-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
    camera.position.set(0, 1.2, 2.8);

    // Controls
    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0, 1.0, 0);
    controls.enablePan = false;
    controls.enableZoom = false;
    controls.minPolarAngle = Math.PI * 0.3;
    controls.maxPolarAngle = Math.PI * 0.6;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;
    controls.update();

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffeedd, 2.0);
    mainLight.position.set(3, 5, 4);
    mainLight.castShadow = true;
    scene.add(mainLight);

    const rimLight = new THREE.DirectionalLight(0x4488cc, 0.8);
    rimLight.position.set(-3, 3, -2);
    scene.add(rimLight);

    const bottomLight = new THREE.PointLight(0xcc8844, 0.5, 5);
    bottomLight.position.set(0, 0.1, 1);
    scene.add(bottomLight);

    // Floor
    const floorGeo = new THREE.CircleGeometry(2, 32);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x111118,
      roughness: 0.8,
      metalness: 0.2,
      transparent: true,
      opacity: 0.5
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Load model
    let mixer = null;
    const loader = new GLTFLoader();
    loader.load('assets/Soldier.glb', (gltf) => {
      const model = gltf.scene;
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      scene.add(model);

      // Animation
      mixer = new THREE.AnimationMixer(model);
      const idleClip = gltf.animations.find(a => a.name === 'Idle') || gltf.animations[0];
      if (idleClip) {
        const action = mixer.clipAction(idleClip);
        action.play();
      }

      document.getElementById('charLoading').classList.add('hidden');
    }, undefined, (err) => {
      document.getElementById('charLoading').textContent = '모델 로드 실패';
      console.error(err);
    });

    // Resize
    function resizeCanvas() {
      const area = canvas.parentElement;
      const w = area.clientWidth;
      const h = area.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resizeCanvas);
    // Delay initial resize to ensure layout
    setTimeout(resizeCanvas, 100);

    // Render loop
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer) mixer.update(delta);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>

  <script>
    // ══════════════════════════════════
    //  SCENE NAVIGATION
    // ══════════════════════════════════
    function goToScene(name) {
      document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
      document.getElementById('scene-' + name).classList.add('active');
    }
    window.goToScene = goToScene;

    // ══════════════════════════════════
    //  PARTICLES (Entrance)
    // ══════════════════════════════════
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 25; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 60 + '%';
        p.style.bottom = '-10px';
        const size = Math.random() * 3 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.animationDelay = (Math.random() * 4) + 's';
        p.style.animationDuration = (Math.random() * 3 + 3) + 's';
        container.appendChild(p);
      }
    })();

    // ══════════════════════════════════
    //  STATS SYSTEM (Growth)
    // ══════════════════════════════════
    const STATS_CONFIG = [
      { key: 'str', name: '힘', icon: '&#9876;', base: 5 },
      { key: 'vit', name: '체력', icon: '&#9829;', base: 5 },
      { key: 'int', name: '지력', icon: '&#9733;', base: 3 },
      { key: 'agi', name: '민첩', icon: '&#9889;', base: 4 },
      { key: 'luk', name: '운', icon: '&#9752;', base: 2 }
    ];

    let totalPoints = 10;
    let usedPoints = 0;
    let stats = {};

    function initStats() {
      stats = {};
      usedPoints = 0;
      STATS_CONFIG.forEach(s => { stats[s.key] = s.base; });
      renderStats();
    }

    function renderStats() {
      const container = document.getElementById('statsContainer');
      container.innerHTML = STATS_CONFIG.map(s => {
        const val = stats[s.key];
        const pct = Math.min((val / 30) * 100, 100);
        const remaining = totalPoints - usedPoints;
        return `
          <div class="stat-row">
            <div class="stat-icon ${s.key}">${s.icon}</div>
            <div class="stat-name">${s.name}</div>
            <div class="stat-bar-wrap">
              <div class="stat-bar ${s.key}" style="width: ${pct}%"></div>
            </div>
            <div class="stat-value">${val}</div>
            <div class="stat-btns">
              <button class="stat-btn" onclick="changeStat('${s.key}', -1)" ${val <= s.base ? 'disabled' : ''}>-</button>
              <button class="stat-btn" onclick="changeStat('${s.key}', 1)" ${remaining <= 0 ? 'disabled' : ''}>+</button>
            </div>
          </div>`;
      }).join('');
      document.getElementById('availablePoints').textContent = totalPoints - usedPoints;
    }

    function changeStat(key, delta) {
      const cfg = STATS_CONFIG.find(s => s.key === key);
      const newVal = stats[key] + delta;
      if (delta > 0 && usedPoints >= totalPoints) return;
      if (delta < 0 && newVal < cfg.base) return;
      stats[key] = newVal;
      usedPoints += delta;
      renderStats();
    }
    window.changeStat = changeStat;

    function resetStats() {
      initStats();
    }
    window.resetStats = resetStats;

    initStats();

    // ══════════════════════════════════
    //  SKILL TREE SYSTEM
    // ══════════════════════════════════
    const SKILLS = [
      // Tier 0 (root)
      { id: 'basic_slash', name: '기본참', icon: '&#9876;', x: 350, y: 420, prereq: null, desc: '기본 검술 공격' },
      // Tier 1
      { id: 'power_strike', name: '강타', icon: '&#128165;', x: 200, y: 310, prereq: 'basic_slash', desc: '강력한 일격 (데미지 +50%)' },
      { id: 'swift_cut', name: '쾌도', icon: '&#127744;', x: 500, y: 310, prereq: 'basic_slash', desc: '빠른 연속 베기 (2회 공격)' },
      // Tier 2
      { id: 'rage', name: '분노', icon: '&#128293;', x: 120, y: 200, prereq: 'power_strike', desc: '공격력 2배 (10초간)' },
      { id: 'iron_wall', name: '철벽', icon: '&#128737;', x: 280, y: 200, prereq: 'power_strike', desc: '받는 피해 50% 감소' },
      { id: 'shadow_step', name: '그림자', icon: '&#127761;', x: 420, y: 200, prereq: 'swift_cut', desc: '순간이동 후 기습 공격' },
      { id: 'blade_dance', name: '검무', icon: '&#10024;', x: 580, y: 200, prereq: 'swift_cut', desc: '범위 내 적 전체 공격' },
      // Tier 3 (ultimate)
      { id: 'dragon_fury', name: '용의분노', icon: '&#128009;', x: 200, y: 80, prereq: 'rage', desc: '궁극기: 용의 힘을 해방' },
      { id: 'wind_god', name: '풍신', icon: '&#127744;', x: 500, y: 80, prereq: 'blade_dance', desc: '궁극기: 바람의 신 강림' },
    ];

    let learnedSkills = new Set();
    let skillPoints = 5;

    function initSkillTree() {
      const tree = document.getElementById('skillTree');
      const svg = document.getElementById('skillLines');

      // Render connection lines
      let linesHTML = '';
      SKILLS.forEach(skill => {
        if (skill.prereq) {
          const parent = SKILLS.find(s => s.id === skill.prereq);
          if (parent) {
            linesHTML += `<line id="line_${skill.id}" x1="${parent.x}" y1="${parent.y}" x2="${skill.x}" y2="${skill.y}"></line>`;
          }
        }
      });
      svg.innerHTML = linesHTML;

      // Render nodes
      document.querySelectorAll('.skill-node').forEach(n => n.remove());
      SKILLS.forEach(skill => {
        const node = document.createElement('div');
        node.className = 'skill-node';
        node.id = 'skill_' + skill.id;
        node.style.left = skill.x + 'px';
        node.style.top = skill.y + 'px';
        node.innerHTML = `
          <span class="skill-icon">${skill.icon}</span>
          <span class="skill-name">${skill.name}</span>
          <div class="skill-tooltip">${skill.desc}</div>
        `;
        node.onclick = () => learnSkill(skill.id);
        tree.appendChild(node);
      });

      // Skill points display
      let spDisplay = tree.querySelector('.skill-points-display');
      if (!spDisplay) {
        spDisplay = document.createElement('div');
        spDisplay.className = 'skill-points-display';
        tree.appendChild(spDisplay);
      }
      spDisplay.innerHTML = `
        <div class="sp-label">스킬 포인트</div>
        <div class="sp-value" id="skillPointsValue">${skillPoints}</div>
      `;

      updateSkillTree();
    }

    function learnSkill(id) {
      const skill = SKILLS.find(s => s.id === id);
      if (!skill) return;
      if (learnedSkills.has(id)) return;
      if (skillPoints <= 0) return;
      if (skill.prereq && !learnedSkills.has(skill.prereq)) return;

      learnedSkills.add(id);
      skillPoints--;
      updateSkillTree();
    }
    window.learnSkill = learnSkill;

    function updateSkillTree() {
      SKILLS.forEach(skill => {
        const node = document.getElementById('skill_' + skill.id);
        if (!node) return;

        node.classList.remove('learned', 'locked');

        if (learnedSkills.has(skill.id)) {
          node.classList.add('learned');
        } else if (skill.prereq && !learnedSkills.has(skill.prereq)) {
          node.classList.add('locked');
        }

        // Update line
        const line = document.getElementById('line_' + skill.id);
        if (line) {
          if (learnedSkills.has(skill.id)) {
            line.classList.add('active');
          } else {
            line.classList.remove('active');
          }
        }
      });

      const spEl = document.getElementById('skillPointsValue');
      if (spEl) spEl.textContent = skillPoints;
    }

    initSkillTree();
  </script>
</body>
</html>
